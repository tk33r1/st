<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>/glitch — OGP ジェネレーター</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap"
    rel="stylesheet">

  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      background: #09090e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 32px 16px 100px;
      font-family: 'JetBrains Mono', monospace;
    }

    .page-label {
      color: rgba(0, 229, 255, 0.4);
      font-size: 11px;
      letter-spacing: 0.12em;
      margin-bottom: 20px;
    }

    .tab-bar {
      display: flex;
    }

    .tab-btn {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      padding: 7px 20px;
      border: 1px solid rgba(255, 255, 255, 0.07);
      border-bottom: none;
      background: #0f0f16;
      color: #5a5a72;
      cursor: pointer;
      letter-spacing: 0.06em;
      transition: color 0.15s;
    }

    .tab-btn:hover {
      color: #ff00ff;
    }

    .tab-btn.active {
      background: #09090e;
      color: #00e5ff;
      border-color: rgba(0, 229, 255, 0.3);
    }

    .canvas-wrap {
      border: 1px solid rgba(255, 255, 255, 0.07);
      position: relative;
    }

    .canvas-scale {
      transform-origin: top left;
    }

    .dl-row {
      display: flex;
      gap: 12px;
      margin-top: 16px;
    }

    .dl-btn {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      letter-spacing: 0.1em;
      padding: 10px 28px;
      border: none;
      cursor: pointer;
      font-weight: 700;
      transition: opacity 0.15s;
    }

    .dl-btn:hover {
      opacity: 0.85;
    }

    .dl-btn:disabled {
      opacity: 0.4;
      cursor: default;
    }

    .dl-btn.png {
      background: #00e5ff;
      color: #09090e;
    }

    .dl-btn.webp {
      background: #ff00ff;
      color: #09090e;
    }

    .img-hover-wrap {
      position: absolute;
      inset: 0;
      cursor: pointer;
      z-index: 50;
    }

    .img-hover-wrap:hover .img-hover-label {
      opacity: 1;
    }

    .img-hover-label {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, .6);
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .08em;
      padding: 6px 16px;
      border-radius: 4px;
      opacity: 0;
      transition: opacity .2s;
      white-space: nowrap;
      pointer-events: none;
      font-family: 'JetBrains Mono', monospace;
    }
  </style>
</head>

<body>
  <div class="page-label">// /glitch — OGP 1200×630</div>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    const __TWEAKS_STYLE = `
      .twk-panel{position:fixed;right:16px;bottom:16px;z-index:2147483646;width:280px;max-height:calc(100vh - 32px);display:flex;flex-direction:column;background:rgba(250,249,247,.78);color:#29261b;-webkit-backdrop-filter:blur(24px) saturate(160%);backdrop-filter:blur(24px) saturate(160%);border:.5px solid rgba(255,255,255,.6);border-radius:14px;box-shadow:0 1px 0 rgba(255,255,255,.5) inset,0 12px 40px rgba(0,0,0,.18);font:11.5px/1.4 ui-sans-serif,system-ui,-apple-system,sans-serif;overflow:hidden}
      .twk-hd{display:flex;align-items:center;justify-content:space-between;padding:10px 8px 10px 14px;cursor:move;user-select:none}
      .twk-hd b{font-size:12px;font-weight:600;letter-spacing:.01em}
      .twk-x{appearance:none;border:0;background:transparent;color:rgba(41,38,27,.55);width:22px;height:22px;border-radius:6px;cursor:default;font-size:13px;line-height:1}
      .twk-x:hover{background:rgba(0,0,0,.06);color:#29261b}
      .twk-body{padding:2px 14px 14px;display:flex;flex-direction:column;gap:10px;overflow-y:auto;overflow-x:hidden;min-height:0;scrollbar-width:thin;scrollbar-color:rgba(0,0,0,.15) transparent}
      .twk-row{display:flex;flex-direction:column;gap:5px}
      .twk-row-h{flex-direction:row;align-items:center;justify-content:space-between;gap:10px}
      .twk-lbl{display:flex;justify-content:space-between;align-items:baseline;color:rgba(41,38,27,.72)}
      .twk-lbl>span:first-child{font-weight:500}
      .twk-val{color:rgba(41,38,27,.5);font-variant-numeric:tabular-nums}
      .twk-sect{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:rgba(41,38,27,.45);padding:10px 0 0}
      .twk-sect:first-child{padding-top:0}
      .twk-field{appearance:none;width:100%;height:26px;padding:0 8px;border:.5px solid rgba(0,0,0,.1);border-radius:7px;background:rgba(255,255,255,.6);color:inherit;font:inherit;outline:none}
      .twk-field:focus{border-color:rgba(0,0,0,.25);background:rgba(255,255,255,.85)}
      select.twk-field{padding-right:22px;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path fill='rgba(0,0,0,.5)' d='M0 0h10L5 6z'/></svg>");background-repeat:no-repeat;background-position:right 8px center}
      .twk-swatch{appearance:none;-webkit-appearance:none;width:56px;height:22px;border:.5px solid rgba(0,0,0,.1);border-radius:6px;padding:0;cursor:default;background:transparent;flex-shrink:0}
      .twk-swatch::-webkit-color-swatch-wrapper{padding:0}
      .twk-swatch::-webkit-color-swatch{border:0;border-radius:5.5px}
    `;

    function useTweaks(defaults) {
      const [values, setValues] = useState(defaults);
      const setTweak = useCallback((keyOrEdits, val) => {
        const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null ? keyOrEdits : { [keyOrEdits]: val };
        setValues(prev => ({ ...prev, ...edits }));
      }, []);
      return [values, setTweak];
    }

    function TweaksPanel({ title = 'Tweaks', children }) {
      const [open, setOpen] = useState(true);
      const dragRef = useRef(null);
      const offsetRef = useRef({ x: 16, y: 16 });
      const PAD = 16;

      const clampToViewport = useCallback(() => {
        const panel = dragRef.current;
        if (!panel) return;
        const w = panel.offsetWidth, h = panel.offsetHeight;
        const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
        const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
        offsetRef.current = {
          x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
          y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y))
        };
        panel.style.right = offsetRef.current.x + 'px';
        panel.style.bottom = offsetRef.current.y + 'px';
      }, []);

      useEffect(() => {
        if (!open) return;
        clampToViewport();
        const ro = new ResizeObserver(clampToViewport);
        ro.observe(document.documentElement);
        return () => ro.disconnect();
      }, [open, clampToViewport]);

      const onDragStart = e => {
        const panel = dragRef.current;
        if (!panel) return;
        const r = panel.getBoundingClientRect();
        const sx = e.clientX, sy = e.clientY;
        const startRight = window.innerWidth - r.right;
        const startBottom = window.innerHeight - r.bottom;
        const move = ev => {
          offsetRef.current = { x: startRight - (ev.clientX - sx), y: startBottom - (ev.clientY - sy) };
          clampToViewport();
        };
        const up = () => {
          window.removeEventListener('mousemove', move);
          window.removeEventListener('mouseup', up);
        };
        window.addEventListener('mousemove', move);
        window.addEventListener('mouseup', up);
      };

      if (!open) {
        return (
          <button type="button" onClick={() => setOpen(true)} style={{ position: 'fixed', right: 16, bottom: 16, zIndex: 2147483646, background: 'rgba(250,249,247,.9)', border: '.5px solid rgba(0,0,0,.12)', borderRadius: 10, padding: '8px 14px', fontFamily: 'ui-sans-serif,system-ui,sans-serif', fontSize: 12, fontWeight: 600, cursor: 'pointer', backdropFilter: 'blur(12px)', boxShadow: '0 4px 16px rgba(0,0,0,.12)' }}>
            Tweaks ✦
          </button>
        );
      }

      return (
        <>
          <style>{__TWEAKS_STYLE}</style>
          <div ref={dragRef} className="twk-panel" style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
            <div className="twk-hd" onMouseDown={onDragStart}>
              <b>{title}</b>
              <button className="twk-x" aria-label="Close tweaks" onMouseDown={e => e.stopPropagation()} onClick={() => setOpen(false)}>✕</button>
            </div>
            <div className="twk-body">{children}</div>
          </div>
        </>
      );
    }

    function TweakSection({ label, children }) {
      return <><div className="twk-sect">{label}</div>{children}</>;
    }

    function TweakRow({ label, value, children, inline = false }) {
      return (
        <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
          <div className="twk-lbl">
            <span>{label}</span>
            {value != null && <span className="twk-val">{value}</span>}
          </div>
          {children}
        </div>
      );
    }

    function TweakSelect({ label, value, options, onChange }) {
      return (
        <TweakRow label={label}>
          <select className="twk-field" value={value} onChange={e => onChange(e.target.value)}>
            {options.map(o => {
              const v = typeof o === 'object' ? o.value : o;
              const l = typeof o === 'object' ? o.label : o;
              return <option key={v} value={v}>{l}</option>;
            })}
          </select>
        </TweakRow>
      );
    }

    function TweakText({ label, value, placeholder, onChange }) {
      return (
        <TweakRow label={label}>
          <input className="twk-field" type="text" value={value} placeholder={placeholder} onChange={e => onChange(e.target.value)} />
        </TweakRow>
      );
    }

    function TweakColor({ label, value, onChange }) {
      return (
        <TweakRow inline label={label}>
          <input type="color" className="twk-swatch" value={value} onChange={e => onChange(e.target.value)} />
        </TweakRow>
      );
    }

    const VARIANTS = ['Terminal', 'Caption', 'Split'];

    const PLACEHOLDER_IMG = "data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='1200' height='630'%3E%3Crect width='1200' height='630' fill='%231d1e1f'/%3E%3Ctext x='50%25' y='50%25' font-size='30' fill='%235a5a72' text-anchor='middle' dominant-baseline='middle' font-family='sans-serif'%3E画像は設定からアップロードできます%3C/text%3E%3C/svg%3E";

    const TWEAK_DEFAULTS = {
      variant: 'Terminal',
      articleNum: '001',
      tag1: 'AI',
      tag2: 'コスト削減',
      readTime: '8分',
      title: 'Claude Code を DeepSeek で動かして\nAPI コストを 95% 削る方法',
      date: '2026.05.01',
      accentColor: '#00e5ff',
      accent2Color: '#ff00ff',
      imageUrl: PLACEHOLDER_IMG
    };

    const TagPill = ({ children, accent = '#ff00ff' }) => (
      <span style={{ display: 'inline-flex', alignItems: 'center', fontFamily: "'JetBrains Mono',monospace", fontSize: '13px', fontWeight: 400, letterSpacing: '0.06em', color: accent, border: `1px solid ${accent}`, borderRadius: '1px', padding: '3px 10px', whiteSpace: 'nowrap' }}>
        {children}
      </span>
    );

    function TerminalDesign({ tweak, num, lines }) {
      return (
        <div style={{ position: 'relative', width: 1200, height: 630, background: '#0d0d0d', overflow: 'hidden', display: 'flex', fontFamily: "'JetBrains Mono',monospace" }}>
          <div style={{ width: '57%', padding: '64px 72px', display: 'flex', flexDirection: 'column', justifyContent: 'space-between', position: 'relative', zIndex: 10 }}>
            <div style={{ color: tweak.accentColor, fontSize: '16px', fontWeight: 700, letterSpacing: '0.05em' }}>/glitch › #{num}</div>
            <h1 style={{ color: '#e8e8f0', fontSize: lines.length > 3 ? '52px' : lines.length > 2 ? '60px' : '70px', fontWeight: 700, lineHeight: 1.3, margin: 0, letterSpacing: '-0.02em', fontFamily: "'Noto Sans JP',sans-serif", whiteSpace: 'pre-wrap' }}>
              {tweak.title}
            </h1>
            <div>
              <div style={{ display: 'flex', gap: '10px', flexWrap: 'wrap', marginBottom: '18px' }}>
                {tweak.tag1 && <TagPill accent={tweak.accent2Color}>{tweak.tag1}</TagPill>}
                {tweak.tag2 && <TagPill accent={tweak.accent2Color}>{tweak.tag2}</TagPill>}
              </div>
              <div style={{ display: 'flex', gap: '24px', alignItems: 'center' }}>
                <span style={{ color: '#5a5a72', fontSize: '13px', fontFamily: "'JetBrains Mono',monospace", letterSpacing: '0.04em' }}>{tweak.date}</span>
                <span style={{ color: '#5a5a72', fontSize: '13px', fontFamily: "'JetBrains Mono',monospace" }}>⊙ {tweak.readTime}</span>
              </div>
            </div>
          </div>
          <div style={{ flex: 1, position: 'relative', backgroundImage: `url(${tweak.imageUrl})`, backgroundSize: 'cover', backgroundPosition: 'center' }}>
            <div style={{ position: 'absolute', top: 0, left: 0, bottom: 0, width: '60px', background: 'linear-gradient(to right, #0d0d0d, transparent)' }}></div>
          </div>
        </div>
      );
    }

    function MonoLightDesign({ tweak, num, lines }) {
      return (
        <div style={{ position: 'relative', width: 1200, height: 630, background: '#09090e', overflow: 'hidden', display: 'flex', flexDirection: 'column', fontFamily: "'JetBrains Mono',monospace" }}>
          <div style={{ flex: '1 0 0', position: 'relative', overflow: 'hidden' }}>
            <div style={{ position: 'absolute', inset: 0, backgroundImage: `url(${tweak.imageUrl})`, backgroundSize: 'cover', backgroundPosition: 'center' }}></div>
            <div style={{ position: 'absolute', top: 0, bottom: 0, left: 0, width: '4px', background: tweak.accentColor }}></div>
            <div style={{ position: 'absolute', bottom: 0, left: 0, right: 0, height: '100px', background: 'linear-gradient(to bottom, transparent, #09090e)' }}></div>
          </div>
          <div style={{ flexShrink: 0, padding: '20px 36px 28px 36px', background: '#09090e', borderLeft: `4px solid ${tweak.accentColor}`, display: 'flex', flexDirection: 'column', gap: '12px' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: '12px' }}>
              <span style={{ fontFamily: "'JetBrains Mono',monospace", fontSize: '13px', fontWeight: 700, color: tweak.accentColor, letterSpacing: '0.06em' }}>/glitch › #{num}</span>
              {tweak.tag1 && <TagPill accent={tweak.accent2Color}>{tweak.tag1}</TagPill>}
              {tweak.tag2 && <TagPill accent={tweak.accent2Color}>{tweak.tag2}</TagPill>}
              <span style={{ marginLeft: 'auto', fontSize: '12px', color: '#5a5a72', fontFamily: "'JetBrains Mono',monospace", letterSpacing: '0.04em' }}>⊙ {tweak.readTime}</span>
            </div>
            <h1 style={{ color: '#e8e8f0', fontSize: lines.length > 1 ? '42px' : '48px', fontWeight: 700, lineHeight: 1.35, margin: 0, letterSpacing: '-0.02em', fontFamily: "'Noto Sans JP',sans-serif", whiteSpace: 'pre-wrap' }}>
              {tweak.title}
            </h1>
          </div>
        </div>
      );
    }

    function SplitDesign({ tweak, num, lines }) {
      return (
        <div style={{ position: 'relative', width: 1200, height: 630, background: '#09090e', overflow: 'hidden', display: 'flex', fontFamily: "'JetBrains Mono',monospace" }}>
          <div style={{ flex: '0 0 876px', position: 'relative', backgroundImage: `url(${tweak.imageUrl})`, backgroundSize: 'cover', backgroundPosition: 'center' }}>
            <div style={{ position: 'absolute', top: 0, right: 0, bottom: 0, width: '60px', background: 'linear-gradient(to right, transparent, #09090e)' }}></div>
          </div>
          <div style={{ flex: 1, background: '#09090e', padding: '36px 28px', display: 'flex', flexDirection: 'column', justifyContent: 'space-between' }}>
            <div>
              <div style={{ color: tweak.accentColor, fontSize: '13px', fontWeight: 700, letterSpacing: '0.06em', marginBottom: '5px' }}>/glitch</div>
              <div style={{ color: '#5a5a72', fontSize: '11px', letterSpacing: '0.04em' }}>Gray Area Hacks.</div>
            </div>
            <div>
              <div style={{ color: tweak.accentColor, fontSize: '108px', fontWeight: 700, lineHeight: 0.9, letterSpacing: '-0.03em', fontFamily: "'JetBrains Mono',monospace", marginBottom: '20px' }}>
                #{num}
              </div>
              <h1 style={{ color: '#e8e8f0', fontSize: lines.length > 2 ? '19px' : '22px', fontWeight: 700, lineHeight: 1.6, margin: '0 0 20px', letterSpacing: '-0.01em', fontFamily: "'Noto Sans JP',sans-serif", whiteSpace: 'pre-wrap' }}>
                {tweak.title}
              </h1>
              <div style={{ display: 'flex', flexDirection: 'column', gap: '8px' }}>
                {tweak.tag1 && <TagPill accent={tweak.accent2Color}>{tweak.tag1}</TagPill>}
                {tweak.tag2 && <TagPill accent={tweak.accent2Color}>{tweak.tag2}</TagPill>}
              </div>
            </div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: '5px' }}>
              <div style={{ color: '#5a5a72', fontSize: '11px', letterSpacing: '0.04em' }}>{tweak.date}</div>
              <div style={{ color: '#5a5a72', fontSize: '11px' }}>⊙ {tweak.readTime}</div>
            </div>
          </div>
        </div>
      );
    }

    function ArticleDesign({ tweak }) {
      const num = String(tweak.articleNum).padStart(3, '0');
      const lines = tweak.title.split(/\\n|\n/).filter(Boolean);

      switch (tweak.variant) {
        case 'Terminal': return <TerminalDesign tweak={tweak} num={num} lines={lines} />;
        case 'Caption': return <MonoLightDesign tweak={tweak} num={num} lines={lines} />;
        default: return <SplitDesign tweak={tweak} num={num} lines={lines} />;
      }
    }

    function App() {
      const [tweak, setTweak] = useTweaks(TWEAK_DEFAULTS);
      const containerRef = useRef(null);
      const [scale, setScale] = useState(1);
      const [saving, setSaving] = useState(null);
      const imgInputRef = useRef(null);

      useEffect(() => {
        const resize = () => {
          if (!containerRef.current) return;
          const parentW = containerRef.current.parentElement.clientWidth;
          setScale(Math.min(parentW - 32, 1200) / 1200);
        };
        resize();
        window.addEventListener('resize', resize);
        return () => window.removeEventListener('resize', resize);
      }, []);

      const downloadAs = async fmt => {
        setSaving(fmt);
        await new Promise(r => setTimeout(r, 50));
        const tmp = document.createElement('div');
        tmp.style.cssText = 'position:absolute;top:-9999px;left:-9999px;width:1200px;height:630px;overflow:hidden;';
        document.body.appendChild(tmp);
        const tmpRoot = ReactDOM.createRoot(tmp);
        tmpRoot.render(<ArticleDesign tweak={tweak} />);

        await document.fonts.ready;
        try {
          const bgMap = { 'Terminal': '#0d0d0d', 'Caption': '#09090e', 'Split': '#09090e' };
          const canvas = await html2canvas(tmp, {
            width: 1200, height: 630, scale: 2,
            backgroundColor: bgMap[tweak.variant],
            useCORS: true, logging: false
          });
          const mime = fmt === 'png' ? 'image/png' : 'image/webp';
          const a = document.createElement('a');
          a.href = canvas.toDataURL(mime, fmt === 'png' ? undefined : 0.92);
          a.download = `ogp-${tweak.articleNum}.${fmt}`;
          a.click();
        } catch (e) {
          alert('画像生成に失敗しました: ' + e.message);
        } finally {
          tmpRoot.unmount();
          document.body.removeChild(tmp);
          setSaving(null);
        }
      };

      const handleImageUpload = e => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = ev => setTweak('imageUrl', ev.target.result);
        reader.readAsDataURL(file);
        e.target.value = '';
      };

      return (
        <>
          <div className="tab-bar">
            {VARIANTS.map(v => (
              <button key={v} className={`tab-btn${tweak.variant === v ? ' active' : ''}`} onClick={() => setTweak('variant', v)}>
                {v}
              </button>
            ))}
          </div>

          <div ref={containerRef} className="canvas-wrap" style={{ width: 1200 * scale, height: 630 * scale }}>
            <div className="canvas-scale" style={{ transform: `scale(${scale})`, width: 1200, height: 630 }}>
              <ArticleDesign tweak={tweak} />
            </div>
            <div className="img-hover-wrap" onClick={() => imgInputRef.current?.click()}>
              <span className="img-hover-label">画像を変更</span>
            </div>
            <input ref={imgInputRef} type="file" accept="image/*" style={{ display: 'none' }} onChange={handleImageUpload} />
          </div>

          <div className="dl-row">
            <button className="dl-btn png" onClick={() => downloadAs('png')} disabled={!!saving}>
              {saving === 'png' ? '生成中…' : '↓ PNG'}
            </button>
            <button className="dl-btn webp" onClick={() => downloadAs('webp')} disabled={!!saving}>
              {saving === 'webp' ? '生成中…' : '↓ WebP'}
            </button>
          </div>

          <TweaksPanel title="Tweaks">
            <TweakSection label="記事情報" />
            <TweakText label="記事番号" value={tweak.articleNum} onChange={v => setTweak('articleNum', v)} />
            <TweakText label="タグ1" value={tweak.tag1} onChange={v => setTweak('tag1', v)} />
            <TweakText label="タグ2" value={tweak.tag2} onChange={v => setTweak('tag2', v)} />
            <TweakText label="読了時間" value={tweak.readTime} onChange={v => setTweak('readTime', v)} />
            <TweakText label="日付" value={tweak.date} onChange={v => setTweak('date', v)} />

            <TweakSection label="タイトル" />
            <TweakText label="タイトル（\nで改行）" value={tweak.title} onChange={v => setTweak('title', v)} />

            <TweakSection label="スタイル" />
            <TweakColor label="アクセントカラー 1" value={tweak.accentColor} onChange={v => setTweak('accentColor', v)} />
            <TweakColor label="アクセントカラー 2" value={tweak.accent2Color} onChange={v => setTweak('accent2Color', v)} />
            <TweakSelect label="バリアント" value={tweak.variant} options={VARIANTS} onChange={v => setTweak('variant', v)} />

            <TweakSection label="背景画像" />
            <label style={{ display: 'block', padding: '6px 12px', background: '#111', color: '#fff', borderRadius: '6px', textAlign: 'center', cursor: 'pointer', fontWeight: 'bold', fontSize: '12px' }}>
              画像をアップロード
              <input type="file" accept="image/*" style={{ display: 'none' }} onChange={handleImageUpload} />
            </label>
          </TweaksPanel>
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>

</html>
