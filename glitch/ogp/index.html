    const TagPill = ({ children }) => (
      <span style={{
        display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
        background: '#1d1e1f', color: '#f3f4f6', fontSize: '16px', fontWeight: 700,
        borderRadius: '100px', height: '44px', padding: '0 24px', whiteSpace: 'nowrap'
      }}>
        {children}
      </span>
    );

    function App() {
      const [tweak, setTweak] = useTweaks(TWEAK_DEFAULTS);

      // Split title manually so we can handle multi-line inputs explicitly in SVG
      const lines = tweak.title.split('\n').filter(Boolean);

      const ArticleDesign = () => (
        <div style={{
          position: 'relative', width: 1200, height: 630,
          backgroundColor: '#f3f4f6', color: '#111827', fontFamily: "'Noto Sans JP', sans-serif",
          overflow: 'hidden',
          display: 'flex', flexDirection: 'column'
        }}>

          {/* Decorative dots grid (Background) */}
          <div style={{
            position: 'absolute', top: 0, left: 0, right: 0, bottom: 0,
            opacity: 0.05,
            backgroundImage: `radial-gradient(${tweak.accentColor} 2px, transparent 2px)`,
            backgroundSize: '30px 30px'
          }} />

          {/* Layout variant: Overlap */}
          {tweak.variant === 'overlap' && (
            <>
              {/* Large image background */}
              <div style={{
                position: 'absolute', top: 0, left: 0, right: 0, bottom: 0,
                backgroundImage: `url(${tweak.imageUrl})`, backgroundSize: 'cover', backgroundPosition: 'center',
                opacity: 0.15, filter: 'grayscale(100%) blur(4px)'
              }} />

              <div style={{ flex: 1, display: 'flex', alignItems: 'center', padding: '0 80px', zIndex: 10 }}>
                {/* The main card container */}
                <div style={{
                  background: '#fff', borderRadius: '32px', padding: '64px',
                  width: '100%', boxShadow: '0 24px 60px rgba(0,0,0,0.08)',
                  border: `4px solid ${tweak.accentColor}`,
                  position: 'relative'
                }}>
                  <div style={{
                    position: 'absolute', top: '-24px', left: '64px',
                    background: tweak.accentColor, color: '#000', padding: '8px 24px',
                    borderRadius: '12px', fontSize: '20px', fontWeight: 900, letterSpacing: '0.1em',
                    fontFamily: "'JetBrains Mono', monospace"
                  }}>
                    {tweak.articleNum}
                  </div>

                  <div style={{ display: 'flex', gap: '16px', marginBottom: '32px' }}>
                    {tweak.tag1 && <TagPill>{tweak.tag1}</TagPill>}
                    {tweak.tag2 && <TagPill>{tweak.tag2}</TagPill>}
                    <span style={{
                      display: 'inline-flex', alignItems: 'center', color: '#6b7280', fontSize: '18px', fontWeight: 700, marginLeft: 'auto'
                    }}>
                      ⏱ {tweak.readTime}
                    </span>
                  </div>

                  <h1 style={{
                    fontSize: lines.length > 2 ? '54px' : '64px',
                    fontWeight: 900, lineHeight: 1.35, margin: '0 0 40px', letterSpacing: '-0.02em',
                    whiteSpace: 'pre-wrap'
                  }}>
                    {tweak.title}
                  </h1>

                  <div style={{ display: 'flex', alignItems: 'center', gap: '16px' }}>
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke={tweak.accentColor} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                      <circle cx="12" cy="12" r="10"></circle><polyline points="12 16 16 12 12 8"></polyline><line x1="8" y1="12" x2="16" y2="12"></line>
                    </svg>
                    <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: '24px', fontWeight: 700, color: '#4b5563' }}>
                      {tweak.date}
                    </span>
                  </div>
                </div>
              </div>
            </>
          )}

          {/* Layout variant: Split */}
          {tweak.variant === 'split' && (
            <div style={{ display: 'flex', height: '100%', zIndex: 10 }}>
              <div style={{
                flex: '1.2', padding: '80px', display: 'flex', flexDirection: 'column',
                justifyContent: 'center', background: '#fff'
              }}>
                <div style={{
                  display: 'inline-block', background: '#f3f4f6', color: '#374151', padding: '8px 24px',
                  borderRadius: '8px', fontSize: '18px', fontWeight: 900, letterSpacing: '0.1em',
                  fontFamily: "'JetBrains Mono', monospace", marginBottom: '32px', width: 'fit-content',
                  borderLeft: `6px solid ${tweak.accentColor}`
                }}>
                  ARTICLE {tweak.articleNum}
                </div>

                <h1 style={{
                  fontSize: lines.length > 2 ? '50px' : '58px',
                  fontWeight: 900, lineHeight: 1.4, margin: '0 0 32px', letterSpacing: '-0.02em',
                  whiteSpace: 'pre-wrap'
                }}>
                  {tweak.title}
                </h1>

                <div style={{ display: 'flex', gap: '12px', marginBottom: '48px', flexWrap: 'wrap' }}>
                  {tweak.tag1 && <TagPill>{tweak.tag1}</TagPill>}
                  {tweak.tag2 && <TagPill>{tweak.tag2}</TagPill>}
                </div>

                <div style={{ marginTop: 'auto', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                  <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: '20px', fontWeight: 700, color: '#6b7280' }}>
                    {tweak.date}
                  </span>
                  <span style={{ color: '#6b7280', fontSize: '18px', fontWeight: 700 }}>
                    ⏱ {tweak.readTime}
                  </span>
                </div>
              </div>
              <div style={{
                flex: '0.8', backgroundImage: `url(${tweak.imageUrl})`, backgroundSize: 'cover', backgroundPosition: 'center',
                position: 'relative'
              }}>
                <div style={{ position: 'absolute', top: 0, left: 0, bottom: 0, width: '20px', background: tweak.accentColor }} />
              </div>
            </div>
          )}
        </div>
      );

      const containerRef = useRef(null);
      const [scale, setScale] = useState(1);

      useEffect(() => {
        const handleResize = () => {
          if (containerRef.current) {
            const parentW = containerRef.current.parentElement.clientWidth;
            const targetW = Math.min(parentW - 32, 1200);
            setScale(targetW / 1200);
          }
        };
        handleResize();
        window.addEventListener('resize', handleResize);
        return () => window.removeEventListener('resize', handleResize);
      }, []);

      const [saving, setSaving] = useState(false);
      const handleDownload = async () => {
        setSaving(true);
        // Give UI a tick to show saving state
        await new Promise(r => setTimeout(r, 50));

        // Create a temporary un-scaled container to capture at exactly 1200x630
        const tempNode = document.createElement('div');
        tempNode.style.position = 'absolute';
        tempNode.style.top = '-9999px';
        tempNode.style.left = '-9999px';
        tempNode.style.width = '1200px';
        tempNode.style.height = '630px';
        document.body.appendChild(tempNode);

        // We use ReactDOM to render the pure component into the temp DOM
        const { createRoot } = ReactDOM;
        const root = createRoot(tempNode);
        root.render(<ArticleDesign />);

        // Wait for render
        await new Promise(r => setTimeout(r, 200));

        try {
          const canvas = await html2canvas(tempNode, {
            width: 1200, height: 630, scale: 2, // 2x for retina sharpness
            backgroundColor: '#f3f4f6',
            useCORS: true // if loading external images
          });

          const url = canvas.toDataURL('image/jpeg', 0.9);
          const a = document.createElement('a');
          a.href = url;
          a.download = `ogp-${tweak.articleNum}.jpg`;
          a.click();
        } catch (e) {
          console.error(e);
          alert('画像生成に失敗しました');
        } finally {
          root.unmount();
          document.body.removeChild(tempNode);
          setSaving(false);
        }
      };

      const handleImageUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          setTweak('imageUrl', event.target.result);
        };
        reader.readAsDataURL(file);
      };

      return (
        <>
          <div ref={containerRef} className="canvas-wrap" style={{ width: 1200 * scale, height: 630 * scale }}>
            <div className="canvas-scale" style={{ transform: `scale(${scale})`, width: 1200, height: 630 }}>
              <ArticleDesign />
            </div>
          </div>

          <button className="dl-btn" onClick={handleDownload} disabled={saving}>
            {saving ? 'GENERATING...' : 'DOWNLOAD JPG'}
          </button>

          <TweaksPanel title="OGP Generator">
            <TweakSection label="Layout" />
            <TweakRadio label="Variant" value={tweak.variant} options={['overlap', 'split']} onChange={v => setTweak('variant', v)} />
            <TweakColor label="Accent" value={tweak.accentColor} onChange={v => setTweak('accentColor', v)} />

            <TweakSection label="Content" />
            <TweakText label="Title (use \n for breaks)" value={tweak.title} onChange={v => setTweak('title', v)} />
            <TweakText label="Article #" value={tweak.articleNum} onChange={v => setTweak('articleNum', v)} />
            <TweakText label="Tag 1" value={tweak.tag1} onChange={v => setTweak('tag1', v)} />
            <TweakText label="Tag 2" value={tweak.tag2} onChange={v => setTweak('tag2', v)} />
            <TweakText label="Read Time" value={tweak.readTime} onChange={v => setTweak('readTime', v)} />
            <TweakText label="Date" value={tweak.date} onChange={v => setTweak('date', v)} />

            <TweakSection label="Background Image" />
            <div style={{ marginTop: 8 }}>
              <label style={{
                display: 'block', padding: '6px 12px', background: '#000', color: '#fff',
                borderRadius: '6px', textAlign: 'center', cursor: 'pointer', fontWeight: 'bold'
              }}>
                Upload Image
                <input type="file" accept="image/*" style={{ display: 'none' }} onChange={handleImageUpload} />
              </label>
            </div>
          </TweaksPanel>
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>

</html>
