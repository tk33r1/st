<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ASCII Roguelike</title>
<style>
  :root {
    --theme-color: #4ade80;
    --bg-color: #000000;
    --enemy-color: #ef4444;
    --map-color: #777777;
    --normal-color: #bbbbbb;
    --white-color: #ffffff;
  }

  body {
    background-color: var(--bg-color);
    color: var(--normal-color);
    font-family: 'Courier New', Consolas, monospace;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    overflow: hidden;
    user-select: none;
    touch-action: none; /* 全体のデフォルトのスワイプを防止 */
  }

  #game-wrapper {
    position: relative;
    border: 1px solid var(--normal-color);
    padding: 20px;
    background-color: var(--bg-color);
    box-shadow: 0 0 15px rgba(170, 170, 170, 0.15);
    display: flex;
    flex-direction: column;
    max-width: 100vw;
    max-height: 100vh;
    box-sizing: border-box;
  }

  #status-bar {
    font-size: 18px;
    margin-bottom: 10px;
    border-bottom: 1px dashed var(--normal-color);
    padding-bottom: 10px;
    flex-shrink: 0;
  }

  /* スクロール用のコンテナ */
  #screen-container {
    width: 100%;
    overflow: auto;
    touch-action: pan-x pan-y; /* この中だけスワイプでのスクロールを許可 */
    flex-grow: 1; /* 縦幅を最大限使う */
    position: relative;
    cursor: pointer;
  }

  /* Chrome/Safari等のスクロールバーのカスタマイズ */
  #screen-container::-webkit-scrollbar { width: 8px; height: 8px; }
  #screen-container::-webkit-scrollbar-track { background: var(--bg-color); }
  #screen-container::-webkit-scrollbar-thumb { background: var(--map-color); border-radius: 4px; }

  #game-screen {
    line-height: 1.1;
    font-size: 18px;
    letter-spacing: 0.1em;
    margin: 0;
    padding: 10px;
    white-space: pre;
    display: inline-block; /* 中身のサイズに合わせて広がるように */
  }

  .visible { opacity: 1.0; }
  .explored { opacity: 0.35; }
  
  .color-player { color: var(--theme-color); }
  .color-artifact { color: var(--theme-color); font-weight: bold; }
  .color-enemy { color: var(--enemy-color); font-weight: bold; }
  .color-map { color: var(--map-color); }
  .color-stairs { color: var(--white-color); font-weight: bold; }
  .color-trap { color: var(--enemy-color); }
  .color-golden { color: #fbbf24; font-weight: bold; text-shadow: 0 0 5px rgba(251, 191, 36, 0.6); }

  .color-good { color: var(--theme-color); }
  .color-bad { color: var(--enemy-color); }
  .color-normal { color: var(--normal-color); }
  .color-white { color: var(--white-color); }

  @keyframes damageFlash {
    0% { background-color: rgba(239, 68, 68, 0.4); }
    100% { background-color: transparent; }
  }
  .damage-flash {
    animation: damageFlash 0.3s ease-out;
  }

  @keyframes shake {
    0% { transform: translate(1px, 1px) rotate(0deg); }
    20% { transform: translate(-3px, 0px) rotate(1deg); }
    40% { transform: translate(1px, -1px) rotate(1deg); }
    60% { transform: translate(-3px, 1px) rotate(0deg); }
    80% { transform: translate(-1px, -1px) rotate(1deg); }
    100% { transform: translate(1px, -2px) rotate(-1deg); }
  }
  .shake {
    animation: shake 0.3s;
  }

  #title-screen {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background-color: var(--bg-color);
    z-index: 20;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    cursor: pointer;
  }
  .title-main {
    color: var(--theme-color);
    font-size: 48px;
    font-weight: bold;
    letter-spacing: 0.1em;
    text-shadow: 0 0 10px rgba(74, 222, 128, 0.5);
    text-align: center;
  }
  .title-art {
    font-size: 24px;
    line-height: 1.2;
    margin-bottom: 20px;
    text-align: center;
    letter-spacing: 0.2em;
    font-weight: bold;
  }
  .title-sub {
    color: var(--normal-color);
    font-size: 16px;
    margin-bottom: 40px;
    letter-spacing: 0.1em;
    margin-top: 15px;
  }
  .blink {
    color: var(--white-color);
    font-size: 20px;
    animation: blink 1.5s infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  
  #log-window {
    margin-top: 10px;
    border-top: 1px dashed var(--normal-color);
    padding-top: 10px;
    height: 6em;
    overflow: hidden;
    font-size: 16px;
    flex-shrink: 0;
  }

  #help-bar {
    margin-top: 10px;
    font-size: 14px;
    color: var(--map-color);
    text-align: center;
    flex-shrink: 0;
  }

  #overlay {
    display: none;
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0, 0, 0, 0.85);
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 10;
    padding: 20px;
    text-align: center;
  }

  #overlay-msg {
    font-size: 24px;
    margin-bottom: 30px;
    line-height: 1.5;
  }

  .btn {
    display: inline-block;
    border: 1px solid var(--theme-color);
    padding: 15px 30px;
    color: var(--theme-color);
    text-decoration: none;
    font-size: 20px;
    cursor: pointer;
    background: transparent;
    font-family: inherit;
    transition: all 0.2s;
  }

  .btn:hover, .btn:focus {
    background: var(--theme-color);
    color: var(--bg-color);
    outline: none;
  }

  #retry-btn {
    border-color: var(--normal-color);
    color: var(--normal-color);
  }
  #retry-btn:hover, #retry-btn:focus {
    background: var(--normal-color);
    color: var(--bg-color);
  }

  /* 画面幅が狭いデバイス（スマホなど）用のスタイル */
  @media (max-width: 768px) {
    #game-wrapper {
      width: 100vw;
      height: 100vh;
      border: none;
      padding: 10px;
    }
    #screen-container {
      border: 1px solid var(--map-color);
      margin-bottom: 5px;
    }
    #game-screen {
      font-size: 24px; /* スマホではフォントを拡大表示してスワイプ可能にする */
    }
    #status-bar {
      font-size: 14px;
    }
    #log-window {
      font-size: 14px;
      height: 4.5em;
    }
    #help-bar {
      font-size: 12px;
    }
    .title-main {
      font-size: 28px;
    }
    .title-art {
      font-size: 16px;
      margin-bottom: 10px;
    }
    .title-sub {
      font-size: 12px;
    }
    .blink {
      font-size: 16px;
    }
  }
</style>
</head>
<body>

<div id="game-wrapper">
  <div id="status-bar"></div>
  <!-- スワイプ＆タップ操作の基盤となるコンテナ -->
  <div id="screen-container">
    <pre id="game-screen"></pre>
  </div>
  <div id="log-window"></div>
  <div id="help-bar">Move: [Arrows] or Tap Screen | Swipe to look around</div>

  <!-- タイトル画面 -->
  <div id="title-screen">
    <pre class="title-art">
<span class="color-map">#########</span>
<span class="color-map">#</span><span class="color-player">@</span><span class="color-map">.</span><span class="color-white">/</span><span class="color-map">...</span><span class="color-enemy">S</span><span class="color-map">#</span>
<span class="color-map">#.#####.#</span>
<span class="color-map">#</span><span class="color-trap">^</span><span class="color-map">.</span><span class="color-white">*</span><span class="color-map">#</span><span class="color-enemy">D</span><span class="color-map">.</span><span class="color-artifact">₿</span><span class="color-map">#</span>
<span class="color-map">#########</span>
    </pre>
    <div class="title-main">ASCII Roguelike</div>
    <div class="title-sub">Find the hidden 1 Trillion BITCOIN YEN</div>
    <div class="blink">> TAP OR PRESS ANY KEY TO START</div>
  </div>

  <!-- ゲームクリア・ゲームオーバー時のオーバーレイUI -->
  <div id="overlay">
    <div id="overlay-msg"></div>
    <a href="https://tk.st/bitcoinyen/certification" target="_blank" id="reward-btn" class="btn">[ Get 1 trillion BITCOIN YEN ]</a>
    <button id="retry-btn" class="btn" style="display:none; margin-top: 20px;">[ Retry ]</button>
  </div>
</div>

<script>
// --- ゲーム定数 ---
const MAP_W = 60;
const MAP_H = 20;
const FOV_RADIUS = 7;
const MAX_ROOMS = 8;
const ROOM_MIN = 4;
const ROOM_MAX = 9;

// --- ゲーム状態管理 ---
let gameState = 'TITLE'; // TITLE, START, PLAYING, CLEAR, GAMEOVER
let map = [];
let visibility = []; // 0: 未探索, 1: 探索済み(暗), 2: 視界内(明)
let rooms = [];
let enemies = [];
let items = []; // アイテムリスト
let logs = [];
let artifact = { x: -1, y: -1 };
let stairs = { x: -1, y: -1 };
let turn = 0;
let kills = 0;
let floor = 1;

let player = {
  x: 0, y: 0,
  hp: 15, maxHp: 15,
  atk: 3,
  char: '@',
  level: 1,
  exp: 0,
  maxExp: 15
};

const ENEMY_TYPES = [
  { char: 'S', name: 'Slime', hp: 4, atk: 1, exp: 3 },
  { char: 'G', name: 'Goblin', hp: 8, atk: 3, exp: 6 },
  { char: 'D', name: 'Dragon', hp: 16, atk: 5, exp: 12 }
];

// --- ユーティリティ ---
function getRandomItem(x, y) {
  let rand = Math.random();
  if (rand < 0.5) return { x, y, type: 'potion', char: '*', name: 'Potion' };
  if (rand < 0.7) return { x, y, type: 'sword', char: '/', name: 'Sword' };
  if (rand < 0.9) return { x, y, type: 'shield', char: '[', name: 'Shield' };
  return { x, y, type: 'scroll', char: '?', name: 'Magic Map' };
}

// --- 初期化とマップ生成 ---
function init() {
  document.getElementById('title-screen').style.display = 'none';
  document.getElementById('overlay').style.display = 'none';
  gameState = 'PLAYING';
  
  // プレイヤー初期化
  player.level = 1;
  player.exp = 0;
  player.maxExp = 15;
  player.maxHp = 15;
  player.hp = player.maxHp;
  player.atk = 3;

  floor = 1;
  turn = 0;
  kills = 0;
  logs = [];
  
  logMessage(`<span class="color-normal">Welcome to the ASCII Roguelike.</span>`);
  
  generateFloor();
}

function generateFloor() {
  enemies = [];
  items = [];
  rooms = [];
  generateMap();
  calcFOV();
  draw();
  updateStatus();
  
  // マップ生成時にプレイヤーが画面中心にくるようにスクロール
  setTimeout(scrollToPlayerCenter, 50); 
}

function generateMap() {
  // マップと視界配列を初期化
  for (let y = 0; y < MAP_H; y++) {
    map[y] = new Array(MAP_W).fill('#');
    visibility[y] = new Array(MAP_W).fill(0);
  }

  // 部屋の生成
  for (let i = 0; i < MAX_ROOMS; i++) {
    let w = Math.floor(Math.random() * (ROOM_MAX - ROOM_MIN)) + ROOM_MIN;
    let h = Math.floor(Math.random() * (ROOM_MAX - ROOM_MIN)) + ROOM_MIN;
    let x = Math.floor(Math.random() * (MAP_W - w - 2)) + 1;
    let y = Math.floor(Math.random() * (MAP_H - h - 2)) + 1;
    
    let newRoom = { x, y, w, h };
    let failed = false;
    for (let r of rooms) {
      if (newRoom.x <= r.x + r.w + 1 && newRoom.x + newRoom.w + 1 >= r.x &&
          newRoom.y <= r.y + r.h + 1 && newRoom.y + newRoom.h + 1 >= r.y) {
        failed = true; break;
      }
    }
    
    if (!failed) {
      // 部屋を床(.)にする
      for (let ry = y; ry < y + h; ry++) {
        for (let rx = x; rx < x + w; rx++) {
          map[ry][rx] = '.';
        }
      }
      
      // 前の部屋と通路で繋ぐ
      if (rooms.length > 0) {
        let prev = rooms[rooms.length - 1];
        let cx1 = Math.floor(prev.x + prev.w / 2);
        let cy1 = Math.floor(prev.y + prev.h / 2);
        let cx2 = Math.floor(newRoom.x + newRoom.w / 2);
        let cy2 = Math.floor(newRoom.y + newRoom.h / 2);
        
        if (Math.random() < 0.5) {
          createHCorridor(cx1, cx2, cy1);
          createVCorridor(cy1, cy2, cx2);
        } else {
          createVCorridor(cy1, cy2, cx1);
          createHCorridor(cx1, cx2, cy2);
        }
      }
      rooms.push(newRoom);
    }
  }

  // ドア(+)の簡易配置（部屋の境界の通路部分）
  for (let r of rooms) {
    for (let x = r.x; x < r.x + r.w; x++) {
      if (map[r.y - 1] && map[r.y - 1][x] === '.') map[r.y - 1][x] = '+';
      if (map[r.y + r.h] && map[r.y + r.h][x] === '.') map[r.y + r.h][x] = '+';
    }
    for (let y = r.y; y < r.y + r.h; y++) {
      if (map[y][r.x - 1] === '.') map[y][r.x - 1] = '+';
      if (map[y][r.x + r.w] === '.') map[y][r.x + r.w] = '+';
    }
  }

  // ゴール(₿)と階段(>)の配置 (最後の部屋)
  artifact = { x: -1, y: -1 };
  stairs = { x: -1, y: -1 };
  let lastRoom = rooms[rooms.length - 1];
  let targetX = Math.floor(lastRoom.x + lastRoom.w / 2);
  let targetY = Math.floor(lastRoom.y + lastRoom.h / 2);

  // 階層によるGoalの出現確率
  let goalChance = 0;
  if (floor === 1) goalChance = 0.0;
  else if (floor === 2) goalChance = 0.25;
  else if (floor === 3) goalChance = 0.50;
  else if (floor === 4) goalChance = 0.75;
  else goalChance = 1.0;

  if (Math.random() < goalChance) {
    artifact = { x: targetX, y: targetY };
    if(floor === 1) logMessage(`<span class="color-good">Find the Bitcoin '₿' to escape!</span>`);
  } else {
    stairs = { x: targetX, y: targetY };
    if(floor === 1) logMessage(`<span class="color-normal">Find the Stairs '>' to go deeper.</span>`);
  }

  // プレイヤーの配置 (最初の部屋)
  player.x = Math.floor(rooms[0].x + rooms[0].w / 2);
  player.y = Math.floor(rooms[0].y + rooms[0].h / 2);

  // 敵の配置 (最初の部屋以外)
  for (let i = 1; i < rooms.length; i++) {
    let r = rooms[i];
    
    // トラップの配置（30%の確率で部屋に配置）
    if (Math.random() < 0.3) {
      let tx = Math.floor(Math.random() * r.w) + r.x;
      let ty = Math.floor(Math.random() * r.h) + r.y;
      if (map[ty][tx] === '.' && !(tx === artifact.x && ty === artifact.y) && !(tx === stairs.x && ty === stairs.y) && !(tx === player.x && ty === player.y)) {
         map[ty][tx] = '^';
      }
    }

    // 階層が深くなるほど敵の数が増えやすい。
    let enemyCount = Math.floor(Math.random() * 4) + Math.floor(floor / 2) + 3; 
    for (let e = 0; e < enemyCount; e++) {
      let ex = Math.floor(Math.random() * r.w) + r.x;
      let ey = Math.floor(Math.random() * r.h) + r.y;
      if ((map[ey][ex] === '.' || map[ey][ex] === '^') && !(ex === artifact.x && ey === artifact.y) && !(ex === stairs.x && ey === stairs.y)) {
        
        let slimeChance = Math.max(0, 0.70 - (floor - 1) * 0.175);
        let goblinChance = 0.30;
        
        let r_enemy = Math.random();
        let typeTemplate;
        let isGolden = false;

        if (r_enemy < slimeChance) {
          typeTemplate = ENEMY_TYPES.find(ent => ent.char === 'S');
        } else if (r_enemy < slimeChance + goblinChance) {
          typeTemplate = ENEMY_TYPES.find(ent => ent.char === 'G');
          if (Math.random() < 0.30) {
             isGolden = true;
          }
        } else {
          typeTemplate = ENEMY_TYPES.find(ent => ent.char === 'D');
        }

        let enemyObj = { 
          x: ex, y: ey, 
          hp: typeTemplate.hp, 
          atk: typeTemplate.atk, 
          char: typeTemplate.char, 
          name: typeTemplate.name, 
          exp: typeTemplate.exp,
          isGolden: isGolden
        };

        if (isGolden) {
          enemyObj.name = 'Golden Goblin';
          enemyObj.exp = 24;
        }

        enemies.push(enemyObj);
      }
    }

    // アイテムの配置 (最初の部屋以外に50%の確率で)
    if (i !== 0 && Math.random() < 0.5) {
      let ix = Math.floor(Math.random() * r.w) + r.x;
      let iy = Math.floor(Math.random() * r.h) + r.y;
      if ((map[iy][ix] === '.' || map[iy][ix] === '^') && !(ix === artifact.x && iy === artifact.y) && !(ix === stairs.x && iy === stairs.y)) {
        items.push(getRandomItem(ix, iy));
      }
    }
  }
}

function createHCorridor(x1, x2, y) {
  for (let x = Math.min(x1, x2); x <= Math.max(x1, x2); x++) {
    if (map[y][x] === '#') map[y][x] = '.';
  }
}

function createVCorridor(y1, y2, x) {
  for (let y = Math.min(y1, y2); y <= Math.max(y1, y2); y++) {
    if (map[y][x] === '#') map[y][x] = '.';
  }
}

// --- 視界 (FOV) 計算 ---
function calcFOV() {
  for (let y = 0; y < MAP_H; y++) {
    for (let x = 0; x < MAP_W; x++) {
      if (visibility[y][x] === 2) visibility[y][x] = 1;
    }
  }
  
  visibility[player.y][player.x] = 2;
  for (let angle = 0; angle < 360; angle += 2) {
    let rad = angle * Math.PI / 180;
    let dx = Math.cos(rad);
    let dy = Math.sin(rad);
    
    let ox = player.x + 0.5;
    let oy = player.y + 0.5;
    
    for (let r = 0; r < FOV_RADIUS; r++) {
      let tx = Math.floor(ox + dx * r);
      let ty = Math.floor(oy + dy * r);
      
      if (tx < 0 || ty < 0 || tx >= MAP_W || ty >= MAP_H) break;
      visibility[ty][tx] = 2;
      
      if (map[ty][tx] === '#' || map[ty][tx] === '+') break;
    }
  }
}

// --- ロジックとターン進行 ---
function handleInput(key) {
  if (gameState !== 'PLAYING') return;
  
  let dx = 0, dy = 0;
  if (key === 'ArrowUp' || key === 'k') dy = -1;
  else if (key === 'ArrowDown' || key === 'j') dy = 1;
  else if (key === 'ArrowLeft' || key === 'h') dx = -1;
  else if (key === 'ArrowRight' || key === 'l') dx = 1;
  else return; 

  let targetX = player.x + dx;
  let targetY = player.y + dy;

  let enemy = enemies.find(e => e.hp > 0 && e.x === targetX && e.y === targetY);
  
  if (enemy) {
    enemy.hp -= player.atk;
    logMessage(`<span class="color-good">You strike ${enemy.name} for ${player.atk} damage.</span>`);
    if (enemy.hp <= 0) {
      logMessage(`<span class="color-good">${enemy.name} is defeated! (+${enemy.exp} EXP)</span>`);
      
      if (enemy.isGolden) {
         items.push(getRandomItem(enemy.x, enemy.y));
         logMessage(`<span class="color-good">${enemy.name} dropped an item!</span>`);
      }

      enemies = enemies.filter(e => e.hp > 0);
      kills++;
      
      player.exp += enemy.exp;
      if (player.exp >= player.maxExp) {
        levelUp();
      }
    }
  } else if (map[targetY] && (map[targetY][targetX] === '.' || map[targetY][targetX] === '+' || map[targetY][targetX] === '^')) {
    if (map[targetY][targetX] === '+') {
      map[targetY][targetX] = '.';
      logMessage(`<span class="color-normal">You opened a door.</span>`);
    } else if (map[targetY][targetX] === '^') {
      player.hp -= 5;
      logMessage(`<span class="color-bad">You stepped on a trap! Took 5 damage.</span>`);
      triggerDamageFlash();
      map[targetY][targetX] = '.'; 
      if (player.hp <= 0) {
        player.x = targetX;
        player.y = targetY;
        draw(); updateStatus();
        gameOver();
        return;
      }
    }
    player.x = targetX;
    player.y = targetY;
  } else {
    return;
  }

  turn++;

  let itemIndex = items.findIndex(i => i.x === player.x && i.y === player.y);
  if (itemIndex !== -1) {
    let item = items[itemIndex];
    if (item.type === 'potion') {
      let heal = 15;
      player.hp = Math.min(player.maxHp, player.hp + heal);
      logMessage(`<span class="color-good">You drank a ${item.name}! Recovered ${heal} HP.</span>`);
    } else if (item.type === 'sword') {
      player.atk += 1;
      logMessage(`<span class="color-good">You equipped a ${item.name}! Atk +1.</span>`);
    } else if (item.type === 'shield') {
      player.maxHp += 5;
      player.hp += 5;
      logMessage(`<span class="color-good">You equipped a ${item.name}! Max HP +5.</span>`);
    } else if (item.type === 'scroll') {
      for (let y = 0; y < MAP_H; y++) {
        for (let x = 0; x < MAP_W; x++) {
          if (visibility[y][x] === 0) visibility[y][x] = 1;
        }
      }
      logMessage(`<span class="color-good">You read a ${item.name}! The floor layout is revealed.</span>`);
    }
    items.splice(itemIndex, 1);
  }

  if (artifact.x !== -1 && player.x === artifact.x && player.y === artifact.y) {
    gameClear();
    return;
  }

  if (stairs.x !== -1 && player.x === stairs.x && player.y === stairs.y) {
    floor++;
    logMessage(`<span class="color-normal">You descend to Floor ${floor}...</span>`);
    generateFloor();
    return;
  }

  enemiesTurn();

  calcFOV();
  draw();
  updateStatus();
  
  // 移動後にプレイヤーが画面外に出そうなら自動スクロール
  scrollToPlayerIfNeeded();
}

// --- キーボード入力 ---
window.addEventListener('keydown', (e) => {
  if (gameState === 'TITLE') {
    init();
    return;
  }
  if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(e.key)) {
    e.preventDefault();
  }
  handleInput(e.key);
});

// --- タップ＆スワイプ入力処理 ---
let isDragging = false;
let startX, startY;
const gameScreen = document.getElementById('game-screen');
const screenContainer = document.getElementById('screen-container');

gameScreen.addEventListener('pointerdown', (e) => {
  isDragging = false;
  startX = e.clientX;
  startY = e.clientY;
});

gameScreen.addEventListener('pointermove', (e) => {
  // 10px以上指が動いたらスワイプ（スクロール）と判定し、タップ移動はキャンセルする
  if (Math.abs(e.clientX - startX) > 10 || Math.abs(e.clientY - startY) > 10) {
    isDragging = true;
  }
});

gameScreen.addEventListener('pointerup', (e) => {
  if (isDragging) return; // スワイプ時は移動処理をしない

  if (gameState !== 'PLAYING') return;

  // タップした座標から、プレイヤーのどちらの方向をタップしたかを判定
  let rect = gameScreen.getBoundingClientRect();
  let tapX = e.clientX - rect.left;
  let tapY = e.clientY - rect.top;

  let cellW = rect.width / MAP_W;
  let cellH = rect.height / MAP_H;

  let targetX = Math.floor(tapX / cellW);
  let targetY = Math.floor(tapY / cellH);

  let dx = targetX - player.x;
  let dy = targetY - player.y;

  if (dx === 0 && dy === 0) return; // プレイヤー自身をタップした場合は無視

  // より差が大きい軸の方向へ1歩進む
  let key = '';
  if (Math.abs(dx) > Math.abs(dy)) {
    key = dx > 0 ? 'ArrowRight' : 'ArrowLeft';
  } else {
    key = dy > 0 ? 'ArrowDown' : 'ArrowUp';
  }
  handleInput(key);
});

// タイトル画面全体をタップ可能に
document.getElementById('title-screen').addEventListener('click', () => {
  if (gameState === 'TITLE') init();
});


// --- スクロール追従機能 ---
function scrollToPlayerCenter() {
  let cellW = gameScreen.clientWidth / MAP_W;
  let cellH = gameScreen.clientHeight / MAP_H;
  let playerPixX = player.x * cellW + cellW / 2;
  let playerPixY = player.y * cellH + cellH / 2;
  
  screenContainer.scrollLeft = playerPixX - screenContainer.clientWidth / 2;
  screenContainer.scrollTop = playerPixY - screenContainer.clientHeight / 2;
}

function scrollToPlayerIfNeeded() {
  let cellW = gameScreen.clientWidth / MAP_W;
  let cellH = gameScreen.clientHeight / MAP_H;
  let playerPixX = player.x * cellW;
  let playerPixY = player.y * cellH;
  let padX = cellW * 3; // 画面端から3マス分余裕を持つ
  let padY = cellH * 3;

  if (playerPixX < screenContainer.scrollLeft + padX) {
    screenContainer.scrollLeft = playerPixX - padX;
  } else if (playerPixX > screenContainer.scrollLeft + screenContainer.clientWidth - padX - cellW) {
    screenContainer.scrollLeft = playerPixX - screenContainer.clientWidth + padX + cellW;
  }

  if (playerPixY < screenContainer.scrollTop + padY) {
    screenContainer.scrollTop = playerPixY - padY;
  } else if (playerPixY > screenContainer.scrollTop + screenContainer.clientHeight - padY - cellH) {
    screenContainer.scrollTop = playerPixY - screenContainer.clientHeight + padY + cellH;
  }
}

function enemiesTurn() {
  for (let enemy of enemies) {
    if (enemy.hp <= 0) continue;
    
    if (visibility[enemy.y][enemy.x] === 2) {
      let dx = player.x - enemy.x;
      let dy = player.y - enemy.y;
      
      if (Math.abs(dx) + Math.abs(dy) === 1) {
        player.hp -= enemy.atk;
        logMessage(`<span class="color-bad">${enemy.name} hits you for ${enemy.atk} damage!</span>`);
        triggerDamageFlash();
        if (player.hp <= 0) {
          draw(); updateStatus();
          gameOver();
          return;
        }
      } else {
        let stepX = 0, stepY = 0;
        if (Math.abs(dx) > Math.abs(dy)) stepX = Math.sign(dx);
        else stepY = Math.sign(dy);
        
        if (isPassableForEnemy(enemy.x + stepX, enemy.y + stepY)) {
          enemy.x += stepX;
          enemy.y += stepY;
        } else {
          stepX = stepY === 0 ? Math.sign(dx) : 0;
          stepY = stepX === 0 ? Math.sign(dy) : 0;
          if (stepX !== 0 || stepY !== 0) {
            if (isPassableForEnemy(enemy.x + stepX, enemy.y + stepY)) {
              enemy.x += stepX;
              enemy.y += stepY;
            }
          }
        }
      }
    }
  }
}

function isPassableForEnemy(x, y) {
  if (x < 0 || y < 0 || x >= MAP_W || y >= MAP_H) return false;
  if (map[y][x] === '#') return false; 
  if (map[y][x] === '+') return false; 
  if (map[y][x] === '^') return false; 
  if (player.x === x && player.y === y) return false;
  if (enemies.some(e => e.hp > 0 && e.x === x && e.y === y)) return false;
  return true;
}

function levelUp() {
  player.level++;
  player.exp -= player.maxExp;
  player.maxExp = Math.floor(player.maxExp * 1.8); 
  player.maxHp += 5;
  player.hp = player.maxHp; 
  player.atk += 1;
  logMessage(`<span class="color-good">LEVEL UP! You are now Lvl ${player.level}! (HP restored)</span>`);
  triggerDamageFlash(); 
}

function triggerDamageFlash() {
  const wrapper = document.getElementById('game-wrapper');
  wrapper.classList.remove('damage-flash', 'shake');
  void wrapper.offsetWidth; 
  wrapper.classList.add('damage-flash', 'shake');
}

// --- 描画とUI ---
function draw() {
  let html = '';
  for (let y = 0; y < MAP_H; y++) {
    let rowHtml = '';
    for (let x = 0; x < MAP_W; x++) {
      let vis = visibility[y][x];
      
      if (vis === 0) {
        rowHtml += '<span> </span>'; 
        continue;
      }

      let char = map[y][x];
      let colorClass = 'color-map';
      
      if (char === '^') {
         colorClass = 'color-trap';
      }

      let item = items.find(i => i.x === x && i.y === y);
      if (item) {
        char = item.char;
        colorClass = 'color-white';
      }

      if (stairs.x === x && stairs.y === y) {
        char = '>';
        colorClass = 'color-stairs';
      }

      if (artifact.x !== -1 && artifact.x === x && artifact.y === y) {
        char = '₿';
        colorClass = 'color-artifact';
      }
      
      let enemy = enemies.find(e => e.hp > 0 && e.x === x && e.y === y);
      if (enemy) {
        char = enemy.char;
        colorClass = enemy.isGolden ? 'color-golden' : 'color-enemy';
      }
      
      if (player.x === x && player.y === y) {
        char = player.char;
        colorClass = 'color-player';
      }

      let cls = vis === 2 ? 'visible' : 'explored';
      rowHtml += `<span class="${cls} ${colorClass}">${char}</span>`;
    }
    html += rowHtml + '\n';
  }
  document.getElementById('game-screen').innerHTML = html;
  
  let logHtml = '';
  for (let i = 0; i < logs.length; i++) {
    let opacity = 0.4 + (i / (logs.length - 1 || 1)) * 0.6; 
    logHtml += `<div style="opacity: ${opacity}">> ${logs[i]}</div>`;
  }
  document.getElementById('log-window').innerHTML = logHtml;
}

function updateStatus() {
  let hpColorClass = player.hp <= 5 ? 'color-bad' : 'color-white';
  let goalText = artifact.x !== -1 ? `<span class="color-good">Bitcoin '₿'</span>` : `<span class="color-white">Stairs '>'</span>`;
  
  document.getElementById('status-bar').innerHTML = 
    `HP: <span class="${hpColorClass}">${Math.max(0, player.hp)}/${player.maxHp}</span> | Lvl: ${player.level} | EXP: ${player.exp}/${player.maxExp} | Atk: ${player.atk} | Floor: ${floor} | Goal: ${goalText}`;
}

function logMessage(msg) {
  logs.push(msg);
  if (logs.length > 5) logs.shift();
}

// --- ハイスコア管理 (Cloudflare Tunnel & 自宅サーバー) ---
// ※ Cloudflare Tunnelで公開したご自宅のサーバーのURLに変更してください
const API_URL = 'https://your-tunnel-name.your-domain.com/scores';

async function getHighScores() {
  try {
    const response = await fetch(API_URL);
    if (!response.ok) throw new Error('Failed to fetch');
    const data = await response.json();
    return data || [];
  } catch (error) {
    console.error('Failed to get scores:', error);
    return [];
  }
}

async function saveHighScore(currentTurn) {
  const date = new Date();
  const dateStr = `${date.getFullYear()}/${(date.getMonth() + 1).toString().padStart(2, '0')}/${date.getDate().toString().padStart(2, '0')}`;
  const timestamp = Date.now();
  const newScore = { turns: currentTurn, date: dateStr, timestamp: timestamp };

  try {
    const response = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(newScore)
    });
    
    if (!response.ok) throw new Error('Failed to save');
    const data = await response.json();
    return { scores: data, currentTimestamp: timestamp };
  } catch (error) {
    console.error('Error saving score:', error);
    // API通信エラー時は、仮として今回のスコアだけを表示する
    return { scores: [newScore], currentTimestamp: timestamp };
  }
}

async function gameClear() {
  gameState = 'CLEAR';
  const overlay = document.getElementById('overlay');
  const msg = document.getElementById('overlay-msg');
  const btn = document.getElementById('reward-btn');
  const retryBtn = document.getElementById('retry-btn');
  
  overlay.style.display = 'flex';
  // 通信中用のLoading画面を表示
  msg.innerHTML = `<span class="color-good">=== QUEST COMPLETE ===</span><br><br>You have retrieved the BITCOIN YEN!<br>
<span style="font-size: 20px; font-weight: bold; margin-top: 10px; display: block;">Clear Turns: <span class="color-player">${turn}</span></span>
<br><div style="color: var(--normal-color); margin-top: 20px;">Saving and loading Global Leaderboard...</div><br>`;
  
  // APIを通じてハイスコアを保存・取得 (非同期通信)
  const result = await saveHighScore(turn);
  const highScores = result.scores;
  const currentTimestamp = result.currentTimestamp;
  
  // ランキングUIの構築
  let leaderboardHtml = `<div style="text-align: left; display: inline-block; margin-top: 15px; background: rgba(0,0,0,0.7); padding: 15px; border: 1px solid var(--map-color); border-radius: 8px;">`;
  leaderboardHtml += `<div style="color: var(--white-color); font-weight: bold; margin-bottom: 10px; text-align: center; letter-spacing: 0.1em;">--- GLOBAL FASTEST CLEARS ---</div>`;
  
  if (highScores.length === 0) {
     leaderboardHtml += `<div style="color: var(--normal-color); text-align: center;">No data</div>`;
  } else {
    highScores.forEach((score, index) => {
      let rankColor = 'var(--normal-color)';
      if (index === 0) rankColor = '#fbbf24'; // 1位はゴールド
      else if (index === 1) rankColor = '#9ca3af'; // 2位はシルバー
      else if (index === 2) rankColor = '#b45309'; // 3位はブロンズ
      
      let isCurrent = (score.timestamp === currentTimestamp); 
      
      let bgColor = isCurrent ? 'background-color: rgba(74, 222, 128, 0.2);' : '';
      leaderboardHtml += `<div style="color: ${rankColor}; ${bgColor} padding: 4px 8px; font-family: monospace; font-size: 18px;">`;
      leaderboardHtml += `${index + 1}. ${score.turns.toString().padStart(4, ' ')} turns <span style="font-size: 12px; opacity: 0.7;">(${score.date})</span> ${isCurrent ? '<span class="color-player">← YOU!</span>' : ''}`;
      leaderboardHtml += `</div>`;
    });
  }
  leaderboardHtml += `</div>`;

  // 通信完了後、ランキングを含めたリザルト画面に更新
  msg.innerHTML = `<span class="color-good">=== QUEST COMPLETE ===</span><br><br>You have retrieved the BITCOIN YEN!<br>
<span style="font-size: 20px; font-weight: bold; margin-top: 10px; display: block;">Clear Turns: <span class="color-player">${turn}</span></span>
<pre style="color: var(--theme-color); font-size: 18px; line-height: 1.2; text-align: left; display: inline-block; margin-top: 10px;">
      __________
     /         /|
    /_________/ |
   | .-------. ||
   | | [ ₿ ] | ||
   | '-------' |/
   '-----------'
</pre><br>${leaderboardHtml}<br>`;
  btn.style.display = 'inline-block';
  retryBtn.style.display = 'none';
  btn.focus(); 
}

function gameOver() {
  gameState = 'GAMEOVER';
  const overlay = document.getElementById('overlay');
  const msg = document.getElementById('overlay-msg');
  const btn = document.getElementById('reward-btn');
  const retryBtn = document.getElementById('retry-btn');
  
  overlay.style.display = 'flex';
  msg.innerHTML = `<span class="color-bad">=== GAME OVER ===<br><br>You have perished in the dungeon...</span>`;
  btn.style.display = 'none';
  retryBtn.style.display = 'inline-block';
  retryBtn.focus(); 
}

document.getElementById('retry-btn').addEventListener('click', init);

</script>
