<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ASCII Roguelike</title>
  <link rel="icon" href="https://tk.st/images/favicons/ascii-roguelike-favicon.png" type="image/png">
  <link rel="canonical" href="https://tk.st/bitcoinyen/ascii-roguelike/">
  <meta property="og:title" content="ASCII Roguelike">
  <meta property="og:description" content="ASCIIアートのローグライクゲーム。ビットコイン円を探してダンジョンを攻略しよう">
  <meta property="og:image" content="https://tk.st/images/ogp/ascii-roguelike-ogp.png">
  <meta property="og:url" content="https://tk.st/bitcoinyen/ascii-roguelike/">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
<style>
  * {
    -webkit-tap-highlight-color: transparent;
  }

  :root {
    --theme-color: #4ade80;
    --bg-color: #000000;
    --enemy-color: #ef4444;
    --map-color: #777777;
    --normal-color: #bbbbbb;
    --white-color: #ffffff;
  }

  body {
    background-color: var(--bg-color);
    color: var(--normal-color);
    font-family: 'Courier New', Consolas, monospace;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    height: 100dvh;
    margin: 0;
    overflow: hidden;
    user-select: none;
    touch-action: none;
  }

  #game-wrapper {
    position: relative;
    border: 1px solid var(--normal-color);
    padding: 20px;
    background-color: var(--bg-color);
    box-shadow: 0 0 15px rgba(170, 170, 170, 0.15);
    display: flex;
    flex-direction: column;
    width: 100%;
    max-width: 100vw;
    height: 100vh;
    height: 100dvh;
    box-sizing: border-box;
  }

  #status-bar {
    font-size: 18px;
    margin-bottom: 10px;
    border-bottom: 1px dashed var(--normal-color);
    padding-bottom: 10px;
    flex-shrink: 0;
  }

  #screen-container {
    width: 100%;
    overflow: auto;
    touch-action: pan-x pan-y;
    flex-grow: 1;
    min-height: 0;
    position: relative;
    cursor: pointer;
  }

  #screen-container::-webkit-scrollbar { width: 8px; height: 8px; }
  #screen-container::-webkit-scrollbar-track { background: var(--bg-color); }
  #screen-container::-webkit-scrollbar-thumb { background: var(--map-color); border-radius: 4px; }

  #game-screen {
    line-height: 1.1;
    font-size: 18px;
    letter-spacing: 0.1em;
    margin: 0;
    padding: 10px;
    white-space: pre;
    display: inline-block;
  }

  .visible { opacity: 1.0; }
  .explored { opacity: 0.35; }
  
  .color-player { color: var(--theme-color); }
  .color-artifact { color: var(--theme-color); font-weight: bold; }
  .color-enemy { color: var(--enemy-color); font-weight: bold; }
  .color-map { color: var(--map-color); }
  .color-stairs { color: var(--white-color); font-weight: bold; }
  .color-trap { color: var(--enemy-color); }
  .color-golden { color: #fbbf24; font-weight: bold; text-shadow: 0 0 5px rgba(251, 191, 36, 0.6); }

  .color-good { color: var(--theme-color); }
  .color-bad { color: var(--enemy-color); }
  .color-normal { color: var(--normal-color); }
  .color-white { color: var(--white-color); }

  /* ダメージエフェクト */
  @keyframes damageFlash {
    0% { background-color: rgba(239, 68, 68, 0.4); }
    100% { background-color: transparent; }
  }
  .damage-flash { animation: damageFlash 0.3s ease-out; }

  /* 回復・レベルアップエフェクト */
  @keyframes healFlash {
    0% { background-color: rgba(74, 222, 128, 0.3); }
    100% { background-color: transparent; }
  }
  .heal-flash { animation: healFlash 0.4s ease-out; }

  @keyframes shake {
    0% { transform: translate(1px, 1px) rotate(0deg); }
    20% { transform: translate(-3px, 0px) rotate(1deg); }
    40% { transform: translate(1px, -1px) rotate(1deg); }
    60% { transform: translate(-3px, 1px) rotate(0deg); }
    80% { transform: translate(-1px, -1px) rotate(1deg); }
    100% { transform: translate(1px, -2px) rotate(-1deg); }
  }
  .shake { animation: shake 0.3s; }

  #title-screen {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background-color: var(--bg-color);
    z-index: 20;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    cursor: pointer;
  }
  .title-main {
    color: var(--theme-color);
    font-size: 48px;
    font-weight: bold;
    letter-spacing: 0.1em;
    text-shadow: 0 0 10px rgba(74, 222, 128, 0.5);
    text-align: center;
  }
  .title-art {
    font-size: 24px;
    line-height: 1.2;
    margin-bottom: 20px;
    text-align: center;
    letter-spacing: 0.2em;
    font-weight: bold;
  }
  .title-sub {
    color: var(--normal-color);
    font-size: 16px;
    margin-bottom: 40px;
    letter-spacing: 0.1em;
    margin-top: 15px;
  }
  .blink {
    color: var(--white-color);
    font-size: 20px;
    animation: blink 1.5s infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  
  #log-window {
    margin-top: 10px;
    border-top: 1px dashed var(--normal-color);
    padding-top: 10px;
    height: 6em;
    overflow: hidden;
    font-size: 16px;
    flex-shrink: 0;
  }

  #help-bar {
    margin-top: 10px;
    font-size: 14px;
    color: var(--map-color);
    text-align: center;
    flex-shrink: 0;
  }

  #overlay {
    display: none;
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0, 0, 0, 0.85);
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 10;
    padding: 20px;
    text-align: center;
  }

  #overlay-msg {
    font-size: 24px;
    margin-bottom: 30px;
    line-height: 1.5;
  }

  .btn {
    display: inline-block;
    border: 1px solid var(--theme-color);
    padding: 15px 30px;
    color: var(--theme-color);
    text-decoration: none;
    font-size: 20px;
    cursor: pointer;
    background: transparent;
    font-family: inherit;
    transition: all 0.2s;
  }

  .btn:hover, .btn:focus {
    background: var(--theme-color);
    color: var(--bg-color);
    outline: none;
  }

  #retry-btn {
    border-color: var(--normal-color);
    color: var(--normal-color);
  }
  #retry-btn:hover, #retry-btn:focus {
    background: var(--normal-color);
    color: var(--bg-color);
  }

  @media (max-width: 768px) {
    #game-wrapper {
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      border: none;
      padding: 10px;
    }
    #screen-container { border: 1px solid var(--map-color); margin-bottom: 5px; }
    #game-screen { font-size: 24px; }
    #status-bar { font-size: 14px; }
    #log-window { font-size: 14px; height: 4.5em; }
    #help-bar { font-size: 12px; }
    .title-main { font-size: 28px; }
    .title-art { font-size: 16px; margin-bottom: 10px; }
    .title-sub { font-size: 12px; }
    .blink { font-size: 16px; }
  }
</style>
</head>
<body>

<div id="game-wrapper">
  <div id="status-bar"></div>
  <div id="screen-container">
    <pre id="game-screen"></pre>
  </div>
  <div id="log-window"></div>
  <div id="help-bar">Move: [Arrows] or Tap | Swipe to scroll</div>

  <div id="title-screen">
    <pre class="title-art">
<span class="color-map">#########</span>
<span class="color-map">#</span><span class="color-player">@</span><span class="color-map">.</span><span class="color-white">/</span><span class="color-map">...</span><span class="color-enemy">S</span><span class="color-map">#</span>
<span class="color-map">#.#####.#</span>
<span class="color-map">#</span><span class="color-trap">^</span><span class="color-map">.</span><span class="color-white">*</span><span class="color-map">#</span><span class="color-enemy">D</span><span class="color-map">.</span><span class="color-artifact">₿</span><span class="color-map">#</span>
<span class="color-map">#########</span>
    </pre>
    <div class="title-main">ASCII Roguelike</div>
    <div class="title-sub">Find the hidden 1 Trillion BITCOIN YEN</div>
    <div class="blink">> TAP OR PRESS ANY KEY TO START</div>
  </div>

  <div id="overlay">
    <div id="overlay-msg"></div>
    <button id="submit-score-btn" class="btn" style="display:none; margin-top: 10px;">Submit Score</button>
    <a href="https://tk.st/bitcoinyen/certification" target="_blank" id="reward-btn" class="btn" style="display:none; margin-top: 20px;">[ Get 1 trillion BITCOIN YEN ]</a>
    <button id="retry-btn" class="btn" style="display:none; margin-top: 20px;">[ Retry ]</button>
  </div>
</div>

<script>
// --- ゲーム定数 ---
const MAP_W = 60, MAP_H = 20;
const FOV_RADIUS = 7;
const MAX_ROOMS = 8, ROOM_MIN = 4, ROOM_MAX = 9;

// Cloudflare Workers のエンドポイント (ご自身の環境に合わせて変更してください)
const API_URL = 'https://your-worker-name.your-subdomain.workers.dev/scores';

// --- ゲーム状態管理 ---
let gameState = 'TITLE'; // TITLE, PLAYING, CLEAR, GAMEOVER
let map = [], visibility = [], rooms = [], enemies = [], items = [], logs = [];
let artifact = { x: -1, y: -1 };
let stairs = { x: -1, y: -1 };
let turn = 0, floor = 1;
let sessionHighScores = []; // インメモリでのランキング保存用 (APIエラー時のフォールバック用)

let player = {
  x: 0, y: 0,
  hp: 15, maxHp: 15,
  atk: 3, char: '@',
  level: 1, exp: 0, maxExp: 15
};

const ENEMY_TYPES = [
  { char: 'S', name: 'Slime', hp: 4, atk: 1, exp: 3 },
  { char: 'G', name: 'Goblin', hp: 8, atk: 3, exp: 6 },
  { char: 'D', name: 'Dragon', hp: 16, atk: 5, exp: 12 }
];

// --- ユーティリティ ---
function getRandomItem(x, y) {
  const rand = Math.random();
  if (rand < 0.45) return { x, y, type: 'potion', char: '*', name: 'Potion' };
  if (rand < 0.65) return { x, y, type: 'sword', char: '/', name: 'Sword' };
  if (rand < 0.85) return { x, y, type: 'shield', char: '[', name: 'Shield' };
  if (rand < 0.95) return { x, y, type: 'scroll', char: '?', name: 'Magic Map' };
  return { x, y, type: 'ring', char: '=', name: 'Power Ring' }; // 新アイテム追加
}

function randInt(min, max) {
  return Math.floor(Math.random() * (max - min)) + min;
}

// --- API連携 (スコア保存・取得) ---
async function getHighScores() {
  try {
    const response = await fetch(API_URL);
    if (!response.ok) throw new Error('Network response was not ok');
    return await response.json();
  } catch (error) {
    console.warn('API fetch failed, falling back to local session data.', error);
    return sessionHighScores;
  }
}

async function saveHighScore(currentTurn, playerName) {
  const date = new Date();
  const dateStr = `${date.getFullYear()}/${(date.getMonth() + 1).toString().padStart(2, '0')}/${date.getDate().toString().padStart(2, '0')}`;
  const newScore = { turns: currentTurn, date: dateStr, timestamp: Date.now(), name: playerName };

  try {
    const response = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(newScore)
    });
    
    if (!response.ok) throw new Error('Network response was not ok');
    return await response.json();
  } catch (error) {
    console.warn('API save failed, saving to local session instead.', error);
    // API送信に失敗した場合はローカルの配列に保存して、疑似的にランキングデータを返す
    sessionHighScores.push(newScore);
    sessionHighScores.sort((a, b) => a.turns - b.turns);
    return sessionHighScores;
  }
}

// --- 初期化とマップ生成 ---
function init() {
  document.getElementById('title-screen').style.display = 'none';
  document.getElementById('overlay').style.display = 'none';
  gameState = 'PLAYING';
  
  Object.assign(player, { level: 1, exp: 0, maxExp: 15, maxHp: 15, hp: 15, atk: 3 });
  floor = 1; turn = 0; logs = [];
  
  logMessage(`<span class="color-normal">Welcome to the ASCII Roguelike.</span>`);
  generateFloor();
}

function generateFloor() {
  enemies = []; items = []; rooms = [];
  generateMap();
  calcFOV();
  draw();
  updateStatus();
  setTimeout(scrollToPlayerCenter, 50); 
}

function generateMap() {
  // 初期化
  for (let y = 0; y < MAP_H; y++) {
    map[y] = new Array(MAP_W).fill('#');
    visibility[y] = new Array(MAP_W).fill(0);
  }

  // 部屋の生成
  for (let i = 0; i < MAX_ROOMS; i++) {
    let w = randInt(ROOM_MIN, ROOM_MAX);
    let h = randInt(ROOM_MIN, ROOM_MAX);
    let x = randInt(1, MAP_W - w - 1);
    let y = randInt(1, MAP_H - h - 1);
    
    let newRoom = { x, y, w, h };
    let failed = rooms.some(r => 
      newRoom.x <= r.x + r.w + 1 && newRoom.x + newRoom.w + 1 >= r.x &&
      newRoom.y <= r.y + r.h + 1 && newRoom.y + newRoom.h + 1 >= r.y
    );
    
    if (!failed) {
      for (let ry = y; ry < y + h; ry++) {
        for (let rx = x; rx < x + w; rx++) map[ry][rx] = '.';
      }
      
      if (rooms.length > 0) {
        let prev = rooms[rooms.length - 1];
        let cx1 = Math.floor(prev.x + prev.w / 2), cy1 = Math.floor(prev.y + prev.h / 2);
        let cx2 = Math.floor(newRoom.x + newRoom.w / 2), cy2 = Math.floor(newRoom.y + newRoom.h / 2);
        
        if (Math.random() < 0.5) {
          createHCorridor(cx1, cx2, cy1); createVCorridor(cy1, cy2, cx2);
        } else {
          createVCorridor(cy1, cy2, cx1); createHCorridor(cx1, cx2, cy2);
        }
      }
      rooms.push(newRoom);
    }
  }

  // ドア配置
  rooms.forEach(r => {
    for (let x = r.x; x < r.x + r.w; x++) {
      if (map[r.y - 1]?.[x] === '.') map[r.y - 1][x] = '+';
      if (map[r.y + r.h]?.[x] === '.') map[r.y + r.h][x] = '+';
    }
    for (let y = r.y; y < r.y + r.h; y++) {
      if (map[y][r.x - 1] === '.') map[y][r.x - 1] = '+';
      if (map[y][r.x + r.w] === '.') map[y][r.x + r.w] = '+';
    }
  });

  // 目標配置
  artifact = { x: -1, y: -1 }; stairs = { x: -1, y: -1 };
  let lastRoom = rooms[rooms.length - 1];
  let targetX = Math.floor(lastRoom.x + lastRoom.w / 2);
  let targetY = Math.floor(lastRoom.y + lastRoom.h / 2);

  let goalChance = (floor - 1) * 0.25;
  if (Math.random() < goalChance || floor >= 5) {
    artifact = { x: targetX, y: targetY };
    if(floor === 1) logMessage(`<span class="color-good">Find the Bitcoin '₿' to escape!</span>`);
  } else {
    stairs = { x: targetX, y: targetY };
    if(floor === 1) logMessage(`<span class="color-normal">Find the Stairs '>' to go deeper.</span>`);
  }

  // プレイヤー配置
  player.x = Math.floor(rooms[0].x + rooms[0].w / 2);
  player.y = Math.floor(rooms[0].y + rooms[0].h / 2);

  // 敵・アイテム・罠の配置
  for (let i = 1; i < rooms.length; i++) {
    let r = rooms[i];
    
    // トラップ
    if (Math.random() < 0.3) {
      let tx = randInt(r.x, r.x + r.w), ty = randInt(r.y, r.y + r.h);
      if (map[ty][tx] === '.' && !isSpecialTile(tx, ty)) map[ty][tx] = '^';
    }

    // 敵
    let enemyCount = randInt(0, 4) + Math.floor(floor / 2) + 2; 
    for (let e = 0; e < enemyCount; e++) {
      let ex = randInt(r.x, r.x + r.w), ey = randInt(r.y, r.y + r.h);
      if ((map[ey][ex] === '.' || map[ey][ex] === '^') && !isSpecialTile(ex, ey)) {
        let typeTemplate = ENEMY_TYPES[2]; // Default Dragon
        let rand = Math.random();
        let isGolden = false;

        if (rand < Math.max(0, 0.70 - (floor - 1) * 0.15)) typeTemplate = ENEMY_TYPES[0]; // Slime
        else if (rand < 0.95) {
            typeTemplate = ENEMY_TYPES[1]; // Goblin
            isGolden = Math.random() < 0.2;
        }

        enemies.push({ 
          x: ex, y: ey, 
          ...typeTemplate, 
          name: isGolden ? 'Golden Goblin' : typeTemplate.name,
          exp: isGolden ? 24 : typeTemplate.exp,
          isGolden
        });
      }
    }

    // アイテム
    if (Math.random() < 0.5) {
      let ix = randInt(r.x, r.x + r.w), iy = randInt(r.y, r.y + r.h);
      if ((map[iy][ix] === '.' || map[iy][ix] === '^') && !isSpecialTile(ix, iy)) {
        items.push(getRandomItem(ix, iy));
      }
    }
  }
}

function isSpecialTile(x, y) {
    return (x === artifact.x && y === artifact.y) || (x === stairs.x && y === stairs.y) || (x === player.x && y === player.y);
}

function createHCorridor(x1, x2, y) {
  for (let x = Math.min(x1, x2); x <= Math.max(x1, x2); x++) if (map[y][x] === '#') map[y][x] = '.';
}

function createVCorridor(y1, y2, x) {
  for (let y = Math.min(y1, y2); y <= Math.max(y1, y2); y++) if (map[y][x] === '#') map[y][x] = '.';
}

// --- 視界 (FOV) 計算 ---
function calcFOV() {
  for (let y = 0; y < MAP_H; y++) {
    for (let x = 0; x < MAP_W; x++) {
      if (visibility[y][x] === 2) visibility[y][x] = 1;
    }
  }
  
  visibility[player.y][player.x] = 2;
  for (let angle = 0; angle < 360; angle += 2) {
    let dx = Math.cos(angle * Math.PI / 180), dy = Math.sin(angle * Math.PI / 180);
    let ox = player.x + 0.5, oy = player.y + 0.5;
    
    for (let r = 0; r < FOV_RADIUS; r++) {
      let tx = Math.floor(ox + dx * r), ty = Math.floor(oy + dy * r);
      if (tx < 0 || ty < 0 || tx >= MAP_W || ty >= MAP_H) break;
      visibility[ty][tx] = 2;
      if (map[ty][tx] === '#' || map[ty][tx] === '+') break;
    }
  }
}

// --- ロジックとターン進行 ---
function handleInput(key) {
  if (gameState !== 'PLAYING') return;
  
  let dx = 0, dy = 0;
  if (key === 'ArrowUp' || key === 'k') dy = -1;
  else if (key === 'ArrowDown' || key === 'j') dy = 1;
  else if (key === 'ArrowLeft' || key === 'h') dx = -1;
  else if (key === 'ArrowRight' || key === 'l') dx = 1;
  else return; 

  let targetX = player.x + dx, targetY = player.y + dy;
  let enemy = enemies.find(e => e.hp > 0 && e.x === targetX && e.y === targetY);
  
  if (enemy) {
    // 攻撃処理
    enemy.hp -= player.atk;
    logMessage(`<span class="color-good">You strike ${enemy.name} for ${player.atk} damage.</span>`);
    if (enemy.hp <= 0) {
      logMessage(`<span class="color-good">${enemy.name} is defeated! (+${enemy.exp} EXP)</span>`);
      if (enemy.isGolden) {
         items.push(getRandomItem(enemy.x, enemy.y));
         logMessage(`<span class="color-good">${enemy.name} dropped an item!</span>`);
      }
      player.exp += enemy.exp;
      if (player.exp >= player.maxExp) levelUp();
    }
  } else if (map[targetY]?.[targetX] && ['.', '+', '^'].includes(map[targetY][targetX])) {
    // 移動処理
    if (map[targetY][targetX] === '+') {
      map[targetY][targetX] = '.';
      logMessage(`<span class="color-normal">You opened a door.</span>`);
    } else if (map[targetY][targetX] === '^') {
      player.hp -= 5;
      logMessage(`<span class="color-bad">You stepped on a trap! Took 5 damage.</span>`);
      triggerEffect('damage-flash', 'shake');
      map[targetY][targetX] = '.'; 
      if (player.hp <= 0) return gameOver(targetX, targetY);
    }
    player.x = targetX; player.y = targetY;
  } else {
    return; // 壁など無効な移動
  }

  turn++;
  processItemsOnFloor();

  // ゴール判定
  if (player.x === artifact.x && player.y === artifact.y) return gameClear();
  if (player.x === stairs.x && player.y === stairs.y) {
    floor++;
    logMessage(`<span class="color-normal">You descend to Floor ${floor}...</span>`);
    return generateFloor();
  }

  enemiesTurn();
  if (gameState !== 'PLAYING') return; // 敵のターンで死んだ場合

  calcFOV(); draw(); updateStatus();
  scrollToPlayerIfNeeded();
}

function processItemsOnFloor() {
  let itemIndex = items.findIndex(i => i.x === player.x && i.y === player.y);
  if (itemIndex !== -1) {
    let item = items[itemIndex];
    if (item.type === 'potion') {
      player.hp = Math.min(player.maxHp, player.hp + 15);
      logMessage(`<span class="color-good">You drank a ${item.name}! Recovered HP.</span>`);
      triggerEffect('heal-flash');
    } else if (item.type === 'sword') {
      player.atk += 1;
      logMessage(`<span class="color-good">Equipped ${item.name}! Atk +1.</span>`);
    } else if (item.type === 'shield') {
      player.maxHp += 5; player.hp += 5;
      logMessage(`<span class="color-good">Equipped ${item.name}! Max HP +5.</span>`);
      triggerEffect('heal-flash');
    } else if (item.type === 'ring') {
      player.maxHp += 3; player.hp += 3; player.atk += 1;
      logMessage(`<span class="color-good">Equipped ${item.name}! Power surged!</span>`);
      triggerEffect('heal-flash');
    } else if (item.type === 'scroll') {
      visibility.forEach(row => row.fill(1)); // 全て探索済みに
      logMessage(`<span class="color-good">Read ${item.name}! Map revealed.</span>`);
    }
    items.splice(itemIndex, 1);
  }
}

// --- 入力イベント ---
window.addEventListener('keydown', (e) => {
  if (gameState === 'TITLE') return init();
  if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(e.key)) e.preventDefault();
  handleInput(e.key);
});

let isDragging = false, startX, startY;
const gameScreen = document.getElementById('game-screen');
const screenContainer = document.getElementById('screen-container');

gameScreen.addEventListener('pointerdown', e => { isDragging = false; startX = e.clientX; startY = e.clientY; });
gameScreen.addEventListener('pointermove', e => {
  if (Math.abs(e.clientX - startX) > 10 || Math.abs(e.clientY - startY) > 10) isDragging = true;
});
gameScreen.addEventListener('pointerup', e => {
  if (isDragging || gameState !== 'PLAYING') return;

  let rect = gameScreen.getBoundingClientRect();
  let tapX = e.clientX - rect.left, tapY = e.clientY - rect.top;
  let cellW = rect.width / MAP_W, cellH = rect.height / MAP_H;

  let dx = Math.floor(tapX / cellW) - player.x;
  let dy = Math.floor(tapY / cellH) - player.y;

  if (dx === 0 && dy === 0) return;
  handleInput(Math.abs(dx) > Math.abs(dy) ? (dx > 0 ? 'ArrowRight' : 'ArrowLeft') : (dy > 0 ? 'ArrowDown' : 'ArrowUp'));
});

document.getElementById('title-screen').addEventListener('click', () => { if (gameState === 'TITLE') init(); });

// --- スクロール ---
function scrollToPlayerCenter() {
  let cellW = gameScreen.clientWidth / MAP_W, cellH = gameScreen.clientHeight / MAP_H;
  screenContainer.scrollLeft = (player.x * cellW + cellW / 2) - screenContainer.clientWidth / 2;
  screenContainer.scrollTop = (player.y * cellH + cellH / 2) - screenContainer.clientHeight / 2;
}

function scrollToPlayerIfNeeded() {
  let cellW = gameScreen.clientWidth / MAP_W, cellH = gameScreen.clientHeight / MAP_H;
  let px = player.x * cellW, py = player.y * cellH;
  let padX = cellW * 3, padY = cellH * 3;

  if (px < screenContainer.scrollLeft + padX) screenContainer.scrollLeft = px - padX;
  else if (px > screenContainer.scrollLeft + screenContainer.clientWidth - padX - cellW) screenContainer.scrollLeft = px - screenContainer.clientWidth + padX + cellW;

  if (py < screenContainer.scrollTop + padY) screenContainer.scrollTop = py - padY;
  else if (py > screenContainer.scrollTop + screenContainer.clientHeight - padY - cellH) screenContainer.scrollTop = py - screenContainer.clientHeight + padY + cellH;
}

function enemiesTurn() {
  for (let enemy of enemies) {
    if (enemy.hp <= 0 || visibility[enemy.y][enemy.x] !== 2) continue;
    
    let dx = player.x - enemy.x, dy = player.y - enemy.y;
    if (Math.abs(dx) + Math.abs(dy) === 1) {
      player.hp -= enemy.atk;
      logMessage(`<span class="color-bad">${enemy.name} hits you for ${enemy.atk} damage!</span>`);
      triggerEffect('damage-flash', 'shake');
      if (player.hp <= 0) return gameOver(player.x, player.y);
    } else {
      let stepX = Math.abs(dx) > Math.abs(dy) ? Math.sign(dx) : 0;
      let stepY = stepX === 0 ? Math.sign(dy) : 0;
      
      if (isPassable(enemy.x + stepX, enemy.y + stepY)) {
        enemy.x += stepX; enemy.y += stepY;
      } else {
        stepX = stepY === 0 ? Math.sign(dx) : 0;
        stepY = stepX === 0 ? Math.sign(dy) : 0;
        if ((stepX || stepY) && isPassable(enemy.x + stepX, enemy.y + stepY)) {
          enemy.x += stepX; enemy.y += stepY;
        }
      }
    }
  }
}

function isPassable(x, y) {
  if (x < 0 || y < 0 || x >= MAP_W || y >= MAP_H) return false;
  return !['#', '+', '^'].includes(map[y][x]) && !(player.x === x && player.y === y) && !enemies.some(e => e.hp > 0 && e.x === x && e.y === y);
}

function levelUp() {
  player.level++;
  player.exp -= player.maxExp;
  player.maxExp = Math.floor(player.maxExp * 1.7); // レベルアップに必要な経験値の倍率を1.7倍に修正
  player.maxHp += 5;
  player.hp = player.maxHp; 
  player.atk += 1;
  logMessage(`<span class="color-good">LEVEL UP! You are now Lvl ${player.level}! (HP restored)</span>`);
  triggerEffect('heal-flash'); 
}

function triggerEffect(...classes) {
  const wrapper = document.getElementById('game-wrapper');
  wrapper.classList.remove('damage-flash', 'heal-flash', 'shake');
  void wrapper.offsetWidth; 
  wrapper.classList.add(...classes);
}

// --- 描画 ---
function draw() {
  let html = '';
  for (let y = 0; y < MAP_H; y++) {
    let rowHtml = '';
    for (let x = 0; x < MAP_W; x++) {
      let vis = visibility[y][x];
      if (vis === 0) { rowHtml += '<span> </span>'; continue; }

      let char = map[y][x];
      let colorClass = char === '^' ? 'color-trap' : 'color-map';
      
      let item = items.find(i => i.x === x && i.y === y);
      if (item) { char = item.char; colorClass = 'color-white'; }
      if (stairs.x === x && stairs.y === y) { char = '>'; colorClass = 'color-stairs'; }
      if (artifact.x === x && artifact.y === y) { char = '₿'; colorClass = 'color-artifact'; }
      
      let enemy = enemies.find(e => e.hp > 0 && e.x === x && e.y === y);
      if (enemy) { char = enemy.char; colorClass = enemy.isGolden ? 'color-golden' : 'color-enemy'; }
      if (player.x === x && player.y === y) { char = player.char; colorClass = 'color-player'; }

      rowHtml += `<span class="${vis === 2 ? 'visible' : 'explored'} ${colorClass}">${char}</span>`;
    }
    html += rowHtml + '\n';
  }
  document.getElementById('game-screen').innerHTML = html;
  
  document.getElementById('log-window').innerHTML = logs.map((msg, i) => 
    `<div style="opacity: ${0.4 + (i / (logs.length - 1 || 1)) * 0.6}">> ${msg}</div>`
  ).join('');
}

function updateStatus() {
  let hpColor = player.hp <= 5 ? 'color-bad' : 'color-white';
  let goalText = artifact.x !== -1 ? `<span class="color-good">Bitcoin '₿'</span>` : `<span class="color-white">Stairs '>'</span>`;
  document.getElementById('status-bar').innerHTML = 
    `HP: <span class="${hpColor}">${Math.max(0, player.hp)}/${player.maxHp}</span> | Lvl: ${player.level} | EXP: ${player.exp}/${player.maxExp} | Atk: ${player.atk} | Floor: ${floor} | Goal: ${goalText}`;
}

function logMessage(msg) {
  logs.push(msg);
  if (logs.length > 5) logs.shift();
}

// --- ゲーム終了処理 ---
function gameClear() {
  gameState = 'CLEAR';
  const overlay = document.getElementById('overlay');
  const msg = document.getElementById('overlay-msg');
  
  overlay.style.display = 'flex';
  msg.innerHTML = `<span class="color-good">=== QUEST COMPLETE ===</span><br><br>You have retrieved the BITCOIN YEN!<br>
<span style="font-size: 20px; font-weight: bold; margin-top: 10px; display: block;">Clear Turns: <span class="color-player">${turn}</span></span>
<pre style="color: var(--theme-color); font-size: 18px; line-height: 1.2; text-align: left; display: inline-block; margin-top: 10px;">
      __________
     /         /|
    /_________/ |
   | .-------. ||
   | | [ ₿ ] | ||
   | '-------' |/
   '-----------'
</pre><br><br>
<div style="margin-top: 10px;">
  <input type="text" id="player-name-input" placeholder="Enter your name" maxlength="15" style="padding: 10px; font-size: 18px; font-family: monospace; background: #222; border: 1px solid var(--theme-color); color: var(--white-color); text-align: center; width: 200px; border-radius: 4px; outline: none;">
</div>`;

  const submitBtn = document.getElementById('submit-score-btn');
  submitBtn.style.display = 'inline-block';
  document.getElementById('retry-btn').style.display = 'none';
  document.getElementById('reward-btn').style.display = 'none';

  setTimeout(() => document.getElementById('player-name-input')?.focus(), 100);

  // Cloudflare WorkersのAPIへスコアを送信するように変更
  submitBtn.onclick = async () => {
    let name = document.getElementById('player-name-input').value.trim() || 'Anonymous';
    submitBtn.style.display = 'none';
    
    // 送信中のメッセージ表示
    msg.innerHTML += `<br><div style="color: var(--normal-color); margin-top: 20px; font-size: 16px;">Saving score to leaderboard...</div>`;
    
    const scores = await saveHighScore(turn, name);
    showRanking(scores);
  };
}

function showRanking(scores) {
  const msg = document.getElementById('overlay-msg');
  let html = `<div style="text-align: left; display: inline-block; margin-top: 15px; background: rgba(0,0,0,0.7); padding: 15px; border: 1px solid var(--map-color); border-radius: 8px;">
    <div style="color: var(--white-color); font-weight: bold; margin-bottom: 10px; text-align: center; letter-spacing: 0.1em;">-- LEADERBOARD --</div>`;
  
  const displayScores = scores || sessionHighScores;
  
  if (displayScores.length === 0) {
    html += `<div style="color: var(--normal-color); text-align: center;">No data</div>`;
  } else {
    displayScores.slice(0, 5).forEach((score, i) => {
      let color = i === 0 ? '#fbbf24' : (i === 1 ? '#9ca3af' : (i === 2 ? '#b45309' : 'var(--normal-color)'));
      let dateStr = score.date ? ` <span style="font-size: 12px; opacity: 0.7;">(${score.date})</span>` : '';
      
      html += `<div style="color: ${color}; font-family: monospace; font-size: 18px; padding: 4px;">
        ${i + 1}. ${score.turns.toString().padStart(4, ' ')} turns - <span class="color-white">${score.name}</span>${dateStr}
      </div>`;
    });
  }
  html += `</div>`;

  msg.innerHTML = `<span class="color-good">=== QUEST COMPLETE ===</span><br><br>You have retrieved the BITCOIN YEN!<br>${html}`;
  document.getElementById('retry-btn').style.display = 'none';
  document.getElementById('reward-btn').style.display = 'inline-block';
}

function gameOver(px, py) {
  player.x = px; player.y = py;
  draw(); updateStatus();
  gameState = 'GAMEOVER';
  
  const overlay = document.getElementById('overlay');
  overlay.style.display = 'flex';
  document.getElementById('overlay-msg').innerHTML = `<span class="color-bad">=== GAME OVER ===<br><br>You have perished in the dungeon...</span>`;
  document.getElementById('submit-score-btn').style.display = 'none';
  document.getElementById('reward-btn').style.display = 'none';
  document.getElementById('retry-btn').style.display = 'inline-block';
}

document.getElementById('retry-btn').addEventListener('click', init);
</script>
