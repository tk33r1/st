  <style>
    :root {
      --bg: #fdf6e3;
      --surface: #ffffff;
      --text: #1a1a1a;
      --primary: #e63946;
      --secondary: #ffb703;
      --accent: #1d3557;
      --outline: #000000;
    }

    body {
      margin: 0;
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Architects Daughter', cursive;
      overflow-x: hidden;
    }

    /* 80s Comic Effects */
    .halftone-burst {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background: radial-gradient(circle at 50% 50%, transparent 0%, transparent 60%, rgba(255,183,3,0.1) 60%, rgba(255,183,3,0.1) 100%);
      background-size: 100% 100%;
      opacity: 0.5;
    }

    .bw-mode {
      filter: grayscale(1) contrast(1.2) brightness(1.1);
    }

    .vignette {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(circle at center, transparent 30%, rgba(0, 0, 0, 0.1) 100%);
      z-index: 45;
    }

    /* Background Decorations */
    .decor-layer {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      overflow: hidden;
      opacity: 0.15;
    }

    .decor-pow {
      position: absolute;
      top: 5%;
      right: -2%;
      width: 300px;
      height: 300px;
      transform: rotate(15deg);
    }

    .decor-bam {
      position: absolute;
      bottom: 10%;
      left: -2%;
      width: 250px;
      height: 250px;
      transform: rotate(-10deg);
    }

    .decor-dots {
      position: absolute;
      top: 40%;
      right: 10%;
      width: 200px;
      height: 200px;
      background-image: radial-gradient(var(--outline) 20%, transparent 20%);
      background-size: 15px 15px;
      mask-image: radial-gradient(circle, black, transparent 70%);
    }

    .decor-lines {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(
        45deg,
        transparent,
        transparent 40px,
        rgba(0, 0, 0, 0.05) 40px,
        rgba(0, 0, 0, 0.05) 41px
      );
    }

    /* Comic paper texture */
    .comic-page::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      opacity: 0.04;
      mix-blend-mode: multiply;
      z-index: 50;
    }

    .comic-title {
      font-family: "Bangers", cursive;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--outline);
      -webkit-text-stroke: 1px var(--outline);
      filter: drop-shadow(3px 3px 0 var(--secondary));
    }

    /* ワクワク機能：ホバー時のグリッチエフェクト */
    .glitch {
      position: relative;
    }
    .group:hover .glitch::before, .group:hover .glitch::after {
      content: attr(data-text);
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      opacity: 0.8;
    }
    .group:hover .glitch::before {
      color: var(--primary);
      z-index: -1;
      animation: glitch-anim 0.3s cubic-bezier(.25, .46, .45, .94) both infinite;
    }
    .group:hover .glitch::after {
      color: var(--secondary);
      z-index: -2;
      animation: glitch-anim-2 0.3s cubic-bezier(.25, .46, .45, .94) reverse both infinite;
    }
    @keyframes glitch-anim {
      0% { transform: translate(0) }
      20% { transform: translate(-2px, 2px) }
      40% { transform: translate(-2px, -2px) }
      60% { transform: translate(2px, 2px) }
      80% { transform: translate(2px, -2px) }
      100% { transform: translate(0) }
    }
    @keyframes glitch-anim-2 {
      0% { transform: translate(0) }
      20% { transform: translate(2px, -2px) }
      40% { transform: translate(2px, 2px) }
      60% { transform: translate(-2px, -2px) }
      80% { transform: translate(-2px, 2px) }
      100% { transform: translate(0) }
    }

    .retro-panel {
      background: var(--surface);
      border: 3px solid var(--outline);
      box-shadow: 6px 6px 0 var(--outline);
      position: relative;
    }

    .game-card {
      background: var(--surface);
      border: 3px solid var(--outline);
      box-shadow: 5px 5px 0 var(--outline);
      transition: transform 200ms cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 200ms ease;
      overflow: hidden;
    }

    .game-card:hover {
      transform: translate(-3px, -3px) rotate(-1deg);
      box-shadow: 8px 8px 0 var(--outline);
    }

    .comic-btn {

      font-size: 1.2rem;
      padding: 0.5rem 1.5rem;
      background: var(--primary);
      color: white;
      border: 3px solid var(--outline);
      box-shadow: 4px 4px 0 var(--outline);
      transition: all 150ms cubic-bezier(0.4, 0, 0.2, 1);
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
    }

    .comic-btn:hover {
      background: #ff4d4d;
      transform: translate(-1px, -1px);
      box-shadow: 5px 5px 0 var(--outline);
    }

    .comic-btn:active {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0 var(--outline);
    }

    .comic-input {

      border: 3px solid var(--outline);

    .comic-input:focus {

      border-color: var(--accent);
      box-shadow: 4px 4px 0 var(--outline);
    }

    select.comic-input {
      background-image: url('data:image/svg+xml,%3Csvg fill="%23000" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"%3E%3Cpath d="M7 10l5 5 5-5z"/%3E%3C/svg%3E');
      background-repeat: no-repeat;
      background-position: right 8px center;
      padding-right: 32px;
    }

    .fade-up { animation: fadeUp 500ms ease both; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .img-frame {
      background: #eee;
      border-bottom: 3px solid var(--outline);
      position: relative;
    }

    .comic-footer {
      border-top: 3px solid var(--outline);
      background: #ffffff;
      margin-top: 40px;
      box-shadow: 0 -6px 0 var(--outline);
    }

    .status-chip {
      border: 3px solid var(--outline);
      background: var(--secondary);
      font-family: "Bangers", cursive;
      color: var(--outline);
    }

    .comic-heart {
      display: inline-block;
      width: 44px; height: 44px;
      background-image: url('data:image/svg+xml,%3Csvg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"%3E%3Cpath d="M50 88.7L14.1 53.1C5.1 44.2 5.1 29.8 14.1 20.9 23.1 12 37.5 12 46.5 20.9L50 24.4 53.5 20.9C62.5 12 76.9 12 85.9 20.9 94.9 29.8 94.9 44.2 85.9 53.1L50 88.7Z" fill="%23e63946" stroke="%23000" stroke-width="8"/%3E%3C/svg%3E');
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      animation: comicHeartbeat 1s ease-in-out infinite;
    }

    @keyframes comicHeartbeat {
      0% { transform: scale(1) rotate(0deg); }
      15% { transform: scale(1.3) rotate(-5deg); }
      30% { transform: scale(1) rotate(0deg); }
      45% { transform: scale(1.3) rotate(5deg); }
      60% { transform: scale(1) rotate(0deg); }
    }

    .skeleton {
      background: linear-gradient(90deg, var(--surface) 25%, rgba(255,255,255,0.07) 50%, var(--surface) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.6s infinite;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    #genre-filter {
      display: none;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin-bottom: 16px;
    }
    #genre-filter.visible { display: flex; }

    .genre-chip {
      font-family: "Bangers", cursive;
      font-size: 14px;
      border: 3px solid var(--outline);
      background: #fff;
      color: var(--outline);
      cursor: pointer;
      padding: 4px 16px;
      white-space: nowrap;
      transition: all 150ms ease;
      box-shadow: 3px 3px 0 var(--outline);
    }
    .genre-chip:hover {
      background: var(--secondary);
      transform: translate(-1px, -1px);
      box-shadow: 4px 4px 0 var(--outline);
    }
    .genre-chip.active {
      background: var(--primary);
      color: #fff;
      transform: translate(1px, 1px);
      box-shadow: 2px 2px 0 var(--outline);
    }

    .badge-new {
      font-family: "Bangers", cursive;
      font-size: 12px;
      background: var(--primary);
      color: #fff;
      padding: 4px 8px;
      border: 2px solid var(--outline);
      transform: rotate(-10deg);
      box-shadow: 3px 3px 0 var(--outline);
    }

    #scroll-top-btn {
      position: fixed;
      bottom: 28px;
      right: 28px;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 300ms ease, transform 300ms ease;
      transform: translateY(12px);
    }
    #scroll-top-btn.visible {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }
    @media (max-width: 640px) {
      #scroll-top-btn {
        bottom: 60px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
      .skeleton { animation: none; background: var(--surface); }
    }
  </style>
</head>

  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script>
    // --- Web Audio API (ワクワク機能：効果音) ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let isAudioUnlocked = false;
    const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    
    // ユーザー操作でAudioContextのロックを解除
    const unlockAudio = () => {
      if (audioCtx.state === 'suspended') audioCtx.resume();
      isAudioUnlocked = true;
      ['mousedown', 'touchstart', 'keydown', 'click'].forEach(evt => {
        document.removeEventListener(evt, unlockAudio, true);
      });
    };
    // capture: true にして、他のイベントより先にロック解除処理を走らせる
    ['mousedown', 'touchstart', 'keydown', 'click'].forEach(evt => {
      document.addEventListener(evt, unlockAudio, true);
    });

    function playBeep(freq = 440, type = 'sine', duration = 0.05, endFreq = null) {
      if (!isAudioUnlocked || prefersReducedMotion) return;
      const oscillator = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      oscillator.type = type;
      oscillator.frequency.setValueAtTime(freq, audioCtx.currentTime);
      if (endFreq) {
        oscillator.frequency.exponentialRampToValueAtTime(endFreq, audioCtx.currentTime + duration);
      }
      gainNode.gain.setValueAtTime(0.05, audioCtx.currentTime);
      gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + duration);
      oscillator.connect(gainNode);
      gainNode.connect(audioCtx.destination);
      oscillator.start();
      oscillator.stop(audioCtx.currentTime + duration);
    }

    // Comic Sound Wrappers
    const soundPop = () => playBeep(800, 'triangle', 0.04);
    const soundPunch = () => playBeep(400, 'sine', 0.2, 50);
    const soundJingle = () => {
      playBeep(440, 'triangle', 0.1);
      setTimeout(() => playBeep(660, 'triangle', 0.1), 80);
      setTimeout(() => playBeep(880, 'triangle', 0.3), 160);
    };

    // --- 隠しコマンド（コナミコマンドでパーティモード） ---
    const konamiCode = ['arrowup', 'arrowup', 'arrowdown', 'arrowdown', 'arrowleft', 'arrowright', 'arrowleft', 'arrowright', 'b', 'a'];
    let konamiIndex = 0;
    
    document.addEventListener('keydown', (e) => {
      if (e.key.toLowerCase() === konamiCode[konamiIndex]) {
        konamiIndex++;
        if (konamiIndex === konamiCode.length) {
          document.body.classList.toggle('bw-mode');
          showMessage("📖 CLASSIC B&W MODE ACTIVATED! 📖", "success");
          soundJingle();
          konamiIndex = 0;
        }
      } else {
        konamiIndex = 0;
      }
    });

    // --- メインロジック ---
    let records = [];
    let newIds = new Set();
    let activeGenre = 'all';
    const grid = document.getElementById("game-grid");
    const emptyState = document.getElementById("empty-state");
    const countEl = document.getElementById("game-count");
    const messageBar = document.getElementById("message-bar");
    const searchInput = document.getElementById("search-input");
    const sortSelect = document.getElementById("sort-select");
    const genreFilter = document.getElementById("genre-filter");
    const scrollTopBtn = document.getElementById("scroll-top-btn");
    const appEl = document.getElementById("app");

    function showMessage(text, type) {
      if (!text) {
        messageBar.classList.add("hidden");
        messageBar.textContent = '';
        return;
      }
      messageBar.classList.remove("hidden");
      messageBar.textContent = text;
      messageBar.style.borderColor = type === "error" ? "var(--secondary)" : "var(--primary)";
    }

    function showSkeletons(count = 6) {
      grid.innerHTML = '';
      for (let i = 0; i < count; i++) {
        const sk = document.createElement('div');
        sk.className = 'game-card p-4 flex flex-col gap-4';
        sk.innerHTML = `
          <div class="img-frame aspect-[1200/630] w-full relative overflow-hidden">
            <div class="skeleton w-full h-full"></div>
          </div>
          <div class="flex flex-col gap-3 pt-1">
            <div class="skeleton h-6 w-3/4 rounded-none"></div>
            <div class="skeleton h-4 w-1/4 rounded-none"></div>
            <div class="skeleton h-4 w-full rounded-none"></div>
            <div class="skeleton h-4 w-5/6 rounded-none"></div>
          </div>
        `;
        grid.appendChild(sk);
      }
    }

    function renderGenreChips() {
      const genres = [...new Set(records.map(r => r.genre).filter(Boolean))].sort();
      if (genres.length === 0) return;
      genreFilter.classList.add('visible');
      genreFilter.innerHTML = '';
      ['all', ...genres].forEach(genre => {
        const chip = document.createElement('button');
        chip.className = 'genre-chip' + (genre === activeGenre ? ' active' : '');
        chip.textContent = genre === 'all' ? 'ALL' : genre.toUpperCase();
        chip.addEventListener('click', () => {
          activeGenre = genre;
          soundPop();
          renderGenreChips();
          updateView();
        });
        genreFilter.appendChild(chip);
      });
    }

    // XSS対策用のエスケープ関数
    const escapeHTML = (str) => String(str).replace(/[&<>"']/g, match => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;'
    })[match]);

    function createCard(record) {
      const card = document.createElement("article");
      card.className = "game-card fade-up p-4 flex flex-col gap-4 group cursor-pointer";
      const title = escapeHTML(record.title);
      const desc = escapeHTML(record.description || '');
      const genre = record.genre ? escapeHTML(record.genre) : '';
      const ai = record.ai ? escapeHTML(record.ai) : '';
      const url = escapeHTML(record.url);
      const imgUrl = escapeHTML(record.imageUrl);

      const isNew = newIds.has(record.id);

      card.innerHTML = `
        <div class="img-frame aspect-[1200/630] w-full relative overflow-hidden">
          <img src="${imgUrl}" alt="${title}" loading="lazy"
               class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110"
               onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
          <div class="hidden absolute inset-0 flex-col items-center justify-center bg-gray-200 text-black/40">
            <i data-lucide="tv" class="w-10 h-10 mb-2"></i>
            <span class="comic-title text-[24px]">NO SIGNAL</span>
          </div>
          ${isNew ? `<span class="badge-new absolute top-2 left-2">NEW!</span>` : ''}
        </div>
        <div class="flex flex-col gap-3 flex-grow">
          <h3 class="comic-title text-[20px] sm:text-[24px] leading-tight text-black" data-text="${title}">${title}</h3>
          <div class="flex flex-col gap-2 flex-grow">
            ${genre ? `<div class="inline-block px-3 py-0.5 border-2 border-black text-black font-bold text-[14px] uppercase tracking-wider w-max mb-1 bg-yellow-400 font-sans">${genre}</div>` : ''}
            <p class="text-[16px] sm:text-[18px] leading-[1.4] text-gray-700 font-bold">${desc}</p>
            ${ai ? `<div class="flex items-center gap-1.5 mt-auto pt-2 text-red-600 font-bold text-[14px] sm:text-[16px]"><i data-lucide="bot" class="w-4 h-4"></i><span class="opacity-90">${ai}</span></div>` : ''}
          </div>
          <div class="flex items-center gap-3 flex-wrap pt-2 mt-auto border-t-2 border-black/10">
            <a href="${url}" target="_blank" rel="noopener noreferrer" class="comic-btn inline-flex items-center gap-2 px-6 py-2 mt-2 text-[16px] bg-red-500 text-white ml-auto snd-click">
              <i data-lucide="play" class="w-4 h-4 fill-white"></i><span>READ GAME</span>
            </a>
          </div>
        </div>
      `;

      // カード作成時に動的要素にのみサウンドイベントを付与
      card.addEventListener('mouseenter', soundPop);
      const startBtn = card.querySelector('.snd-click');
      if (startBtn) {
        startBtn.addEventListener('mousedown', soundPunch);
      }
      
      return card;
    }

    function updateView() {
      const term = searchInput.value.toLowerCase();
      const sortType = sortSelect.value;
      
      let filtered = records.filter(r => {
        const matchSearch = `${r.title} ${r.description || ''} ${r.genre || ''} ${r.ai || ''}`.toLowerCase().includes(term);
        const matchGenre = activeGenre === 'all' || r.genre === activeGenre;
        return matchSearch && matchGenre;
      });
      
      filtered.sort((a, b) => {
        if (sortType === 'title') return a.title.localeCompare(b.title, 'ja');
        if (sortType === 'oldest') return a.id - b.id;
        return b.id - a.id;
      });
      
      grid.innerHTML = "";
      filtered.forEach((record, index) => {
        const card = createCard(record);
        card.style.animationDelay = `${index * 50}ms`;
        grid.appendChild(card);
      });
      
      countEl.textContent = filtered.length;
      emptyState.classList.toggle("hidden", filtered.length > 0);
      
      lucide.createIcons({
        attrs: { 'stroke-width': 2.5 }
      });
    }

    function computeNewIds() {
      const sorted = [...records].sort((a, b) => b.id - a.id);
      newIds = new Set(sorted.slice(0, 2).map(r => r.id));
    }

    function updateItemListSchema(games) {
      const script = document.querySelector('script[type="application/ld+json"]');
      if (!script) return;
      try {
        const data = JSON.parse(script.textContent);
        const list = data['@graph'].find(n => n['@type'] === 'ItemList');
        if (!list) return;
        list.itemListElement = games
          .filter(g => g.url && g.url !== '#')
          .map((g, i) => ({ '@type': 'ListItem', 'position': i + 1, 'url': g.url }));
        script.textContent = JSON.stringify(data);
      } catch (e) {}
    }

    async function loadGames() {
      showSkeletons(6);
      try {
        const res = await fetch('https://tk.st/data/game.json');
        if (!res.ok) throw new Error('Network error');
        records = await res.json();
      } catch (error) {
        showMessage('サーバーとの通信に失敗しました。テスト用データを表示しています。', 'error');
        records = [
          { id: 1, title: "MASALA TETRIS", url: "https://tk.st/game/masala-tetris/", imageUrl: "https://tk.st/images/ogp/masala-tetris-ogp.png", genre: "puzzle", description: "First released in 2024, MASALA TETRIS is a unique twist on the indian Tetris game.", ai: "Generated by Gemini 2.5 Pro" },
          { id: 2, title: "爆速タイピングバトル", url: "#", imageUrl: "https://example.com/not-found.jpg", genre: "typing", description: "生成AIが作る独特な例文を打ち込むタイピングゲーム。君の限界に挑戦しろ！", ai: "Generated by Gemini 2.5 Flash" },
          { id: 3, title: "NEON RIDER 2099", url: "#", imageUrl: "https://example.com/not-found.jpg", genre: "racing", description: "サイバーパンクな都市を駆け抜けるハイスピードレース。", ai: "Generated by Claude 3.5 Sonnet" }
        ];
      } finally {
        computeNewIds();
        renderGenreChips();
        updateView();
        updateItemListSchema(records);
      }
    }

    // 静的要素（検索バー、セレクトなど）のサウンドイベント初期化
    function initStaticSoundEvents() {
      document.querySelectorAll('.snd-hover').forEach(el => {
        el.addEventListener('mouseenter', soundPop);
      });
    }

    // スクロールトップボタン
    appEl.addEventListener('scroll', () => {
      scrollTopBtn.classList.toggle('visible', appEl.scrollTop > 300);
    });
    scrollTopBtn.addEventListener('click', () => {
      appEl.scrollTo({ top: 0, behavior: 'smooth' });
      soundPop();
    });
    lucide.createIcons({ nodes: [scrollTopBtn] });

    // 初期化処理
    searchInput.addEventListener("input", updateView);
    sortSelect.addEventListener("change", updateView);
    initStaticSoundEvents();

    const urlParams = new URLSearchParams(window.location.search);
    const initialQuery = urlParams.get('q');
    if (initialQuery) searchInput.value = initialQuery;

    loadGames();

    document.getElementById('currentYear').textContent = '2024-' + new Date().getFullYear();

  </script>
</body>
</html>
