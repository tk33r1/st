      20% { transform: translate(-3px, 0px) rotate(1deg); }
      30% { transform: translate(3px, 2px) rotate(0deg); }
      40% { transform: translate(1px, -1px) rotate(1deg); }

      90% { transform: translate(1px, 2px) rotate(0deg); }

  <script>
    // === CONFIG ===
    const config = {
      display_name: 'Shinya Takeda',
      job_title: 'Digital Marketer',
      location_text: 'Saitama, Japan',
    };

    let commandHistory = [];
    let historyIndex = -1;

    // === PORTFOLIO DATA ===
    const projects = [
      { name: '/dj', desc: 'Overview | DJ Human Choreomania Project', tech: 'Big room House, full-on Psytrance, Dance POP, Parapara', link: 'https://tk.st/dj' },
      { name: '/job', desc: 'An Optimization and data-driven growth strategy.', tech: 'EC, AB Testing, UIUX, Search Engine, Web ads, GA4, Looker, ADK', link: 'https://tk.st/job' },
      { name: '/game', desc: 'AI coding benchmark: Game Sandbox', tech: 'Gemini, ChatGPT, Canva AI, Claude, Antigravity', link: 'https://tk.st/game' },
      { name: '/think', desc: 'A shared margin for contemplating the essence of life.', tech: 'Erich Fromm, Friedrich Nietzsche, Epictetus, Buddha', link: 'https://tk.st/think' },
      { name: '/glitch', desc: 'Finding the "bugs" that lead to better living.', tech: 'A Dialectical Lens, Deconstructive Urge', link: 'https://tk.st/glitch' }
    ];

    // === HELPER FUNCTIONS ===
    window.toggleBitcoinMenu = (targetId, allIds) => {
      allIds.forEach(id => {
        const el = document.getElementById(id);
        if(id === targetId) {
          el.classList.toggle('hidden');
          el.classList.toggle('flex');
        } else {
          el.classList.add('hidden');
          el.classList.remove('flex');
        }
      });
    };

    function esc(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    function printToOutput(html, delay = 0) {
      return new Promise(resolve => {
        setTimeout(() => {
          const div = document.createElement('div');
          div.className = 'fade-in';
          div.style.animationDelay = '0s';
          div.innerHTML = html;
          document.getElementById('output-area').appendChild(div);
          resolve();
        }, delay);
      });
    }

    // === COMMANDS ===
    const commands = {
      help() {
        return `
          <div class="my-3 space-y-1 w-[90%] max-w-[800px]">
            <div style="color: var(--primary-color);" class="glow text-sm font-bold mb-2">Available Commands:</div>
            <div class="grid gap-1 text-xs" style="color: var(--text-color);">
              <div class="flex"><span class="w-24" style="color: var(--primary-color);">about</span><span>- Learn about me</span></div>
              <div class="flex"><span class="w-24" style="color: var(--primary-color);">identify</span><span>- View personality versions</span></div>
              <div class="flex"><span class="w-24" style="color: var(--primary-color);">pages</span><span>- Explore Web2 creations</span></div>
              <div class="flex"><span class="w-24" style="color: var(--primary-color);">bitcoin</span><span>- Enjoy Web3 journey</span></div>
              <div class="flex"><span class="w-24" style="color: var(--primary-color);">magi</span><span>- Talk to ST multi-agent</span></div>
              <div class="flex"><span class="w-24" style="color: var(--primary-color);">contact</span><span>- Contact me</span></div>
              <div class="flex"><span class="w-24" style="color: var(--primary-color);">clear</span><span>- Clear terminal</span></div>
              <div class="flex"><span class="w-24" style="color: var(--primary-color);">help</span><span>- Show this menu</span></div>
            </div>
            <div class="text-[10px] mt-4 opacity-50 italic">Tip: Use [Tab] to autocomplete. Some hidden commands may exist...</div>
          </div>`;
      },

      '/dj'() { window.open('https://tk.st/dj', '_blank', 'noopener,noreferrer'); return `<div class="my-3 text-xs" style="color: var(--primary-color);">Opening /dj...</div>`; },
      '/job'() { window.open('https://tk.st/job', '_blank', 'noopener,noreferrer'); return `<div class="my-3 text-xs" style="color: var(--primary-color);">Opening /job...</div>`; },
      '/game'() { window.open('https://tk.st/game', '_blank', 'noopener,noreferrer'); return `<div class="my-3 text-xs" style="color: var(--primary-color);">Opening /game...</div>`; },
      '/think'() { window.open('https://tk.st/think', '_blank', 'noopener,noreferrer'); return `<div class="my-3 text-xs" style="color: var(--primary-color);">Opening /think...</div>`; },
      '/glitch'() { window.open('https://tk.st/glitch', '_blank', 'noopener,noreferrer'); return `<div class="my-3 text-xs" style="color: var(--primary-color);">Opening /glitch...</div>`; },

      bitcoin() {
        const uniqueId = Date.now();
        const allIds = `['earn-opts-${uniqueId}', 'buy-opts-${uniqueId}', 'use-opts-${uniqueId}', 'view-opts-${uniqueId}']`;

        return `
          <div class="my-3 w-[90%] max-w-[800px]">
            <div class="text-sm font-bold glow mb-3" style="color: var(--primary-color);">BITCOIN YEN Ecosystem</div>
            <div class="flex gap-2 flex-wrap">
              <div class="px-3 py-1.5 border rounded cursor-pointer transition-colors text-xs bg-[#0a1f0a] hover:bg-[#143314]" style="border-color: var(--primary-color);" onclick="window.toggleBitcoinMenu('earn-opts-${uniqueId}', ${allIds})">

        return `<div class="my-3 p-4 border rounded text-xs leading-relaxed w-[90%] max-w-[400px]" style="border-color: var(--border-color); background: var(--surface-color); color: var(--text-color);">${esc(msg)}</div>`;
      },

      // === RECOMMENDED / HIDDEN COMMANDS ===
      history() {
        if (commandHistory.length === 0) return `<div class="my-3 text-xs" style="color: var(--secondary-color);">No history available.</div>`;
        const list = commandHistory.slice().reverse().map((cmd, i) => `  ${(i+1).toString().padStart(3, ' ')}  ${esc(cmd)}`).join('<br>');
        return `<div class="my-3 text-xs" style="color: var(--secondary-color); font-family: monospace;">${list}</div>`;
      },

      theme(args) {
        const colors = {
          green: '#4ade80', blue: '#60a5fa', pink: '#f472b6', 
          orange: '#fb923c', purple: '#c084fc', white: '#ffffff',
          red: '#f87171', yellow: '#fbbf24', cyan: '#22d3ee'
        };
        
        if (!args || args.length === 0 || !colors[args[0].toLowerCase()]) {
          return `<div class="my-3 text-xs" style="color: var(--secondary-color);">Usage: theme &lt;color&gt;<br>Available colors: <span style="color: var(--text-color);">${Object.keys(colors).join(', ')}</span></div>`;
        }
        
        const newColor = colors[args[0].toLowerCase()];
        
        // CSS変数を更新するだけで全体の色が変わる
        document.documentElement.style.setProperty('--primary-color', newColor);
        
        return `<div class="my-3 text-xs" style="color: var(--primary-color);">Theme color successfully changed to ${esc(args[0])}.</div>`;
      },
      
      date() {
        const d = new Date().toString();
        return `<div class="my-3 text-xs" style="color: var(--secondary-color);">${esc(d)}</div>`;
      },
      
      sudo() {
        return `<div class="my-3 text-xs text-red-500 font-bold">sudo: permission denied. This incident will be reported.</div>`;
      },
      
      destroy() {
        document.body.classList.add('shake-animation');
        setTimeout(() => {
          document.body.classList.remove('shake-animation');
        }, 1500);
        return `<div class="my-3 text-xs text-red-500 font-bold">CRITICAL ERROR: SYSTEM COMPROMISED.<br>EMERGENCY PROTOCOL ACTIVATED.</div>`;
      },

      matrix() {
        return new Promise(resolve => {
          const canvas = document.createElement('canvas');
          canvas.style.position = 'fixed';
          canvas.style.top = '0';
          canvas.style.left = '0';
          canvas.style.width = '100%';
          canvas.style.height = '100%';
          canvas.style.zIndex = '9999';
          canvas.style.background = '#000';
          document.body.appendChild(canvas);
          const ctx = canvas.getContext('2d');
          
          let w = canvas.width = window.innerWidth;
          let h = canvas.height = window.innerHeight;
          
          const fontSize = 14;
          const columns = w / fontSize;
          const drops = [];
          for(let x = 0; x < columns; x++) drops[x] = 1;
          
          // 現在のプライマリカラーを取得
          const primaryColor = getComputedStyle(document.documentElement).getPropertyValue('--primary-color').trim() || '#4ade80';

          function draw() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, w, h);
            ctx.fillStyle = primaryColor;
            ctx.font = fontSize + 'px monospace';
            for(let i = 0; i < drops.length; i++) {
              const text = String.fromCharCode(0x30A0 + Math.random() * 96);
              ctx.fillText(text, i * fontSize, drops[i] * fontSize);
              if(drops[i] * fontSize > h && Math.random() > 0.975) drops[i] = 0;
              drops[i]++;
            }
          }
          
          const interval = setInterval(draw, 33);
          
          const endMatrix = (e) => {
            if(e.type === 'keydown' && e.key !== 'Escape') return;
            clearInterval(interval);
            canvas.remove();
            window.removeEventListener('keydown', endMatrix);
            window.removeEventListener('click', endMatrix);
            resolve(`<div class="text-xs mt-2" style="color: var(--primary-color);">Matrix simulation ended.</div>`);
          };
          
          window.addEventListener('keydown', endMatrix);
          window.addEventListener('click', endMatrix);
          
          printToOutput(`<div class="text-xs mb-2" style="color: var(--secondary-color);">Entering Matrix... Press ESC or Click to exit.</div>`, 0);
        });
      },

      secret() {
        return `
          <div class="my-3 space-y-1 w-[90%] max-w-[800px]">
            <div style="color: var(--primary-color);" class="glow text-sm font-bold mb-2">Hidden Commands:</div>
            <div class="grid gap-1 text-xs" style="color: var(--text-color);">
              <div class="flex"><span class="w-24" style="color: var(--primary-color);">akutagawa</span><span>- A message from the past</span></div>
              <div class="flex"><span class="w-24" style="color: var(--primary-color);">date</span><span>- Display current date and time</span></div>
              <div class="flex"><span class="w-24" style="color: var(--primary-color);">destroy</span><span>- Do not use</span></div>
              <div class="flex"><span class="w-24" style="color: var(--primary-color);">history</span><span>- Show command history</span></div>
              <div class="flex"><span class="w-24" style="color: var(--primary-color);">matrix</span><span>- Enter the Matrix</span></div>
              <div class="flex"><span class="w-24" style="color: var(--primary-color);">sudo</span><span>- Execute a command as superuser</span></div>
              <div class="flex"><span class="w-24" style="color: var(--primary-color);">theme</span><span>- Change terminal color [color]</span></div>
            </div>
          </div>`;
      }
    };

    // === BOOT SEQUENCE ===
    async function boot() {
      const bootArea = document.getElementById('boot-area');
      const lines = [
        { text: 'Initializing terminal...', delay: 250 },
        { text: `Connecting to <span style="font-weight:bold;">Bitcoin Mainnet</span>... [NG]`, delay: 450 },
        { text: `Loading profile: ${config.display_name}`, delay: 400 },
        { text: `<span style="color: var(--primary-color);">Web2</span> standalone system ready.`, delay: 300 },
        { text: '', delay: 150 },
      ];

      for (const line of lines) {
        await new Promise(r => setTimeout(r, line.delay));
        const div = document.createElement('div');
        div.className = 'text-xs fade-in';
        div.style.color = 'var(--secondary-color)';
        div.innerHTML = line.text;
        bootArea.appendChild(div);
      }

      await new Promise(r => setTimeout(r, 200));
      const header = document.createElement('div');
      
      header.className = 'fade-in my-3 flex items-center gap-4 md:gap-8';
      header.innerHTML = `
        <pre class="logo-ascii text-xs md:text-sm glow m-0 leading-tight" style="color: var(--primary-color);">
███████╗████████╗
██╔════╝╚══██╔══╝
███████╗<span style="opacity:0">╚══</span>██║
╚════██║<span style="opacity:0">╚══</span>██║
███████║<span style="opacity:0">╚══</span>██║
╚══════╝<span style="opacity:0">╚══</span>╚═╝</pre>
        <div class="text-xs md:text-sm flex flex-col justify-center space-y-1">
          <div style="color: var(--primary-color);">${esc(config.display_name)}</div>
          <div style="color: var(--secondary-color);">${esc(config.job_title)}</div>
          <div class="pt-2" style="color: var(--secondary-color);">Type <span style="color:#fff;">'help'</span> to explore.</div>
        </div>`;
      bootArea.appendChild(header);
      
      const inputLine = document.getElementById('input-line');
      inputLine.classList.remove('hidden');
      inputLine.classList.add('flex', 'fade-in');
      
      document.getElementById('cmd-input').focus();
    }

    // === COMMAND HANDLER ===
    async function handleCommand(input) {
      const trimmed = input.trim();
      
      if (!trimmed) return;

      const echo = document.createElement('div');
      echo.className = 'text-xs mt-3';
      echo.innerHTML = `<span style="color: var(--primary-color);">ST@portfolio:~$</span> <span style="color: var(--text-color);">${esc(input)}</span>`;
      document.getElementById('output-area').appendChild(echo);

      commandHistory.unshift(trimmed);
      historyIndex = -1;

      // 引数の解析
      const parts = trimmed.split(/\s+/);
      const cmd = parts[0].toLowerCase();
      const args = parts.slice(1);

      if (commands[cmd]) {
        const result = await commands[cmd](args);
        if (result) await printToOutput(result, 100);
      } else {
        await printToOutput(`<div class="text-xs my-1" style="color:#f87171;">Command not found: '${esc(cmd)}'. Type <span style="color: var(--primary-color);">help</span> for available commands.</div>`, 50);
      }
    }

    // === INPUT HANDLING ===
    const cmdInput = document.getElementById('cmd-input');
    cmdInput.addEventListener('keydown', async (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        const val = cmdInput.value;
        cmdInput.value = '';
        await handleCommand(val);
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        if (historyIndex < commandHistory.length - 1) {
          historyIndex++;
          cmdInput.value = commandHistory[historyIndex];
        }
      } else if (e.key === 'ArrowDown') {
        e.preventDefault();
        if (historyIndex > 0) {
          historyIndex--;
          cmdInput.value = commandHistory[historyIndex];
        } else {
          historyIndex = -1;
          cmdInput.value = '';
        }
      } else if (e.key === 'Tab') {
        e.preventDefault();
        const val = cmdInput.value.toLowerCase();
        if (!val) return;
        const matches = Object.keys(commands).filter(cmd => cmd.startsWith(val));
        if (matches.length === 1) {
          cmdInput.value = matches[0];
        } else if (matches.length > 1) {
          const echo = document.createElement('div');
          echo.className = 'text-xs mt-2 opacity-70';
          echo.style.color = 'var(--text-color)';
          echo.textContent = matches.join('   ');
          document.getElementById('output-area').appendChild(echo);
        }
      }
    });

    document.getElementById('app').addEventListener('click', (e) => {
      if (window.getSelection().toString()) return;
      if (e.target.tagName === 'A' || e.target.closest('a') || e.target.closest('.cursor-pointer') || e.target.tagName === 'INPUT') return;
      cmdInput.focus();
    });

    function updateTime() {
      document.getElementById('status-right').textContent = new Date().toLocaleTimeString('en-US', { hour12: false });
    }
    setInterval(updateTime, 1000);
    updateTime();

    boot();
  </script>
 </body>
