<!doctype html>
<html lang="ja">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shinya Takeda - Terminal Portfolio</title>
  <link rel="icon" href="https://tk.st/images/favicons/st-favicon.png" type="image/png">
  <meta property="og:title" content="ST@portfolio">
  <meta property="og:description" content="Shinya Takeda個人の多面的な総合プラットフォーム">
  <meta property="og:image" content="https://tk.st/images/ogp/st-ogp.png">
  <meta property="og:url" content="https://tk.st/">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;700&amp;family=Roboto+Mono:wght@300;400;500;700&amp;display=swap" rel="stylesheet">
  <style>
    html, body { 
      margin: 0; 
      -webkit-text-size-adjust: 100%; 
      text-size-adjust: 100%;
    }
    body { box-sizing: border-box; }
    
    html, body, input, textarea, button, select, * { 
      font-family: 'Fira Code', 'Roboto Mono', monospace !important; 
    }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in {
      animation: fadeSlide 0.5s ease forwards;
      opacity: 0;
    }

    @keyframes dance {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      25% { transform: translateY(-4px) rotate(-15deg); }
      50% { transform: translateY(0) rotate(0deg); }
      75% { transform: translateY(-4px) rotate(15deg); }
    }
    .dancing-emoji {
      display: inline-block;
      animation: dance 1s ease-in-out infinite;
      margin-left: 8px;
    }

    @keyframes shake {
      0% { transform: translate(1px, 1px) rotate(0deg); }
      10% { transform: translate(-1px, -2px) rotate(-1deg); }
      20% { transform: translate(-3px, 0px) rotate(1deg); }
      30% { transform: translate(3px, 2px) rotate(0deg); }
      40% { transform: translate(1px, -1px) rotate(1deg); }
      50% { transform: translate(-1px, 2px) rotate(-1deg); }
      60% { transform: translate(-3px, 1px) rotate(0deg); }
      70% { transform: translate(3px, 1px) rotate(-1deg); }
      80% { transform: translate(-1px, -1px) rotate(1deg); }
      90% { transform: translate(1px, 2px) rotate(0deg); }
      100% { transform: translate(1px, -2px) rotate(-1deg); }
    }
    .shake-animation {
      animation: shake 0.3s infinite;
    }

    .scanline {
      pointer-events: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 0, 0, 0.03) 2px,
        rgba(0, 0, 0, 0.03) 4px
      );
      z-index: 999;
    }

    .glow { text-shadow: 0 0 8px currentColor; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0a0a0a; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

    .cmd-input {
      background: transparent;
      border: none;
      outline: none;
      caret-color: #4ade80;
    }
  </style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="bg-[#0c0c0c]">
  <div id="app" class="min-h-screen w-full flex flex-col" style="background:#0c0c0c; color:#d4d4d4;">
   <div class="scanline"></div><header class="flex items-center justify-between px-4 py-2 border-b" style="background:#1a1a1a; border-color:#333;">
    <div class="flex gap-1.5">
     <div class="w-2.5 h-2.5 rounded-full" style="background:#f87171;"></div>
     <div class="w-2.5 h-2.5 rounded-full" style="background:#fbbf24;"></div>
     <div class="w-2.5 h-2.5 rounded-full" style="background:#4ade80;"></div>
    </div>
    <div class="flex items-center gap-2">
     <span style="color:#4ade80;" class="theme-color-target">▸</span> <span id="titlebar-name" class="text-xs tracking-wider" style="color:#888;">ST@portfolio:~</span>
    </div>
   </header><main id="terminal-body" class="flex-1 p-4 md:p-6 space-y-1" style="scroll-behavior:smooth;">
    <div id="boot-area"></div>
    <div id="output-area"></div>
    <div class="hidden items-center gap-2 mt-4" id="input-line"><span id="prompt-prefix" class="text-xs whitespace-nowrap" style="color:#4ade80;">ST@portfolio:~$</span> <input type="text" id="cmd-input" class="cmd-input flex-1 text-sm" style="color:#d4d4d4;" autocomplete="off" spellcheck="false" placeholder="type 'help'..." aria-label="Command input">
    </div>
   </main><footer class="flex items-center justify-between px-4 py-1.5 text-xs border-t mt-auto" style="background:#1a1a1a; border-color:#333; color:#666;"><span id="status-left">READY</span> <span id="status-right"></span>
   </footer>
  </div>
  <script>
    // === CONFIG & SDK ===
    const defaultConfig = {
      display_name: 'Shinya Takeda',
      job_title: 'Digital Marketer',
      bio_text: 'Passionate about building elegant solutions with clean code. Specializing in modern web technologies and cloud architecture.',
      location_text: 'Saitama, Japan',
      email_text: 'shinya@example.com',
      background_color: '#0c0c0c',
      surface_color: '#1a1a1a',
      text_color: '#d4d4d4',
      primary_color: '#4ade80',
      secondary_color: '#888888',
      font_family: 'Fira Code',
      font_size: 14
    };

    let commandHistory = [];
    let historyIndex = -1;

    // === PORTFOLIO DATA ===
    const projects = [
      { name: '/dj', desc: 'Overview | DJ Human Choreomania Project', tech: 'Big room House, full-on Psytrance, Dance POP, Parapara', link: 'https://tk.st/dj' },
      { name: '/job', desc: 'An Optimization and data-driven growth strategy.', tech: 'EC, AB Testing, UIUX, Search Engine, Web ads, GA4, Looker, ADK', link: 'https://tk.st/job' },
      { name: '/game', desc: 'AI coding benchmark: Game Sandbox', tech: 'Gemini, ChatGPT, Canva AI, Claude, Antigravity', link: 'https://tk.st/game' },
      { name: '/think', desc: 'A shared margin for contemplating the essence of life.', tech: 'Erich Fromm, Friedrich Nietzsche, Epictetus, Buddha', link: 'https://tk.st/think' },
      { name: '/glitch', desc: 'Finding the "bugs" that lead to better living.', tech: 'A Dialectical Lens, Deconstructive Urge', link: 'https://tk.st/glitch' }
    ];

    // === HELPER FUNCTIONS ===
    function getConfig() {
      return window.elementSdk?.config || defaultConfig;
    }

    function esc(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    function printToOutput(html, delay = 0) {
      return new Promise(resolve => {
        setTimeout(() => {
          const div = document.createElement('div');
          div.className = 'fade-in';
          div.style.animationDelay = '0s';
          div.innerHTML = html;
          document.getElementById('output-area').appendChild(div);
          resolve();
        }, delay);
      });
    }

    // === COMMANDS ===
    const commands = {
      help() {
        const c = getConfig();
        return `
          <div class="my-3 space-y-1 w-[90%] max-w-[800px]">
            <div style="color:${c.primary_color};" class="glow text-sm font-bold mb-2 theme-color-target">Available Commands:</div>
            <div class="grid gap-1 text-xs" style="color:${c.text_color};">
              <div class="flex"><span class="w-24 theme-color-target" style="color:${c.primary_color};">about</span><span>- Learn about me</span></div>
              <div class="flex"><span class="w-24 theme-color-target" style="color:${c.primary_color};">identify</span><span>- View personality versions</span></div>
              <div class="flex"><span class="w-24 theme-color-target" style="color:${c.primary_color};">magi</span><span>- Talk to ST multi-agent</span></div>
              <div class="flex"><span class="w-24 theme-color-target" style="color:${c.primary_color};">pages</span><span>- Explore Web2 creations</span></div>
              <div class="flex"><span class="w-24 theme-color-target" style="color:${c.primary_color};">bitcoin</span><span>- Enjoy Web3 journey</span></div>
              <div class="flex"><span class="w-24 theme-color-target" style="color:${c.primary_color};">contact</span><span>- Contact me</span></div>
              <div class="flex"><span class="w-24 theme-color-target" style="color:${c.primary_color};">clear</span><span>- Clear terminal</span></div>
              <div class="flex"><span class="w-24 theme-color-target" style="color:${c.primary_color};">help</span><span>- Show this menu</span></div>
            </div>
            <div class="text-[10px] mt-4 opacity-50 italic">Tip: Use [Tab] to autocomplete. Some hidden commands may exist...</div>
          </div>`;
      },

      '/dj'() { window.open('https://tk.st/dj', '_blank', 'noopener,noreferrer'); return `<div class="my-3 text-xs theme-color-target" style="color:${getConfig().primary_color};">Opening /dj...</div>`; },
      '/job'() { window.open('https://tk.st/job', '_blank', 'noopener,noreferrer'); return `<div class="my-3 text-xs theme-color-target" style="color:${getConfig().primary_color};">Opening /job...</div>`; },
      '/game'() { window.open('https://tk.st/game', '_blank', 'noopener,noreferrer'); return `<div class="my-3 text-xs theme-color-target" style="color:${getConfig().primary_color};">Opening /game...</div>`; },
      '/think'() { window.open('https://tk.st/think', '_blank', 'noopener,noreferrer'); return `<div class="my-3 text-xs theme-color-target" style="color:${getConfig().primary_color};">Opening /think...</div>`; },
      '/glitch'() { window.open('https://tk.st/glitch', '_blank', 'noopener,noreferrer'); return `<div class="my-3 text-xs theme-color-target" style="color:${getConfig().primary_color};">Opening /glitch...</div>`; },

      magi() { window.open('https://tk.st/magi', '_blank', 'noopener,noreferrer'); return `<div class="my-3 text-xs theme-color-target" style="color:${getConfig().primary_color};">Activate the MAGI system ...</div>`; },

      bitcoin() {
        const c = getConfig();
        const uniqueId = Date.now();
        
        const toggleMenu = `
          const menus = ['earn-opts-${uniqueId}', 'buy-opts-${uniqueId}', 'use-opts-${uniqueId}'];
          const target = event.currentTarget.getAttribute('data-target');
          menus.forEach(id => {
            const el = document.getElementById(id);
            if(id === target) {
              el.classList.toggle('hidden');
              el.classList.toggle('flex');
            } else {
              el.classList.add('hidden');
              el.classList.remove('flex');
            }
          });
        `;

        return `
          <div class="my-3 w-[90%] max-w-[800px]">
            <div class="text-sm font-bold glow mb-3 theme-color-target" style="color:${c.primary_color};">BITCOIN YEN Ecosystem</div>
            <div class="flex gap-2 flex-wrap">
              <div class="px-3 py-1.5 border rounded cursor-pointer transition-colors text-xs bg-[#0a1f0a] hover:bg-[#143314] theme-border-target" style="border-color:${c.primary_color};" data-target="earn-opts-${uniqueId}" onclick="${toggleMenu.replace(/\n/g, '')}">
                Earn
              </div>
              <div class="px-3 py-1.5 border rounded cursor-pointer transition-colors text-xs bg-[#0a1f0a] hover:bg-[#143314] theme-border-target" style="border-color:${c.primary_color};" data-target="buy-opts-${uniqueId}" onclick="${toggleMenu.replace(/\n/g, '')}">
                Buy
              </div>
              <div class="px-3 py-1.5 border rounded cursor-pointer transition-colors text-xs bg-[#0a1f0a] hover:bg-[#143314] theme-border-target" style="border-color:${c.primary_color};" data-target="use-opts-${uniqueId}" onclick="${toggleMenu.replace(/\n/g, '')}">
                Use
              </div>
            </div>
            
            <div id="earn-opts-${uniqueId}" class="hidden flex-col mt-3 ml-2 border-l-2 pl-3 space-y-2" style="border-color:${c.secondary_color};">
              <div class="px-3 py-2 border rounded cursor-pointer transition-colors text-xs w-full max-w-[300px] bg-[#111] hover:bg-[#222]" style="border-color:#333;" onclick="window.open('https://tk.st/bitcoinyen/ascii_roguelike', '_blank', 'noopener,noreferrer')">
                <div style="color:${c.text_color};">🎮 Play to Earn</div>
                <div class="text-xs mt-0.5 theme-color-target" style="color:${c.primary_color};">ASCII Roguelike</div>
              </div>
            </div>

            <div id="buy-opts-${uniqueId}" class="hidden flex-col mt-3 ml-2 border-l-2 pl-3 space-y-2" style="border-color:${c.secondary_color};">
              <div class="px-3 py-2 border rounded cursor-pointer transition-colors text-xs w-full max-w-[300px] bg-[#111] hover:bg-[#222]" style="border-color:#333;" onclick="window.open('https://tk.st/bitcoinyen/ln', '_blank', 'noopener,noreferrer')">
                <div style="color:${c.text_color};">⚡ Direct Purchase</div>
                <div class="text-xs mt-0.5 theme-color-target" style="color:${c.primary_color};">Lightning Network</div>
              </div>
              <div class="px-3 py-2 border rounded cursor-pointer transition-colors text-xs w-full max-w-[300px] bg-[#111] hover:bg-[#222]" style="border-color:#333;" onclick="window.open('https://unisat.io/runes/market?tick=BITCOIN%E2%80%A2YEN', '_blank', 'noopener,noreferrer')">
                <div style="color:${c.text_color};">🛒 Marketplace</div>
                <div class="text-xs mt-0.5 theme-color-target" style="color:${c.primary_color};">UniSat</div>
              </div>
            </div>
            
            <div id="use-opts-${uniqueId}" class="hidden flex-col mt-3 ml-2 border-l-2 pl-3 space-y-2" style="border-color:${c.secondary_color};">
              <div class="px-3 py-2 border rounded cursor-pointer transition-colors text-xs w-full max-w-[300px] bg-[#111] hover:bg-[#222]" style="border-color:#333;" onclick="window.open('https://tk.st/bitcoinyen/bbm', '_blank', 'noopener,noreferrer')">
                <div style="color:${c.text_color};">📨 Letter to the future</div>
                <div class="text-xs mt-0.5 theme-color-target" style="color:${c.primary_color};">Bitcoin Bottle Mail</div>
              </div>
            </div>
          </div>`;
      },

      about() {
        const c = getConfig();
        const name = c.display_name || defaultConfig.display_name;
        const title = c.job_title || defaultConfig.job_title;
        const bioLines = [
          "The sun for the cyber realm, The moon for music and philosophy.",
          "I love profound tranquility, laced with a spoonful of madness."
        ];
        const loc = c.location_text || defaultConfig.location_text;
        return `
          <div class="my-3 p-4 border rounded w-[90%] max-w-[800px]" style="border-color:#333; background:#111;">
            <div class="text-lg font-bold glow mb-1 theme-color-target" style="color:${c.primary_color};">${esc(name)}<span class="dancing-emoji">🧑🏻‍🦱</span></div>
            <div class="text-xs mb-4" style="color:${c.secondary_color};">${esc(title)}</div>
            <div class="text-xs leading-relaxed mb-4" style="color:${c.text_color};">${bioLines.map(line => esc(line)).join('<br/>')}</div>
            <div class="space-y-1 pt-2 border-t" style="border-color:#333;">
              <div class="flex justify-between text-xs">
                <span style="color:${c.secondary_color};">📍 Location</span>
                <span style="color:${c.text_color};">${esc(loc)}</span>
              </div>
              <div class="flex justify-between text-xs">
                <span style="color:${c.secondary_color};">♉ Zodiac</span>
                <span style="color:${c.text_color};">Taurus</span>
              </div>
              <div class="flex justify-between text-xs">
                <span style="color:${c.secondary_color};">📏 Height</span>
                <span style="color:${c.text_color};">169.9 cm</span>
              </div>
              <div class="flex justify-between text-xs">
                <span style="color:${c.secondary_color};">🩸 Blood</span>
                <span style="color:${c.text_color};">O Rh+</span>
              </div>
            </div>
          </div>`;
      },

      projects() {
        const c = getConfig();
        let cards = projects.map(p =>
          `<div class="p-3 border rounded cursor-pointer transition-colors bg-[#111] hover:bg-[#222]" style="border-color:#333;" onclick="window.open('${p.link}', '_blank', 'noopener,noreferrer')">
            <div class="flex items-center justify-between mb-1">
              <span class="text-sm font-bold theme-color-target" style="color:${c.primary_color};">${esc(p.name)}</span>
            </div>
            <div class="text-xs mb-2" style="color:${c.text_color};">${esc(p.desc)}</div>
            <div class="text-[10px]" style="color:${c.secondary_color};">⚙ ${esc(p.tech)}</div>
          </div>`
        ).join('');
        return `
          <div class="my-3 space-y-2 w-[90%] max-w-[800px]">
            <div class="text-sm font-bold glow mb-2 theme-color-target" style="color:${c.primary_color};">Explore Web2 creations</div>
            <div class="space-y-2">${cards}</div>
          </div>`;
      },

      pages() { return this.projects(); },

      contact() {
        window.open('https://tk.st/contact', '_blank');
        return `<div class="my-3 text-xs theme-color-target" style="color:${getConfig().primary_color};">Opening contact page...</div>`;
      },

      identify() {
        const c = getConfig();
        const uniqueId = 'id-' + Date.now();
        return new Promise(resolve => {
          const html = `
            <div class="my-3 w-[90%] max-w-[800px]">
              <div class="text-sm font-bold glow mb-3 theme-color-target" style="color:${c.primary_color};">Please select a profile to initialize:</div>
              <div class="space-y-2">
                <div class="p-3 border rounded cursor-pointer transition-colors bg-[#0a1f0a] hover:bg-[#143314] theme-border-target" style="border-color:#4ade80;" onclick="window.executeIdentifyVersion('2.0', '${uniqueId}')">
                  <div class="flex justify-between items-center mb-1">
                    <span class="text-xs font-bold theme-color-target" style="color:#4ade80;">ver.2.0 [ACTIVE]</span>
                    <span class="text-[10px]" style="color:${c.secondary_color};">2025.08.20</span>
                  </div>
                  <div class="text-xs" style="color:${c.secondary_color};">Post-traffic accident (MBTI & Strengths)</div>
                </div>
                <div class="p-3 border rounded cursor-pointer transition-colors bg-[#111] hover:bg-[#222]" style="border-color:#333;" onclick="window.executeIdentifyVersion('1.0', '${uniqueId}')">
                  <div class="flex justify-between items-center mb-1">
                    <span class="text-xs font-bold" style="color:#888;">ver.1.0 [ARCHIVED]</span>
                    <span class="text-[10px]" style="color:${c.secondary_color};">2025.07.10</span>
                  </div>
                  <div class="text-xs" style="color:${c.secondary_color};">Pre-traffic accident (MBTI & Strengths)</div>
                </div>
              </div>
              <div id="identify-result-${uniqueId}"></div>
            </div>`;
          
          printToOutput(html, 100).then(resolve);
          
          window.executeIdentifyVersion = async (version, targetId) => {
            let result = '';
            if (version === '2.0') {
              const traits = [
                { name: 'Extraverted', pct: 56, opposite: 'Introverted' },
                { name: 'Intuitive', pct: 94, opposite: 'Observant' },
                { name: 'Thinking', pct: 49, opposite: 'Feeling' },
                { name: 'Judging', pct: 53, opposite: 'Prospecting' },
                { name: 'Assertive', pct: 83, opposite: 'Turbulent' }
              ];
              
              let rows = traits.map(t => {
                let labelText = t.name === 'Thinking' ? `${100 - t.pct}% Feeling` : `${t.pct}% ${esc(t.name)}`;
                return `
                  <div class="text-xs mb-4">
                    <div class="flex items-center justify-between mb-1.5">
                      <span style="color:${c.text_color};">${esc(t.name)}</span>
                      <span style="color:${c.secondary_color};">${esc(t.opposite)}</span>
                    </div>
                    <div style="position:relative; height:16px; width:100%; background:#1a1a1a; border-radius:8px; border:1px solid #333;">
                      <div class="theme-bg-target theme-border-target" style="position:absolute; left:${100 - t.pct}%; top:50%; transform:translate(-50%, -50%); width:12px; height:12px; background:${c.primary_color}; border-radius:50%; border:2px solid #0c0c0c; z-index:2;"></div>
                      <div class="theme-bg-target" style="position:absolute; left:0; top:50%; transform:translateY(-50%); width:100%; height:2px; background:${c.primary_color}; opacity:0.3;"></div>
                    </div>
                    <div style="margin-top:4px; text-align:center; font-size:10px; color:${c.secondary_color};">${labelText}</div>
                  </div>`;
              }).join('');
              
              const strengths = [
                { name: 'Strategic Thinking', pct: 40.1123, pattern: 'solid' },
                { name: 'Influencing', pct: 28.4096, pattern: 'diagonal' },
                { name: 'Relationship Building', pct: 16.4441, pattern: 'grid' },
                { name: 'Executing', pct: 15.034, pattern: 'dots' }
              ];
              
              const patternDefs = `
                <svg width="0" height="0">
                  <defs>
                    <pattern id="v20-diagonal-pattern" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse"><rect x="0" y="0" width="8" height="8" fill="${c.primary_color}" class="theme-fill-target"/><line x1="0" y1="0" x2="8" y2="8" stroke="${c.background_color}" stroke-width="1.5"/><line x1="8" y1="0" x2="0" y2="8" stroke="${c.background_color}" stroke-width="1.5"/></pattern>
                    <pattern id="v20-grid-pattern" x="0" y="0" width="6" height="6" patternUnits="userSpaceOnUse"><rect x="0" y="0" width="6" height="6" fill="${c.primary_color}" class="theme-fill-target"/><line x1="3" y1="0" x2="3" y2="6" stroke="${c.background_color}" stroke-width="1"/><line x1="0" y1="3" x2="6" y2="3" stroke="${c.background_color}" stroke-width="1"/></pattern>
                    <pattern id="v20-dots-pattern" x="0" y="0" width="6" height="6" patternUnits="userSpaceOnUse"><rect x="0" y="0" width="6" height="6" fill="${c.primary_color}" class="theme-fill-target"/><circle cx="3" cy="3" r="1" fill="${c.background_color}"/></pattern>
                  </defs>
                </svg>`;
              
              let barHTML = patternDefs + strengths.map(s => {
                let fillVal = s.pattern === 'solid' ? c.primary_color : `url(#v20-${s.pattern}-pattern)`;
                let cls = s.pattern === 'solid' ? 'class="theme-fill-target"' : '';
                return `<svg style="display:inline-block; width:${s.pct}%; height:16px; vertical-align:top;" viewBox="0 0 100 16" preserveAspectRatio="none"><rect x="0" y="0" width="100" height="16" fill="${fillVal}" ${cls}/></svg>`;
              }).join('');
              
              const strengthsRows = strengths.map(s => {
                let fillVal = s.pattern === 'solid' ? c.primary_color : `url(#v20-${s.pattern}-pattern)`;
                let cls = s.pattern === 'solid' ? 'class="theme-fill-target"' : '';
                return `
                <div class="text-xs flex items-center justify-between" style="color:${c.text_color};">
                  <div class="flex items-center gap-2">
                    <svg width="12" height="12" style="border:1px solid #333;"><rect x="0" y="0" width="12" height="12" fill="${fillVal}" ${cls}/></svg>
                    <span>${esc(s.name)}</span>
                  </div>

      matrix() {
        const c = getConfig();
        return new Promise(resolve => {
          const canvas = document.createElement('canvas');
          canvas.style.position = 'fixed';
          canvas.style.top = '0';
          canvas.style.left = '0';
          canvas.style.width = '100%';
          canvas.style.height = '100%';
          canvas.style.zIndex = '9999';
          canvas.style.background = '#000';
          document.body.appendChild(canvas);
          const ctx = canvas.getContext('2d');
          
          let w = canvas.width = window.innerWidth;
          let h = canvas.height = window.innerHeight;
          
          const fontSize = 14;
          const columns = w / fontSize;
          const drops = [];
          for(let x = 0; x < columns; x++) drops[x] = 1;
          
          function draw() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, w, h);
            ctx.fillStyle = c.primary_color;
            ctx.font = fontSize + 'px monospace';
            for(let i = 0; i < drops.length; i++) {
              const text = String.fromCharCode(0x30A0 + Math.random() * 96);
              ctx.fillText(text, i * fontSize, drops[i] * fontSize);
              if(drops[i] * fontSize > h && Math.random() > 0.975) drops[i] = 0;
              drops[i]++;
            }
          }
          
          const interval = setInterval(draw, 33);
          
          const endMatrix = (e) => {
            if(e.type === 'keydown' && e.key !== 'Escape') return;
            clearInterval(interval);
            canvas.remove();
            window.removeEventListener('keydown', endMatrix);
            window.removeEventListener('click', endMatrix);
            resolve(`<div class="text-xs mt-2 theme-color-target" style="color:${c.primary_color};">Matrix simulation ended.</div>`);
          };
          
          window.addEventListener('keydown', endMatrix);
          window.addEventListener('click', endMatrix);
          
          printToOutput(`<div class="text-xs mb-2" style="color:${c.secondary_color};">Entering Matrix... Press ESC or Click to exit.</div>`, 0);
        });
      },

    // === COMMAND HANDLER ===
    async function handleCommand(input) {
      const c = getConfig();
      const trimmed = input.trim();
      
      if (!trimmed) return;

      const echo = document.createElement('div');
      echo.className = 'text-xs mt-3';
      echo.innerHTML = `<span class="theme-color-target" style="color:${c.primary_color};">ST@portfolio:~$</span> <span style="color:${c.text_color};">${esc(input)}</span>`;
      document.getElementById('output-area').appendChild(echo);

      commandHistory.unshift(trimmed);
      historyIndex = -1;

      // 引数の解析
      const parts = trimmed.split(/\s+/);
      const cmd = parts[0].toLowerCase();
      const args = parts.slice(1);

      if (commands[cmd]) {
        const result = await commands[cmd](args);
        if (result) await printToOutput(result, 100);
      } else {
        await printToOutput(`<div class="text-xs my-1" style="color:#f87171;">Command not found: '${esc(cmd)}'. Type <span class="theme-color-target" style="color:${c.primary_color};">help</span> for available commands.</div>`, 50);
      }
    }

    // === INPUT HANDLING ===
    const cmdInput = document.getElementById('cmd-input');
    cmdInput.addEventListener('keydown', async (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        const val = cmdInput.value;
        cmdInput.value = '';
        await handleCommand(val);
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        if (historyIndex < commandHistory.length - 1) {
          historyIndex++;
          cmdInput.value = commandHistory[historyIndex];
        }
      } else if (e.key === 'ArrowDown') {
        e.preventDefault();
        if (historyIndex > 0) {
          historyIndex--;
          cmdInput.value = commandHistory[historyIndex];
        } else {
          historyIndex = -1;
          cmdInput.value = '';
        }
      } else if (e.key === 'Tab') {
        e.preventDefault();
        const val = cmdInput.value.toLowerCase();
        if (!val) return;
        const matches = Object.keys(commands).filter(cmd => cmd.startsWith(val));
        if (matches.length === 1) {
          cmdInput.value = matches[0];
        } else if (matches.length > 1) {
          const echo = document.createElement('div');
          echo.className = 'text-xs mt-2 opacity-70';
          echo.style.color = getConfig().text_color;
          echo.textContent = matches.join('   ');
          document.getElementById('output-area').appendChild(echo);
        }
      }
    });

              set: (v) => { c[key] = v; window.elementSdk?.setConfig({ [key]: v }); }
            };
          }
          return {
            recolorables: [
              colorMutable('background_color'), colorMutable('surface_color'),
              colorMutable('text_color'), colorMutable('primary_color'), colorMutable('secondary_color')
            ],
            borderables: [],
            fontEditable: {

            },
