  <style>
    /* Theme Variables */
    :root {
      --bg-color: #0c0c0c;
      --surface-color: #1a1a1a;
      --text-color: #d4d4d4;
      --primary-color: #4ade80;
      --primary-bg: #4ade8026;
      --primary-bg-hover: #4ade8040;
      --secondary-color: #888888;
      --border-color: #333333;
    }

    /* Tailwind CSS Utilities Replacements */
    *, ::before, ::after { box-sizing: border-box; border-width: 0; border-style: solid; border-color: var(--border-color); }
    html { line-height: 1.5; -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
    
    .bg-\[\#111\] { background-color: #111; }
    .hover\:bg-\[\#222\]:hover { background-color: #222; }
    .bg-primary-dim { background-color: var(--primary-bg); }
    .hover\:bg-primary-dim-hover:hover { background-color: var(--primary-bg-hover); }

    .min-h-screen { min-height: 100vh; }
    .w-full { width: 100%; }
    .w-2\.5 { width: 0.625rem; }
    .h-2\.5 { height: 0.625rem; }
    .w-24 { width: 6rem; }
    .w-8 { width: 2rem; }
    .w-56 { width: 14rem; }
    .w-\[90\%\] { width: 90%; }
    .max-w-\[800px\] { max-width: 800px; }
    .max-w-\[300px\] { max-width: 300px; }
    .max-w-\[400px\] { max-width: 400px; }

    .flex { display: flex; }
    .hidden { display: none; }
    .block { display: block; }
    .inline-block { display: inline-block; }
    .grid { display: grid; }

    .flex-col { flex-direction: column; }
    .items-center { align-items: center; }
    .justify-between { justify-content: space-between; }
    .justify-center { justify-content: center; }
    .flex-1 { flex: 1 1 0%; }
    .flex-wrap { flex-wrap: wrap; }

    .gap-1\.5 { gap: 0.375rem; }
    .gap-2 { gap: 0.5rem; }
    .gap-1 { gap: 0.25rem; }
    .gap-4 { gap: 1rem; }

    .p-4 { padding: 1rem; }
    .p-3 { padding: 0.75rem; }
    .px-4 { padding-left: 1rem; padding-right: 1rem; }
    .px-3 { padding-left: 0.75rem; padding-right: 0.75rem; }
    .py-2 { padding-top: 0.5rem; padding-bottom: 0.5rem; }
    .py-1\.5 { padding-top: 0.375rem; padding-bottom: 0.375rem; }
    .pl-3 { padding-left: 0.75rem; }
    .pt-2 { padding-top: 0.5rem; }
    .pt-4 { padding-top: 1rem; }

    .m-0 { margin: 0; }
    .mt-4 { margin-top: 1rem; }
    .mt-auto { margin-top: auto; }
    .mt-3 { margin-top: 0.75rem; }
    .mt-0\.5 { margin-top: 0.125rem; }
    .mt-6 { margin-top: 1.5rem; }
    .mt-2 { margin-top: 0.5rem; }
    .mb-2 { margin-bottom: 0.5rem; }
    .mb-3 { margin-bottom: 0.75rem; }
    .mb-1 { margin-bottom: 0.25rem; }
    .mb-4 { margin-bottom: 1rem; }
    .mb-1\.5 { margin-bottom: 0.375rem; }
    .mb-6 { margin-bottom: 1.5rem; }
    .my-3 { margin-top: 0.75rem; margin-bottom: 0.75rem; }
    .my-4 { margin-top: 1rem; margin-bottom: 1rem; }
    .my-1 { margin-top: 0.25rem; margin-bottom: 0.25rem; }
    .ml-2 { margin-left: 0.5rem; }

    .space-y-1 > :not([hidden]) ~ :not([hidden]) { margin-top: 0.25rem; }
    .space-y-2 > :not([hidden]) ~ :not([hidden]) { margin-top: 0.5rem; }

    .border { border-width: 1px; }
    .border-b { border-bottom-width: 1px; }
    .border-t { border-top-width: 1px; }
    .border-l-2 { border-left-width: 2px; }
    .last\:border-0:last-child { border-width: 0; }
    .rounded-full { border-radius: 9999px; }
    .rounded { border-radius: 0.25rem; }

    .text-xs { font-size: 0.75rem; line-height: 1rem; }
    .text-sm { font-size: 0.875rem; line-height: 1.25rem; }
    .text-lg { font-size: 1.125rem; line-height: 1.75rem; }
    .text-\[10px\] { font-size: 10px; }
    
    .font-bold { font-weight: 700; }
    .tracking-wider { letter-spacing: 0.05em; }
    .whitespace-nowrap { white-space: nowrap; }
    .text-right { text-align: right; }
    .text-red-500 { color: #ef4444; }
    .italic { font-style: italic; }
    .leading-relaxed { line-height: 1.625; }
    .leading-tight { line-height: 1.25; }
    .truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .cursor-pointer { cursor: pointer; }
    .transition-colors { transition-property: color, background-color, border-color, text-decoration-color, fill, stroke; transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1); transition-duration: 150ms; }
    .opacity-50 { opacity: 0.5; }
    .opacity-70 { opacity: 0.7; }
    .hover\:underline:hover { text-decoration: underline; }

    @media (min-width: 768px) {
      .md\:p-6 { padding: 1.5rem; }
      .md\:gap-8 { gap: 2rem; }
      .md\:text-sm { font-size: 0.875rem; line-height: 1.25rem; }
    }

    /* Custom Styles */
    html, body { 
      margin: 0; 
      background-color: var(--bg-color);
      color: var(--text-color);
    }
    
    html, body, input, textarea, button, select, * { 
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace !important; 
    }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in {
      animation: fadeSlide 0.5s ease forwards;
      opacity: 0;
    }

    @keyframes dance {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      25% { transform: translateY(-4px) rotate(-15deg); }
      50% { transform: translateY(0) rotate(0deg); }
      75% { transform: translateY(-4px) rotate(15deg); }
    }
    .dancing-emoji {
      display: inline-block;
      animation: dance 1s ease-in-out infinite;
      margin-left: 8px;
    }

    @keyframes shake {
      0% { transform: translate(1px, 1px) rotate(0deg); }
      10% { transform: translate(-1px, -2px) rotate(-1deg); }
      20% { transform: translate(-3px, 0px) rotate(1deg); }
      30% { transform: translate(3px, 2px) rotate(0deg); }
      40% { transform: translate(1px, -1px) rotate(1deg); }
      50% { transform: translate(-1px, 2px) rotate(-1deg); }
      60% { transform: translate(-3px, 1px) rotate(0deg); }
      70% { transform: translate(3px, 1px) rotate(-1deg); }
      80% { transform: translate(-1px, -1px) rotate(1deg); }
      90% { transform: translate(1px, 2px) rotate(0deg); }
      100% { transform: translate(1px, -2px) rotate(-1deg); }
    }
    .shake-animation {
      animation: shake 0.3s infinite;
    }

    .scanline {
      pointer-events: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 0, 0, 0.03) 2px,
        rgba(0, 0, 0, 0.03) 4px
      );
      z-index: 999;
    }

    .glow { text-shadow: 0 0 8px currentColor; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-color); }
    ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 3px; }

    .cmd-input {
      background: transparent;
      border: none;
      outline: none;
      caret-color: var(--primary-color);
      color: var(--text-color);
    }

    /* Window Buttons styling */
    .window-btn-group:hover .window-icon {
      opacity: 1;
    }
    .window-icon {
      opacity: 0;
      transition: opacity 0.2s;
      color: rgba(0, 0, 0, 0.6);
      width: 6px;
      height: 6px;
    }
    .window-btn {
      transition: opacity 0.2s, transform 0.1s;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .window-btn:hover {
      opacity: 0.8;
    }
    .window-btn:active {
      transform: scale(0.9);
    }
  </style>
 </head>
 <body>
  <div id="app" class="min-h-screen w-full flex flex-col transition-opacity duration-500">
   <div class="scanline"></div>
   <header class="flex items-center justify-between px-4 py-2 border-b" style="background: var(--surface-color);">
    <div class="flex gap-1.5 window-btn-group">
     <!-- Added IDs, cursor styles, and titles for Mac-like buttons -->
     <div id="btn-close" class="w-2.5 h-2.5 rounded-full window-btn" style="background:#f87171;" title="Close Terminal">
       <svg class="window-icon" viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="20" stroke-linecap="round"><path d="M25 25 L75 75 M75 25 L25 75"/></svg>
     </div>
     <div id="btn-minimize" class="w-2.5 h-2.5 rounded-full window-btn" style="background:#fbbf24;" title="Enter Matrix">
       <svg class="window-icon" viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="20" stroke-linecap="round"><path d="M20 50 L80 50"/></svg>
     </div>
     <div id="btn-maximize" class="w-2.5 h-2.5 rounded-full window-btn" style="background:#4ade80;" title="Toggle Fullscreen">
       <svg class="window-icon" viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="15" stroke-linecap="round" stroke-linejoin="round">
         <path d="M20 40 L20 20 L40 20 M80 60 L80 80 L60 80 M20 20 L45 45 M80 80 L55 55"/>
       </svg>
     </div>
    </div>
    <div class="flex items-center gap-2">
     <span style="color: var(--primary-color);">▸</span> <span id="titlebar-name" class="text-xs tracking-wider" style="color: var(--secondary-color);">ST@portfolio:~</span>
    </div>
   </header>
   
   <main id="terminal-body" class="flex-1 p-4 md:p-6 space-y-1" style="scroll-behavior:smooth;">
    <div id="boot-area"></div>
    <div id="output-area"></div>
    <div class="hidden items-center gap-2 mt-4" id="input-line">
     <span id="prompt-prefix" class="text-xs whitespace-nowrap" style="color: var(--primary-color);">ST@portfolio:~$</span> 
     <input type="text" id="cmd-input" class="cmd-input flex-1 text-sm" autocomplete="off" spellcheck="false" placeholder="type 'help'..." aria-label="Command input">
    </div>
   </main>
   
   <footer id="terminal-footer" class="flex items-center justify-between px-4 py-1.5 text-xs border-t mt-auto" style="background: var(--surface-color); color:#666;">
    <span id="status-left">READY</span> <span id="status-right"></span>
   </footer>
  </div>

  <script>
    // === CONFIG ===
    const config = {
      display_name: 'Shinya Takeda',
      job_title: 'Digital Marketer',
      location_text: 'Saitama, Japan',
    };

    let commandHistory = [];
    let historyIndex = -1;

    // === PORTFOLIO DATA ===
    const projects = [
      { name: '/dj', desc: 'Overview | DJ Human Choreomania Project', tech: 'Big room House, full-on Psytrance, Dance POP, Parapara', link: 'https://tk.st/dj' },
      { name: '/job', desc: 'An Optimization and data-driven growth strategy.', tech: 'EC, AB Testing, UIUX, Search Engine, Web ads, GA4, Looker, ADK', link: 'https://tk.st/job' },
      { name: '/game', desc: 'AI coding benchmark: Game Sandbox', tech: 'Gemini, ChatGPT, Canva AI, Claude, Antigravity', link: 'https://tk.st/game' },
      { name: '/think', desc: 'A shared margin for contemplating the essence of life.', tech: 'Erich Fromm, Friedrich Nietzsche, Epictetus, Buddha', link: 'https://tk.st/think' },
      { name: '/glitch', desc: 'Finding the "bugs" that lead to better living.', tech: 'A Dialectical Lens, Deconstructive Urge', link: 'https://tk.st/glitch' }
    ];

    // === HELPER FUNCTIONS ===
    window.toggleBitcoinMenu = (targetId, allIds) => {
      allIds.forEach(id => {
        const el = document.getElementById(id);
        if(id === targetId) {
          el.classList.toggle('hidden');
          el.classList.toggle('flex');
        } else {
          el.classList.add('hidden');
          el.classList.remove('flex');
        }
      });
    };

    function esc(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    function printToOutput(html, delay = 0) {
      return new Promise(resolve => {
        setTimeout(() => {
          const div = document.createElement('div');
          div.className = 'fade-in';
          div.style.animationDelay = '0s';
          div.innerHTML = html;
          document.getElementById('output-area').appendChild(div);
          resolve();
        }, delay);
      });
    }

    function createMBTIRows(traits, isVer2) {
      return traits.map(t => {
        let labelText = t.name === 'Thinking' ? `${100 - t.pct}% Feeling` : `${t.pct}% ${esc(t.name)}`;
        let colorVar = isVer2 ? 'var(--primary-color)' : 'var(--secondary-color)';
        return `
          <div class="text-xs mb-4">
            <div class="flex items-center justify-between mb-1.5">
              <span style="color: var(--text-color);">${esc(t.name)}</span>
              <span style="color: var(--secondary-color);">${esc(t.opposite)}</span>
            </div>
            <div style="position:relative; height:16px; width:100%; background: var(--surface-color); border-radius:8px; border:1px solid var(--border-color);">
              <div style="position:absolute; left:${100 - t.pct}%; top:50%; transform:translate(-50%, -50%); width:12px; height:12px; background:${colorVar}; border-radius:50%; border:2px solid var(--bg-color); z-index:2;"></div>
              <div style="position:absolute; left:0; top:50%; transform:translateY(-50%); width:100%; height:2px; background:${colorVar}; opacity:0.3;"></div>
            </div>
            <div style="margin-top:4px; text-align:center; font-size:10px; color: var(--secondary-color);">${labelText}</div>
          </div>`;
      }).join('');
    }

    function createStrengthsHTML(strengths, isVer2) {
      let colorVar = isVer2 ? 'var(--primary-color)' : 'var(--secondary-color)';
      let verPrefix = isVer2 ? 'v20' : 'v10';
      
      const patternDefs = `
        <svg width="0" height="0">
          <defs>
            <pattern id="${verPrefix}-diagonal-pattern" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse"><rect x="0" y="0" width="8" height="8" fill="${colorVar}"/><line x1="0" y1="0" x2="8" y2="8" stroke="var(--bg-color)" stroke-width="1.5"/><line x1="8" y1="0" x2="0" y2="8" stroke="var(--bg-color)" stroke-width="1.5"/></pattern>
            <pattern id="${verPrefix}-grid-pattern" x="0" y="0" width="6" height="6" patternUnits="userSpaceOnUse"><rect x="0" y="0" width="6" height="6" fill="${colorVar}"/><line x1="3" y1="0" x2="3" y2="6" stroke="var(--bg-color)" stroke-width="1"/><line x1="0" y1="3" x2="6" y2="3" stroke="var(--bg-color)" stroke-width="1"/></pattern>
            <pattern id="${verPrefix}-dots-pattern" x="0" y="0" width="6" height="6" patternUnits="userSpaceOnUse"><rect x="0" y="0" width="6" height="6" fill="${colorVar}"/><circle cx="3" cy="3" r="1" fill="var(--bg-color)"/></pattern>
          </defs>
        </svg>`;

      let barHTML = patternDefs + strengths.map(s => {
        let fillVal = s.pattern === 'solid' ? colorVar : `url(#${verPrefix}-${s.pattern}-pattern)`;
        return `<svg style="display:inline-block; width:${s.pct}%; height:16px; vertical-align:top;" viewBox="0 0 100 16" preserveAspectRatio="none"><rect x="0" y="0" width="100" height="16" fill="${fillVal}"/></svg>`;
      }).join('');

      const strengthsRows = strengths.map(s => {
        let fillVal = s.pattern === 'solid' ? colorVar : `url(#${verPrefix}-${s.pattern}-pattern)`;
        return `
        <div class="text-xs flex items-center justify-between" style="color: var(--text-color);">
          <div class="flex items-center gap-2">
            <svg width="12" height="12" style="border:1px solid var(--border-color);"><rect x="0" y="0" width="12" height="12" fill="${fillVal}"/></svg>
            <span>${esc(s.name)}</span>
          </div>
          <span style="color: var(--secondary-color);">${s.pct.toFixed(1)}%</span>
        </div>`;
      }).join('');

      return { barHTML, strengthsRows };
    }

    function createThemesTable(themes, isVer2) {
      let rankColorVar = isVer2 ? 'var(--primary-color)' : 'var(--secondary-color)';
      return themes.map(row => `
        <div class="flex text-xs border-b last:border-0" style="border-color: var(--border-color); padding:8px 0;">
          <div class="w-8" style="color: ${rankColorVar};">${row.rank}</div>
          <div class="flex-1 truncate" style="color: var(--text-color);">${row.theme}</div>
          <div class="w-56 text-right truncate" style="color: var(--secondary-color);">${row.category}</div>
        </div>`).join('');
    }

    // === COMMANDS ===
    const commands = {
      help() {
        return `
          <div class="my-3 space-y-1 w-[90%] max-w-[800px]">
            <div style="color: var(--primary-color);" class="glow text-sm font-bold mb-2">Available Commands:</div>
            <div class="grid gap-1 text-xs" style="color: var(--text-color);">
              <div class="flex"><span class="w-24" style="color: var(--primary-color);">about</span><span>- Learn about me</span></div>
              <div class="flex"><span class="w-24" style="color: var(--primary-color);">identify</span><span>- View personality versions</span></div>
              <div class="flex"><span class="w-24" style="color: var(--primary-color);">pages</span><span>- Explore Web2 creations</span></div>
              <div class="flex"><span class="w-24" style="color: var(--primary-color);">bitcoin</span><span>- Enjoy Web3 journey</span></div>
              <div class="flex"><span class="w-24" style="color: var(--primary-color);">magi</span><span>- Talk to ST multi-agent</span></div>
              <div class="flex"><span class="w-24" style="color: var(--primary-color);">contact</span><span>- Contact me</span></div>
              <div class="flex"><span class="w-24" style="color: var(--primary-color);">clear</span><span>- Clear terminal</span></div>
              <div class="flex"><span class="w-24" style="color: var(--primary-color);">help</span><span>- Show this menu</span></div>
            </div>
            <div class="text-[10px] mt-4 opacity-50 italic">Tip: Use [Tab] to autocomplete. Some hidden commands may exist...</div>
          </div>`;
      },

      '/dj'() { window.open('https://tk.st/dj', '_blank', 'noopener,noreferrer'); return `<div class="my-3 text-xs" style="color: var(--primary-color);">Opening /dj...</div>`; },
      '/job'() { window.open('https://tk.st/job', '_blank', 'noopener,noreferrer'); return `<div class="my-3 text-xs" style="color: var(--primary-color);">Opening /job...</div>`; },
      '/game'() { window.open('https://tk.st/game', '_blank', 'noopener,noreferrer'); return `<div class="my-3 text-xs" style="color: var(--primary-color);">Opening /game...</div>`; },
      '/think'() { window.open('https://tk.st/think', '_blank', 'noopener,noreferrer'); return `<div class="my-3 text-xs" style="color: var(--primary-color);">Opening /think...</div>`; },
      '/glitch'() { window.open('https://tk.st/glitch', '_blank', 'noopener,noreferrer'); return `<div class="my-3 text-xs" style="color: var(--primary-color);">Opening /glitch...</div>`; },

      bitcoin() {
        const uniqueId = Date.now();
        const allIds = `['earn-opts-${uniqueId}', 'buy-opts-${uniqueId}', 'use-opts-${uniqueId}', 'view-opts-${uniqueId}']`;

        return `
          <div class="my-3 w-[90%] max-w-[800px]">
            <div class="text-sm font-bold glow mb-3" style="color: var(--primary-color);">BITCOIN YEN Ecosystem</div>
            <div class="flex gap-2 flex-wrap">
              <div class="px-3 py-1.5 border rounded cursor-pointer transition-colors text-xs bg-primary-dim hover:bg-primary-dim-hover" style="border-color: var(--primary-color);" onclick="window.toggleBitcoinMenu('earn-opts-${uniqueId}', ${allIds})">

      matrix() {
        return new Promise(resolve => {
          const canvas = document.createElement('canvas');
          canvas.style.position = 'fixed';
          canvas.style.top = '0';
          canvas.style.left = '0';
          canvas.style.width = '100%';
          canvas.style.height = '100%';
          canvas.style.zIndex = '9999';
          canvas.style.background = '#000';
          document.body.appendChild(canvas);
          const ctx = canvas.getContext('2d');
          
          let w = canvas.width = window.innerWidth;
          let h = canvas.height = window.innerHeight;
          
          const fontSize = 14;
          const columns = w / fontSize;
          const drops = [];
          for(let x = 0; x < columns; x++) drops[x] = 1;
          
          // 現在のプライマリカラーを取得
          const primaryColor = getComputedStyle(document.documentElement).getPropertyValue('--primary-color').trim() || '#4ade80';

          function draw() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, w, h);
            ctx.fillStyle = primaryColor;
            ctx.font = fontSize + 'px monospace';
            for(let i = 0; i < drops.length; i++) {
              const text = String.fromCharCode(0x30A0 + Math.random() * 96);
              ctx.fillText(text, i * fontSize, drops[i] * fontSize);
              if(drops[i] * fontSize > h && Math.random() > 0.975) drops[i] = 0;
              drops[i]++;
            }
          }
          
          const interval = setInterval(draw, 33);
          
          const endMatrix = (e) => {
            if(e.type === 'keydown' && e.key !== 'Escape') return;
            clearInterval(interval);
            canvas.remove();
            window.removeEventListener('keydown', endMatrix);
            window.removeEventListener('click', endMatrix);
            resolve(`<div class="text-xs mt-2" style="color: var(--primary-color);">Matrix simulation ended.</div>`);
          };
          
          window.addEventListener('keydown', endMatrix);
          window.addEventListener('click', endMatrix);
          
          printToOutput(`<div class="text-xs mb-2" style="color: var(--secondary-color);">Entering Matrix... Press ESC or Click to exit.</div>`, 0);
        });
      },

      if (!trimmed) return;

      const echo = document.createElement('div');
      echo.className = 'text-xs mt-3';
      echo.innerHTML = `<span style="color: var(--primary-color);">ST@portfolio:~$</span> <span style="color: var(--text-color);">${esc(input)}</span>`;
      document.getElementById('output-area').appendChild(echo);

      commandHistory.unshift(trimmed);
      historyIndex = -1;

      // 引数の解析
      const parts = trimmed.split(/\s+/);
      const cmd = parts[0].toLowerCase();
      const args = parts.slice(1);

      if (commands[cmd]) {
        const result = await commands[cmd](args);
        if (result) await printToOutput(result, 100);
      } else {
        await printToOutput(`<div class="text-xs my-1" style="color:#f87171;">Command not found: '${esc(cmd)}'. Type <span style="color: var(--primary-color);">help</span> for available commands.</div>`, 50);
      }
    }

    // === INPUT HANDLING ===
    const cmdInput = document.getElementById('cmd-input');
    cmdInput.addEventListener('keydown', async (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        const val = cmdInput.value;
        cmdInput.value = '';
        await handleCommand(val);
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        if (historyIndex < commandHistory.length - 1) {
          historyIndex++;
          cmdInput.value = commandHistory[historyIndex];
        }
      } else if (e.key === 'ArrowDown') {
        e.preventDefault();
        if (historyIndex > 0) {
          historyIndex--;
          cmdInput.value = commandHistory[historyIndex];
        } else {
          historyIndex = -1;
          cmdInput.value = '';
        }
      } else if (e.key === 'Tab') {
        e.preventDefault();
        const val = cmdInput.value.toLowerCase();
        if (!val) return;
        const matches = Object.keys(commands).filter(cmd => cmd.startsWith(val));
        if (matches.length === 1) {
          cmdInput.value = matches[0];
        } else if (matches.length > 1) {
          const echo = document.createElement('div');
          echo.className = 'text-xs mt-2 opacity-70';
          echo.style.color = 'var(--text-color)';
          echo.textContent = matches.join('   ');
          document.getElementById('output-area').appendChild(echo);
        }
      }
    });

    document.getElementById('app').addEventListener('click', (e) => {
      if (window.getSelection().toString()) return;
      if (e.target.tagName === 'A' || e.target.closest('a') || e.target.closest('.cursor-pointer') || e.target.tagName === 'INPUT') return;
      // ウィンドウボタンのクリック時はフォーカスを奪わない
      if (e.target.classList.contains('window-btn')) return;
      
      cmdInput.focus();
    });

    function updateTime() {
      const statusElement = document.getElementById('status-right');
      if (statusElement) {
        statusElement.textContent = new Date().toLocaleTimeString('en-US', { hour12: false });
      }
    }
    setInterval(updateTime, 1000);
    updateTime();

    // === WINDOW BUTTONS LOGIC ===
    const btnClose = document.getElementById('btn-close');
    const btnMinimize = document.getElementById('btn-minimize');
    const btnMaximize = document.getElementById('btn-maximize');

    // 赤：シャットダウン
    btnClose.addEventListener('click', () => {
      const app = document.getElementById('app');
      app.style.opacity = '0'; // フェードアウト
      setTimeout(() => {
        // 真っ暗な画面にメッセージを表示
        document.body.innerHTML = `
          <div style="height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; font-family:monospace; background:#000; color:var(--secondary-color); cursor:pointer;" onclick="location.reload()">
            <div style="margin-bottom:1rem; animation:fadeSlide 1s ease forwards;">Connection closed.</div>
            <div class="hover:underline" style="color:var(--primary-color); animation:fadeSlide 1s ease forwards; animation-delay: 0.5s; opacity:0;">[ Click anywhere to reconnect ]</div>
          </div>
        `;
      }, 500);
    });

    // 黄：マトリックスエフェクト
    btnMinimize.addEventListener('click', async (e) => {
      e.stopPropagation(); // クリックイベントの伝播を防ぎ、即座に終了するのを防止する
      const result = await commands.matrix();
      if (result) await printToOutput(result, 100);
    });

    // 緑：フルスクリーン
    btnMaximize.addEventListener('click', () => {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(err => {
          // iframeなどフルスクリーンが許可されていない環境の場合のフォールバックエラー表示
          printToOutput(`<div class="text-xs text-red-500 mt-2 font-bold">[!] ERROR: Fullscreen API is blocked in this environment.</div>`, 0);
        });
      } else {
        if (document.exitFullscreen) {
          document.exitFullscreen();
        }
      }
    });

    boot();
  </script>
 </body>
</html>
