<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MAGI</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-950 text-gray-100 flex items-center justify-center p-4">

  <div class="w-full max-w-2xl">
    <h1 class="text-2xl font-bold mb-6 text-center tracking-widest text-green-400">MAGI</h1>

    <div class="bg-gray-900 rounded-2xl p-6 shadow-xl border border-gray-800">
      <textarea
        id="question"
        rows="4"
        placeholder="質問を入力..."
        class="w-full bg-gray-800 text-gray-100 rounded-xl p-4 text-sm resize-none outline-none focus:ring-2 focus:ring-green-500 border border-gray-700 placeholder-gray-500"
      ></textarea>

      <!-- 画像アップロード -->
      <div class="mt-4">
        <label
          for="imageInput"
          class="flex items-center justify-center gap-2 w-full border-2 border-dashed border-gray-700 rounded-xl p-4 cursor-pointer hover:border-green-600 transition-colors text-gray-400 hover:text-green-400 text-sm"
        >
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
          </svg>
          <span id="imageLabel">画像を選択（任意）</span>
        </label>
        <input id="imageInput" type="file" accept="image/*" class="hidden" onchange="onImageChange(this)">
      </div>

      <!-- プレビュー -->
      <div id="preview" class="hidden mt-3 relative">
        <img id="previewImg" class="rounded-xl max-h-48 object-contain w-full bg-gray-800">
        <button onclick="clearImage()" class="absolute top-2 right-2 bg-gray-900 hover:bg-red-600 rounded-full p-1 transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>

      <button
        id="submitBtn"
        onclick="submit()"
        class="mt-4 w-full bg-green-600 hover:bg-green-500 text-white font-bold py-3 rounded-xl transition-colors disabled:opacity-40 disabled:cursor-not-allowed"
      >
        送信
      </button>
    </div>

    <!-- ステータス -->
    <div id="status" class="mt-4 text-center text-sm text-gray-400 hidden"></div>

    <!-- 結果 -->
    <div id="result" class="hidden mt-4 bg-gray-900 rounded-2xl p-6 border border-gray-800">
      <h2 class="text-xs text-gray-500 uppercase tracking-widest mb-3">回答</h2>
      <div id="resultText" class="text-gray-100 text-sm leading-relaxed whitespace-pre-wrap"></div>
    </div>
  </div>

  <script>
    const API = 'https://workers.tk.st/magi';
    let imageBase64 = null;

    function onImageChange(input) {
      const file = input.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = (e) => {
        // base64部分のみ抽出（"data:image/jpeg;base64," を除く）
        imageBase64 = e.target.result.split(',')[1];
        document.getElementById('previewImg').src = e.target.result;
        document.getElementById('preview').classList.remove('hidden');
        document.getElementById('imageLabel').textContent = file.name;
      };
      reader.readAsDataURL(file);
    }

    function clearImage() {
      imageBase64 = null;
      document.getElementById('imageInput').value = '';
      document.getElementById('preview').classList.add('hidden');
      document.getElementById('imageLabel').textContent = '画像を選択（任意）';
    }

    async function submit() {
      const question = document.getElementById('question').value.trim();
      if (!question) return;

      const btn = document.getElementById('submitBtn');
      const resultEl = document.getElementById('result');
      const resultText = document.getElementById('resultText');

      btn.disabled = true;
      resultEl.classList.add('hidden');
      setStatus('送信中...');

      try {
        // ① 質問を投げる
        const body = { question, session_id: 'browser' };
        if (imageBase64) body.image = imageBase64;

        const askRes = await fetch(API, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });

        if (!askRes.ok) throw new Error(`エラー: ${askRes.status}`);
        const { job_id } = await askRes.json();

        // ② 2分待つ
        for (let i = 120; i > 0; i--) {
          setStatus(`処理中... ${i}秒後にポーリング開始`);
          await sleep(1000);
        }

        // ③ 30秒ごとにポーリング（最大20回 = 10分）
        let attempts = 0;
        while (attempts < 20) {
          attempts++;

          const res = await fetch(`${API}/${job_id}`);
          const data = await res.json();

          if (data.status === 'done') {
            setStatus('');
            resultText.textContent = typeof data.result === 'string'
              ? data.result
              : JSON.stringify(data.result, null, 2);
            resultEl.classList.remove('hidden');
            break;
          }

          if (data.status === 'error') {
            throw new Error(data.error || '処理エラー');
          }

          for (let i = 30; i > 0; i--) {
            setStatus(`処理中... 次の確認まで ${i}秒 (${attempts}回目)`);
            await sleep(1000);
          }
        }

        if (attempts >= 20) throw new Error('タイムアウト');

      } catch (e) {
        setStatus(`❌ ${e.message}`);
      } finally {
        btn.disabled = false;
      }
    }

    function setStatus(msg) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.classList.toggle('hidden', !msg);
    }

    function sleep(ms) {
      return new Promise(r => setTimeout(r, ms));
    }
  </script>

</body>
</html>
