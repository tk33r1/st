  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg: #120c24;
      --surface: #221646;
      --text: #f6f2ff;
      --primary: #00e5ff;
      --secondary: #ff4fd8;
    }

    html, body {
      height: 100%;
      width: 100%;
    }

    body {
      margin: 0;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px),
        radial-gradient(circle at 20% 20%, rgba(0,229,255,0.18), transparent 24%),
        radial-gradient(circle at 80% 15%, rgba(255,79,216,0.18), transparent 22%),
        linear-gradient(180deg, #0b0718 0%, #120c24 55%, #1c1032 100%);
      background-size: 24px 24px, 24px 24px, 100% 100%, 100% 100%, 100% 100%;
      color: var(--text);
      font-family: "VT323", monospace;
      overflow: hidden;
    }

    /* 楽しい背景：動く星屑 */
    .stars-bg {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background-image: 
        radial-gradient(2px 2px at 20px 30px, #fff, rgba(0,0,0,0)),
        radial-gradient(2px 2px at 40px 70px, #00e5ff, rgba(0,0,0,0)),
        radial-gradient(2px 2px at 50px 160px, #fff, rgba(0,0,0,0)),
        radial-gradient(2px 2px at 90px 40px, #ff4fd8, rgba(0,0,0,0)),
        radial-gradient(2px 2px at 130px 80px, #fff, rgba(0,0,0,0)),
        radial-gradient(2px 2px at 160px 120px, #00e5ff, rgba(0,0,0,0));
      background-repeat: repeat;
      background-size: 200px 200px;
      animation: stars-anim 60s linear infinite;
      opacity: 0.4;
    }
    @keyframes stars-anim {
      from { transform: translateY(0); }
      to { transform: translateY(-2000px); }
    }

    /* ワクワク機能：ブラウン管テレビ起動エフェクト */
    .crt-turn-on {
      animation: turn-on 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards;
    }
    @keyframes turn-on {
      0% { transform: scale(1, 0.01); filter: brightness(10); opacity: 0; }
      40% { transform: scale(1, 0.02); filter: brightness(5); opacity: 1; }
      100% { transform: scale(1, 1); filter: brightness(1); }
    }

    /* 隠し要素：パーティモード */
    .party-mode {
      animation: rainbow-bg 3s linear infinite;
    }
    @keyframes rainbow-bg {
      0% { filter: hue-rotate(0deg); }
      100% { filter: hue-rotate(360deg); }
    }

    .vignette {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(circle at center, transparent 50%, rgba(0, 0, 0, 0.6) 120%);
      z-index: 45;
    }

    .scanlines::before {
      content: "";
      position: fixed;
      inset: -100% 0;
      pointer-events: none;
      background: linear-gradient(to bottom, rgba(255,255,255,0.02), rgba(255,255,255,0.01) 50%, rgba(0,0,0,0.08) 51%, rgba(0,0,0,0.03));
      background-size: 100% 4px;
      opacity: 0.4;
      mix-blend-mode: screen;
      z-index: 50;
      animation: scanline 10s linear infinite;
    }

    @keyframes scanline {
      0% { transform: translateY(0); }
      100% { transform: translateY(50%); }
    }

    .pixel-title {
      font-family: "Press Start 2P", cursive;
      text-shadow: 0 0 8px rgba(0,229,255,0.45), 0 0 18px rgba(255,79,216,0.35);
      letter-spacing: 0.08em;
    }

    /* ワクワク機能：ホバー時のグリッチエフェクト */
    .glitch {
      position: relative;
    }
    .group:hover .glitch::before, .group:hover .glitch::after {
      content: attr(data-text);
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      opacity: 0.8;
    }
    .group:hover .glitch::before {
      color: var(--primary);
      z-index: -1;
      animation: glitch-anim 0.3s cubic-bezier(.25, .46, .45, .94) both infinite;
    }
    .group:hover .glitch::after {
      color: var(--secondary);
      z-index: -2;
      animation: glitch-anim-2 0.3s cubic-bezier(.25, .46, .45, .94) reverse both infinite;
    }
    @keyframes glitch-anim {
      0% { transform: translate(0) }
      20% { transform: translate(-2px, 2px) }
      40% { transform: translate(-2px, -2px) }
      60% { transform: translate(2px, 2px) }
      80% { transform: translate(2px, -2px) }
      100% { transform: translate(0) }
    }
    @keyframes glitch-anim-2 {
      0% { transform: translate(0) }
      20% { transform: translate(2px, -2px) }
      40% { transform: translate(2px, 2px) }
      60% { transform: translate(-2px, -2px) }
      80% { transform: translate(-2px, 2px) }
      100% { transform: translate(0) }
    }

    .retro-panel {
      background: color-mix(in srgb, var(--surface) 88%, black 12%);
      border: 3px solid var(--primary);
      box-shadow: 0 0 0 3px rgba(255,79,216,0.18) inset, 0 0 24px rgba(0,229,255,0.14);
    }

    .game-card {
      background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02)), var(--surface);
      border: 2px solid rgba(0,229,255,0.4);
      box-shadow: 0 0 0 2px rgba(255,79,216,0.1) inset, 0 12px 24px rgba(0,0,0,0.28);
      transition: transform 250ms cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 250ms ease, border-color 250ms ease;
    }

    .game-card:hover {
      transform: translateY(-6px) scale(1.02);
      border-color: var(--secondary);
      box-shadow: 0 0 0 2px rgba(0,229,255,0.2) inset, 0 20px 35px rgba(0,0,0,0.4);
    }

    .pixel-btn {
      font-family: "Press Start 2P", cursive;
      border: 2px solid var(--text);
      box-shadow: 4px 4px 0 rgba(0,0,0,0.35);
      transition: transform 100ms ease, box-shadow 100ms ease, filter 160ms ease;
      cursor: pointer;
    }

    .pixel-btn:hover {
      filter: brightness(1.15);
    }

    .pixel-btn:active {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0 rgba(0,0,0,0.35);
    }

    .pixel-input {
      background: rgba(10, 8, 22, 0.82);
      border: 2px solid rgba(246,242,255,0.25);
      color: var(--text);
      font-family: "VT323", monospace;
    }

    .pixel-input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(0,229,255,0.18);
    }

    select.pixel-input {
      background-image: url('data:image/svg+xml;utf8,<svg fill="%23f6f2ff" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M7 10l5 5 5-5z"/></svg>');
      background-repeat: no-repeat;
      background-position: right 8px center;
      padding-right: 32px;
    }

    .fade-up { animation: fadeUp 500ms ease both; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .img-frame {
      background: linear-gradient(135deg, rgba(0,229,255,0.18), rgba(255,79,216,0.16)), #0e0a1d;
      border: 2px solid rgba(246,242,255,0.16);
    }

    .status-chip {
      border: 1px solid rgba(246,242,255,0.18);
      background: rgba(255,255,255,0.05);
    }

    .retro-heart {
      display: inline-block;
      width: 44px; height: 44px;
      background-image: url('data:image/svg+xml;utf8,<svg viewBox="0 0 8 8" xmlns="http://www.w3.org/2000/svg"><path d="M1 2h2v1H1zM5 2h2v1H5zM0 3h8v2H0zM1 5h6v1H1zM2 6h4v1H2zM3 7h2v1H3z" fill="%23ff1744"/></svg>');
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      animation: pixelHeartbeat 1.2s ease-in-out infinite;
      image-rendering: pixelated;
      filter: drop-shadow(0 0 6px rgba(255, 23, 68, 0.6));
    }

    @keyframes pixelHeartbeat {
      0% { transform: scale(1); }
      15% { transform: scale(1.25); }
      30% { transform: scale(1); }
      45% { transform: scale(1.25); }
      60% { transform: scale(1); }
      100% { transform: scale(1); }
    }
  </style>
</head>

<body class="h-full relative">
  <div class="stars-bg"></div>
  <div class="vignette"></div>
  
  <div id="app" class="scanlines crt-turn-on h-full w-full overflow-auto relative z-10">
    <header class="w-full px-4 sm:px-6 lg:px-10 pt-6 pb-4">
      <div class="max-w-6xl mx-auto retro-panel rounded-none p-4 sm:p-6">
        <div class="flex flex-col gap-5 md:flex-row md:items-center md:justify-between">
          
          <div class="flex items-center gap-3">
            <h1 id="title-text" class="pixel-title leading-tight text-[24px] sm:text-[28px]">ST GAMES</h1>
            <div class="retro-heart ml-3 sm:ml-5"></div>
          </div>
          
          <div class="flex flex-col sm:flex-row items-stretch sm:items-center gap-3 w-full md:w-auto">
            <div class="relative w-full sm:w-56">
              <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 opacity-60"></i>
              <input type="text" id="search-input" aria-label="Search games" placeholder="SEARCH..." class="pixel-input w-full pl-9 pr-4 py-2.5 text-[20px] snd-hover" autocomplete="off">
            </div>
            
            <select id="sort-select" aria-label="Sort games" class="pixel-input appearance-none px-3 py-2.5 text-[20px] cursor-pointer snd-hover">
              <option value="newest">NEWEST</option>
              <option value="oldest">OLDEST</option>
              <option value="title">TITLE</option>
            </select>

            <div class="status-chip px-4 py-2.5 flex items-center justify-center gap-2 text-[18px] whitespace-nowrap">
              <i data-lucide="database" class="w-4 h-4 text-cyan-400"></i>
              <span>SAVED: <span id="game-count">0</span></span>
            </div>
          </div>
          
        </div>
      </div>
    </header>
    
    <main class="w-full px-4 sm:px-6 lg:px-10 pb-40 relative z-10">
      <section class="max-w-6xl mx-auto">
        <div id="message-bar" class="hidden mb-4 retro-panel px-4 py-3 text-[20px]"></div>
        
        <div id="empty-state" class="retro-panel p-8 sm:p-10 text-center fade-up hidden">
          <div class="mx-auto w-16 h-16 flex items-center justify-center mb-5">
            <i data-lucide="ghost" class="w-12 h-12 opacity-60"></i>
          </div>
          <h2 class="pixel-title text-[16px] sm:text-[20px] leading-relaxed">NO GAMES FOUND</h2>
          <p class="mt-4 text-[24px] sm:text-[28px] opacity-85 text-center">条件に一致するゲームが見つかりません。</p>
        </div>
        
        <div id="game-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6"></div>
      </section>
    </main>
  </div>
 
  <script>
    // --- Web Audio API (ワクワク機能：効果音) ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let isAudioUnlocked = false;
    
    // ユーザー操作でAudioContextのロックを解除
    const unlockAudio = () => {
      if (audioCtx.state === 'suspended') audioCtx.resume();
      isAudioUnlocked = true;
      ['mousedown', 'touchstart', 'keydown', 'click'].forEach(evt => {
        document.removeEventListener(evt, unlockAudio, true);
      });
    };
    // capture: true にして、他のイベントより先にロック解除処理を走らせる
    ['mousedown', 'touchstart', 'keydown', 'click'].forEach(evt => {
      document.addEventListener(evt, unlockAudio, true);
    });

    function playBeep(freq = 440, type = 'square', duration = 0.05) {
      if (!isAudioUnlocked) return;
      const oscillator = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      oscillator.type = type;
      oscillator.frequency.value = freq;
      // 音量は控えめに
      gainNode.gain.setValueAtTime(0.03, audioCtx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
      oscillator.connect(gainNode);
      gainNode.connect(audioCtx.destination);
      oscillator.start();
      oscillator.stop(audioCtx.currentTime + duration);
    }

    // --- 隠しコマンド（コナミコマンドでパーティモード） ---
    const konamiCode = ['arrowup', 'arrowup', 'arrowdown', 'arrowdown', 'arrowleft', 'arrowright', 'arrowleft', 'arrowright', 'b', 'a'];
    let konamiIndex = 0;
    
    document.addEventListener('keydown', (e) => {
      if (e.key.toLowerCase() === konamiCode[konamiIndex]) {
        konamiIndex++;
        if (konamiIndex === konamiCode.length) {
          document.body.classList.toggle('party-mode');
          showMessage("🎉 PARTY MODE ACTIVATED! 🎉", "success");
          playBeep(440, 'square', 0.1);
          setTimeout(() => playBeep(660, 'square', 0.1), 100);
          setTimeout(() => playBeep(880, 'square', 0.3), 200);
          konamiIndex = 0;
        }
      } else {
        konamiIndex = 0;
      }
    });

    // --- メインロジック ---
    let records = [];
    const grid = document.getElementById("game-grid");
    const emptyState = document.getElementById("empty-state");
    const countEl = document.getElementById("game-count");
    const messageBar = document.getElementById("message-bar");
    const searchInput = document.getElementById("search-input");
    const sortSelect = document.getElementById("sort-select");

    function showMessage(text, type) {
      if (!text) {
        messageBar.classList.add("hidden");
        return;
      }
      messageBar.classList.remove("hidden");
      messageBar.textContent = text;
      messageBar.style.borderColor = type === "error" ? "var(--secondary)" : "var(--primary)";
    }

    // XSS対策用のエスケープ関数
    const escapeHTML = (str) => String(str).replace(/[&<>"']/g, match => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;'
    })[match]);

    function createCard(record) {
      const card = document.createElement("article");
      card.className = "game-card fade-up p-4 flex flex-col gap-4 group cursor-pointer";
      card.dataset.id = record.id;
      
      const title = escapeHTML(record.title);
      const desc = escapeHTML(record.description || '');
      const genre = record.genre ? escapeHTML(record.genre) : '';
      const ai = record.ai ? escapeHTML(record.ai) : '';
      const url = escapeHTML(record.url);
      const imgUrl = escapeHTML(record.imageUrl);

      card.innerHTML = `
        <div class="img-frame aspect-[1200/630] w-full relative overflow-hidden">
          <img src="${imgUrl}" alt="${title}" loading="lazy" 
               class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110"
               onerror="this.style.display='none'; this.nextElementSibling.classList.remove('hidden'); this.nextElementSibling.classList.add('flex');">
          <div class="hidden absolute inset-0 flex-col items-center justify-center bg-black/50 text-white/50">
            <i data-lucide="tv" class="w-10 h-10 mb-2"></i>
            <span class="text-[24px]">NO SIGNAL</span>
          </div>
        </div>
        <div class="flex flex-col gap-3 flex-grow">
          <h3 class="pixel-title glitch text-[14px] sm:text-[16px] leading-relaxed text-cyan-300" data-text="${title}">${title}</h3>
          <div class="flex flex-col gap-2 flex-grow">
            ${genre ? `<div class="inline-block px-2 py-0.5 border border-cyan-500/50 text-cyan-300 text-[13px] uppercase tracking-widest w-max mb-1 bg-cyan-900/20">${genre}</div>` : ''}
            <p class="text-[15px] sm:text-[17px] leading-[1.5] text-gray-400">${desc}</p>
            ${ai ? `<div class="flex items-center gap-1.5 mt-auto pt-2 text-fuchsia-400 text-[13px] sm:text-[15px]"><i data-lucide="bot" class="w-4 h-4"></i><span class="opacity-90">${ai}</span></div>` : ''}
          </div>
          <div class="flex items-center gap-3 flex-wrap pt-2 mt-auto border-t border-white/10">
            <a href="${url}" target="_blank" rel="noopener noreferrer" class="pixel-btn inline-flex items-center gap-2 px-4 py-2 mt-2 text-[11px] bg-fuchsia-400 text-black ml-auto snd-click">
              <i data-lucide="play" class="w-4 h-4 fill-black"></i><span>START</span>
            </a>
          </div>
        </div>
      `;

      // カード作成時に動的要素にのみサウンドイベントを付与
      card.addEventListener('mouseenter', () => playBeep(600, 'square', 0.03));
      const startBtn = card.querySelector('.snd-click');
      if (startBtn) {
        startBtn.addEventListener('mousedown', () => playBeep(1200, 'sine', 0.08));
      }
      
      return card;
    }

    function updateView() {
      const term = searchInput.value.toLowerCase();
      const sortType = sortSelect.value;
      
      let filtered = records.filter(r => 
        `${r.title} ${r.description || ''} ${r.genre || ''} ${r.ai || ''}`.toLowerCase().includes(term)
      );
      
      filtered.sort((a, b) => {
        if (sortType === 'title') return a.title.localeCompare(b.title, 'ja');
        if (sortType === 'oldest') return a.id - b.id;
        return b.id - a.id;
      });
      
      grid.innerHTML = "";
      filtered.forEach((record, index) => {
        const card = createCard(record);
        card.style.animationDelay = `${index * 50}ms`;
        grid.appendChild(card);
      });
      
      countEl.textContent = String(filtered.length);
      emptyState.classList.toggle("hidden", filtered.length > 0);
      
      lucide.createIcons();
    }

    async function loadGames() {
      try {
        const res = await fetch('https://tk.st/data/game.json');
        if (!res.ok) throw new Error('Network error');
        records = await res.json();
      } catch (error) {
        showMessage('サーバーとの通信に失敗しました。テスト用データを表示しています。', 'error');
        records = [
          { id: 1, title: "MASALA TETRIS", url: "https://tk.st/game/masala-tetris/", imageUrl: "https://tk.st/images/ogp/masala-tetris-ogp.png", genre: "puzzle", description: "First released in 2024, MASALA TETRIS is a unique twist on the indian Tetris game.", ai: "Generated by Gemini 2.5 Pro" },
          { id: 2, title: "爆速タイピングバトル", url: "#", imageUrl: "https://example.com/not-found.jpg", genre: "typing", description: "生成AIが作る独特な例文を打ち込むタイピングゲーム。君の限界に挑戦しろ！", ai: "Generated by Gemini 2.5 Flash" },
          { id: 3, title: "NEON RIDER 2099", url: "#", imageUrl: "https://example.com/not-found.jpg", genre: "racing", description: "サイバーパンクな都市を駆け抜けるハイスピードレース。", ai: "Generated by Claude 3.5 Sonnet" }
        ];
      } finally {
        updateView();
      }
    }

    // 静的要素（検索バー、セレクトなど）のサウンドイベント初期化
    function initStaticSoundEvents() {
      document.querySelectorAll('.snd-hover').forEach(el => {
        el.addEventListener('mouseenter', () => playBeep(900, 'square', 0.02));
      });
    }

    // 初期化処理
    searchInput.addEventListener("input", updateView);
    sortSelect.addEventListener("change", updateView);
    initStaticSoundEvents();
    loadGames();

  </script>
</body>
</html>
