    .dropzone::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, rgba(244, 63, 94, 0.08) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 300ms ease;
      pointer-events: none;
    }

    .dropzone.dragover {
      border-color: #e11d48;

      transform: scale(1.02);
      box-shadow: 0 20px 40px -5px rgba(244, 63, 94, 0.15);
    }

    .dropzone.dragover::before {
      opacity: 1;

    .dropzone:focus-visible {
      outline: none;

      font-weight: 600;
      border: none;
      transition: all 200ms ease;
    }
    
    .btn-glow::before {
      content: '';
      position: absolute;
      top: -2px; left: -2px; right: -2px; bottom: -2px;
      background: linear-gradient(135deg, #f43f5e, #60a5fa, #f43f5e);
      z-index: -1;
      border-radius: inherit;
      opacity: 0;
      transition: opacity 200ms ease;
      filter: blur(8px);
    }

    .btn-glow:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px -5px rgba(244, 63, 94, 0.3);
    }
    
    .btn-glow:hover::before {
      opacity: 1;
    }

    .btn-glow:active {
      transform: translateY(0);

    .btn-glow:disabled {

    .url-input-container {

    .url-input:focus {

    .url-btn {
      background: #e11d48;

    </div>

    <!-- View 3: Result -->
    <div id="view-result" class="w-full max-w-3xl hidden mt-4">
      <div class="result-card p-6 sm:p-8">
        
        <div class="flex flex-col lg:flex-row items-center gap-8 mb-8">
          <!-- Preview Image -->
          <div class="w-full lg:w-1/2 flex flex-col items-center relative group">
            <div class="w-full bg-slate-100 rounded-xl overflow-hidden border border-slate-200 flex items-center justify-center min-h-[200px] relative">
              <img id="result-preview" src="" alt="Converted Preview" class="max-w-full max-h-[300px] object-contain">
            </div>
            <!-- Page navigation -->
            <div id="page-nav" class="page-nav hidden">
              <button id="btn-prev-page" class="page-nav-btn" aria-label="前のページ" disabled>
                <i data-lucide="chevron-left" class="w-4 h-4"></i>
              </button>
              <span id="page-indicator" class="page-indicator">1 / 1</span>
              <button id="btn-next-page" class="page-nav-btn" aria-label="次のページ">
                <i data-lucide="chevron-right" class="w-4 h-4"></i>
              </button>
            </div>
          </div>
          
          <!-- Details -->
          <div class="w-full lg:w-1/2 flex flex-col justify-center">
            <div class="grid grid-cols-2 gap-4 mb-6">
              <div class="bg-slate-50 p-4 rounded-xl border border-slate-100 text-center">
                <span class="text-xs font-bold text-slate-400 uppercase tracking-wider block mb-1">フォーマット</span>
                <span id="result-format" class="text-xl font-outfit font-extrabold text-slate-700">PNG</span>
              </div>
              <div class="bg-slate-50 p-4 rounded-xl border border-slate-100 text-center">
                <span class="text-xs font-bold text-slate-400 uppercase tracking-wider block mb-1">合計サイズ</span>
                <span id="result-size" class="text-xl font-outfit font-extrabold text-slate-700">0 KB</span>
              </div>
            </div>
            
            <div class="flex gap-3 w-full">
              <button id="btn-download" class="btn-glow flex items-center justify-center gap-2 px-8 py-4 rounded-xl flex-1 text-lg shadow-lg">
                <i data-lucide="download" class="w-6 h-6"></i>
                ダウンロード
              </button>
              <button id="btn-share" class="icon-btn !w-14 !h-auto" title="共有" aria-label="共有">
                <i data-lucide="share-2" class="w-5 h-5"></i>
              </button>
            </div>
            
            <button id="btn-reset" class="mt-4 text-sm font-semibold text-slate-500 hover:text-rose-600 transition-colors underline-offset-4 hover:underline text-center w-full">
              別のPDFを変換する
            </button>
          </div>
        </div>

      </div>
    </div>

  </main>

  <footer class="mt-auto border-t border-slate-200 bg-white/50 backdrop-blur-md">
    <div class="max-w-4xl mx-auto px-4 py-6 flex items-center justify-center relative">
      <span class="text-xs sm:text-sm text-slate-400 font-medium tracking-wide">&copy; <span id="currentYear"></span> Shinya Takeda</span>
      <div id="donation-button-container" class="absolute right-4 sm:right-6"></div>
    </div>
  </footer>

  <script src="../../data/buy-me-a-coffee.js"></script>
  <script>new DonationWidget({ containerId: 'donation-button-container' }).init();</script>

  <!-- Notification Toast -->
  <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-slate-800 border border-slate-700 text-white px-6 py-3 rounded-full shadow-2xl flex items-center gap-3 transition-all duration-300 transform translate-y-20 opacity-0 z-50 pointer-events-none" role="status">
    <i id="toast-icon-success" data-lucide="check-circle-2" class="w-5 h-5 text-emerald-400"></i>
    <i id="toast-icon-error" data-lucide="alert-circle" class="w-5 h-5 text-rose-400 hidden"></i>
    <span id="toast-msg" class="text-sm font-medium"></span>
  </div>

  <script>
    const { formatBytes, showToast, switchView, isPrivateHost, setupDropzone } = window.STCommon;

    lucide.createIcons();
    document.getElementById('currentYear').textContent = new Date().getFullYear();

    // PDF.js worker setup
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    // Setup format selection
    const formatBtns = document.querySelectorAll('.format-btn');
    let selectedFormat = 'png';

    const LOSSLESS_FORMATS = new Set(['png', 'webp-lossless']);

    formatBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        formatBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedFormat = btn.dataset.format;
        applyQualityState();
      });
    });

    const formatMimeTypes = {
      'png': 'image/png',
      'webp': 'image/webp',
      'webp-lossless': 'image/webp',
      'avif': 'image/avif'
    };

    const formatExtensions = {
      'png': 'png',
      'webp': 'webp',
      'webp-lossless': 'webp',
      'avif': 'avif'
    };

    const formatLabels = {
      'png': 'PNG',
      'webp': 'WEBP',
      'webp-lossless': 'WEBP (可逆)',
      'avif': 'AVIF'
    };

    // Elements
    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('file-input');

    const loadingMsg = document.getElementById('loading-msg');
    const loadingSubmsg = document.getElementById('loading-submsg');
    const progressBar = document.getElementById('progress-bar');
    const progressText = document.getElementById('progress-text');
    
    const resultPreview = document.getElementById('result-preview');
    const resultFormat = document.getElementById('result-format');
    const resultSize = document.getElementById('result-size');
    const btnDownload = document.getElementById('btn-download');
    const btnShare = document.getElementById('btn-share');
    const btnReset = document.getElementById('btn-reset');
    const pageNav = document.getElementById('page-nav');
    const btnPrevPage = document.getElementById('btn-prev-page');
    const btnNextPage = document.getElementById('btn-next-page');
    const pageIndicator = document.getElementById('page-indicator');
    
    const optScale = document.getElementById('opt-scale');
    const urlInput = document.getElementById('url-input');
    const urlBtn = document.getElementById('url-btn');
    const optQuality = document.getElementById('opt-quality');
    const qualityVal = document.getElementById('quality-val');
    const qualityRow = document.getElementById('quality-row');

    optQuality.addEventListener('input', (e) => {
      qualityVal.textContent = e.target.value + '%';
    });

    function applyQualityState() {
      const disabled = LOSSLESS_FORMATS.has(selectedFormat);
      optQuality.disabled = disabled;
      qualityRow.classList.toggle('quality-disabled', disabled);
    }
    applyQualityState();

    let isProcessing = false;
    let resultBlobUrl = null;
    let resultFilename = 'output.png';
    let pageBlobs = [];        // blob per page (for preview / share)
    let pageBlobUrls = [];     // object URLs per page
    let currentPage = 0;       // 0-indexed

    function canvasToBlobAsync(canvas, mimeType, quality) {
      return new Promise(resolve => {
        canvas.toBlob(resolve, mimeType, quality);
      });
    }

    let avifEncodePromise = null;
    function loadAvifEncoder() {
      if (!avifEncodePromise) {
        avifEncodePromise = import('https://esm.sh/@jsquash/avif@2.1.1').then(m => m.encode);
      }
      return avifEncodePromise;
    }

    async function encodeAvifFromImageData(imageData, quality) {
      const encode = await loadAvifEncoder();
      const buffer = await encode(imageData, { quality: Math.round(quality * 100) });
      return new Blob([buffer], { type: 'image/avif' });
    }

    let webpEncodePromise = null;
    function loadWebpEncoder() {
      if (!webpEncodePromise) {
        webpEncodePromise = import('https://esm.sh/@jsquash/webp@1.4.0').then(m => m.encode);
      }
      return webpEncodePromise;
    }

    async function encodeLosslessWebpFromImageData(imageData) {
      const encode = await loadWebpEncoder();
      const buffer = await encode(imageData, { lossless: 1, quality: 100, exact: 1 });
      return new Blob([buffer], { type: 'image/webp' });
    }

    const MAX_FILE_SIZE = 200 * 1024 * 1024;
    const HEAVY_FILE_SIZE = 50 * 1024 * 1024;
    const HEAVY_PAGE_COUNT = 50;

    async function processPdf(file) {
      if (isProcessing) return;

      if (file.size > MAX_FILE_SIZE) {
        showToast(`ファイルサイズが大きすぎます（上限: ${formatBytes(MAX_FILE_SIZE)}）`, 'error');
        return;
      }

      isProcessing = true;

      switchView('view-loading');
      loadingMsg.textContent = 'PDFを解析中...';
      loadingSubmsg.textContent = 'ページ情報を読み込んでいます';
      progressBar.style.width = '0%';
      progressText.textContent = '0%';

      if (resultBlobUrl) {
        URL.revokeObjectURL(resultBlobUrl);
        resultBlobUrl = null;
      }

      try {
        const buffer = await file.arrayBuffer();
        const pdfDoc = await pdfjsLib.getDocument({ data: buffer }).promise;
        const numPages = pdfDoc.numPages;
        const scale = parseFloat(optScale.value) || 2.0;

        loadingMsg.textContent = '画像を生成中...';
        const heavy = file.size > HEAVY_FILE_SIZE || numPages > HEAVY_PAGE_COUNT;
        if (selectedFormat === 'avif') {
          loadingSubmsg.textContent = `全${numPages}ページをAVIF変換中（初回はエンコーダのダウンロードが入ります）`;
        } else if (selectedFormat === 'webp-lossless') {
          loadingSubmsg.textContent = `全${numPages}ページを可逆WebP変換中（初回はエンコーダのダウンロードが入ります）`;
        } else if (heavy) {
          loadingSubmsg.textContent = `全${numPages}ページを変換中。大きなPDFのためブラウザが一時的に重くなる場合があります`;
        } else {
          loadingSubmsg.textContent = `全${numPages}ページを変換します。しばらくお待ちください`;
        }

        let zip = null;
        if (numPages > 1) {
          zip = new JSZip();
        }

        // Cleanup old page blobs
        pageBlobUrls.forEach(u => URL.revokeObjectURL(u));
        pageBlobUrls = [];
        pageBlobs = [];

        let singleFileBlob = null;
        const baseName = file.name.replace(/\.[^/.]+$/, "");
        const mimeType = formatMimeTypes[selectedFormat];
        const extension = formatExtensions[selectedFormat];
        const formatLabel = formatLabels[selectedFormat];
        const quality = (parseInt(optQuality.value, 10) || 90) / 100;

        // Reuse a single canvas across pages — at 3x scale on long PDFs
        // allocating one canvas per page makes the renderer thrash GC.
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');

        try {
          for (let i = 1; i <= numPages; i++) {
            const page = await pdfDoc.getPage(i);
            const viewport = page.getViewport({ scale: scale });

            canvas.width = viewport.width;
            canvas.height = viewport.height;

            const renderContext = { canvasContext: ctx, viewport: viewport };
            await page.render(renderContext).promise;

            let blob;
            if (selectedFormat === 'avif') {
              const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
              blob = await encodeAvifFromImageData(imageData, quality);
            } else if (selectedFormat === 'webp-lossless') {
              const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
              blob = await encodeLosslessWebpFromImageData(imageData);
            } else {
              blob = await canvasToBlobAsync(canvas, mimeType, quality);
              if (blob && blob.type !== mimeType) {
                throw new Error(`ブラウザが ${formatLabel} フォーマットでの出力に対応していません。別のフォーマットを選択してください。`);
              }
            }
            if (!blob) {
              throw new Error(`ブラウザが ${formatLabel} フォーマットでの出力に対応していません。別のフォーマットを選択してください。`);
            }

            // Store every page blob for preview / sharing
            pageBlobs.push(blob);

            if (numPages === 1) {
              singleFileBlob = blob;
              resultFilename = `${baseName}.${extension}`;
            } else {
              const filename = `${baseName}_${String(i).padStart(3, '0')}.${extension}`;
              zip.file(filename, blob);
            }

            const pct = Math.floor((i / numPages) * 100);
            progressBar.style.width = `${pct}%`;
            progressText.textContent = `${pct}%`;
          }
        } finally {
          // Release the canvas bitmap explicitly — large PDFs keep megabytes
          // of pixel data pinned to GPU memory until this is cleared.
          canvas.width = 0;
          canvas.height = 0;
        }

        // Build preview blob URLs for every page
        pageBlobUrls = pageBlobs.map(b => URL.createObjectURL(b));
        currentPage = 0;

        if (numPages > 1) {
          loadingMsg.textContent = 'ZIPファイルを作成中...';
          loadingSubmsg.textContent = '画像ファイルをパッケージ化しています';
          const zipBlob = await zip.generateAsync({ type: 'blob' });
          resultBlobUrl = URL.createObjectURL(zipBlob);
          resultFilename = `${baseName}_images.zip`;
          resultSize.textContent = formatBytes(zipBlob.size);
          resultFormat.textContent = 'ZIP';
          
          pageNav.classList.remove('hidden');
          updatePageNav();
        } else {
          resultBlobUrl = URL.createObjectURL(singleFileBlob);
          resultSize.textContent = formatBytes(singleFileBlob.size);
          resultFormat.textContent = formatLabel;

          pageNav.classList.add('hidden');
        }

        resultPreview.src = pageBlobUrls[0];

        switchView('view-result');
        showToast('変換が完了しました！');

      } catch (err) {
        console.error('PDF Processing Error:', err);
        let message;
        if (err && err.name === 'PasswordException') {
          message = 'パスワード保護されたPDFは変換できません';
        } else if (err && err.name === 'InvalidPDFException') {
          message = 'PDFファイルが破損しているか、読み込めませんでした';
        } else {
          const detail = err && err.message ? err.message : String(err);
          message = `エラー: ${detail.slice(0, 100)}`;
        }
        showToast(message, 'error');
        switchView('view-upload');
      } finally {
        isProcessing = false;
      }
    }

    function isPdfFile(file) {
      if (!file) return false;
      if (file.type === 'application/pdf') return true;
      return /\.pdf$/i.test(file.name || '');
    }

    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        if (isPdfFile(file)) {
          processPdf(file);
        } else {
          showToast('PDFファイルを選択してください。', 'error');
        }
      }
      fileInput.value = '';
    });

    setupDropzone({
      dropzone,
      fileInput,
      onFiles: (files) => {
        const file = files[0];
        if (isPdfFile(file)) {
          processPdf(file);
        } else {
          showToast('PDFファイルを選択してください。', 'error');
        }
      },
    });

    async function loadFromUrl(url) {
      if (!url || isProcessing) return;

      let urlObj;
      try {
        urlObj = new URL(url);
      } catch (e) {
        showToast('URLの形式が正しくありません', 'error');
        return;
      }
      if (urlObj.protocol !== 'http:' && urlObj.protocol !== 'https:') {
        showToast('http(s) のURLを指定してください', 'error');
        return;
      }
      if (isPrivateHost(urlObj.hostname)) {
        showToast('ローカル/プライベートIPのURLは利用できません', 'error');
        return;
      }

      switchView('view-loading');
      loadingMsg.textContent = 'ダウンロード中...';
      loadingSubmsg.textContent = 'PDFを取得しています';
      progressBar.style.width = '0%';
      progressText.textContent = '0%';

      try {
        let response;
        let usedProxy = false;
        let directError = null;
        try {
          response = await fetch(url, { mode: 'cors', credentials: 'omit' });
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
        } catch (e) {
          directError = e;
          const ok = window.confirm(
            '直接のPDF取得に失敗しました。\n外部プロキシ経由で再試行しますか？\n\n注意: プロキシ運営者にURLとPDF内容が渡ります。'
          );
          if (!ok) {
            switchView('view-upload');
            return;
          }
          console.warn('Direct fetch failed:', directError);
          usedProxy = true;

          const proxyUrl = `https://corsproxy.io/?url=${encodeURIComponent(url)}`;
          try {
            console.log('Trying proxy:', proxyUrl);
            const r = await fetch(proxyUrl, { mode: 'cors', credentials: 'omit' });
            if (!r.ok) throw new Error(`HTTP ${r.status}`);
            response = r;
          } catch (perr) {
            throw new Error(`プロキシでも失敗 (${perr.message || '不明'})`);
          }
        }

        const contentType = (response.headers.get('content-type') || '').toLowerCase();
        const blob = await response.blob();
        const blobType = (blob.type || contentType).toLowerCase();

        const looksLikePdf = blobType.includes('pdf')
          || blobType === 'application/octet-stream'
          || /\.pdf(?:$|\?)/i.test(urlObj.pathname);
        if (!looksLikePdf) {
          throw new Error(`PDFではないデータを受信しました (${blobType || 'unknown'})`);
        }

        // Verify the %PDF- magic so a redirected HTML error page can't slip
        // through octet-stream / .pdf-path heuristics into PDF.js.
        const head = new Uint8Array(await blob.slice(0, 5).arrayBuffer());
        const magic = String.fromCharCode.apply(null, head);
        if (!magic.startsWith('%PDF-')) {
          throw new Error('受信したデータがPDFではありません (magic number mismatch)');
        }

        let filename = 'downloaded.pdf';
        const pathParts = urlObj.pathname.split('/');
        const lastPart = pathParts[pathParts.length - 1];
        if (lastPart && /\.pdf$/i.test(lastPart)) {
          filename = decodeURIComponent(lastPart);
        }

        const file = new File([blob], filename, { type: 'application/pdf' });
        if (usedProxy) showToast('プロキシ経由で取得しました');
        processPdf(file);
      } catch (err) {
        console.error('URL Load error:', err);
        showToast(`取得失敗: ${err.message || 'unknown'}`, 'error');
        switchView('view-upload');
      }
    }

    urlBtn.addEventListener('click', () => {
      const url = urlInput.value.trim();
      if (url) loadFromUrl(url);
    });

    urlInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        const url = urlInput.value.trim();
        if (url) loadFromUrl(url);
      }
    });

    // --- Page navigation ---
    function updatePageNav() {
      const total = pageBlobUrls.length;
      pageIndicator.textContent = `${currentPage + 1} / ${total}`;
      btnPrevPage.disabled = currentPage === 0;
      btnNextPage.disabled = currentPage >= total - 1;
    }

    function showPage(idx) {
      if (idx < 0 || idx >= pageBlobUrls.length) return;
      currentPage = idx;
      resultPreview.src = pageBlobUrls[currentPage];
      updatePageNav();
    }

    btnPrevPage.addEventListener('click', () => showPage(currentPage - 1));
    btnNextPage.addEventListener('click', () => showPage(currentPage + 1));

    // --- Sharing ---
    function canShareResult() {
      const hasWebShare = typeof navigator.canShare === 'function';
      const hasClipboardItem = typeof navigator.clipboard !== 'undefined' && typeof window.ClipboardItem !== 'undefined';
      return hasWebShare || hasClipboardItem;
    }

    async function shareResult() {
      // For multi-page: share the ZIP; for single page: share the image
      const blob = pageBlobs.length === 1 ? pageBlobs[0] : null;
      const shareFile = blob
        ? new File([blob], resultFilename, { type: blob.type })
        : null;

      // For ZIP, try sharing the zip file
      if (!shareFile && resultBlobUrl) {
        const resp = await fetch(resultBlobUrl);
        const zipBlob = await resp.blob();
        const zipFile = new File([zipBlob], resultFilename, { type: 'application/zip' });

        if (typeof navigator.canShare === 'function' && navigator.canShare({ files: [zipFile] })) {
          try {
            await navigator.share({ files: [zipFile], title: resultFilename });
            return;
          } catch (e) {
            if (e && e.name === 'AbortError') return;
          }
        }
        showToast('ZIPファイルの共有はこの環境ではサポートされていません', 'error');
        return;
      }

      // Single image share
      if (shareFile) {
        if (typeof navigator.canShare === 'function' && navigator.canShare({ files: [shareFile] })) {
          try {
            await navigator.share({ files: [shareFile], title: resultFilename });
            return;
          } catch (e) {
            if (e && e.name === 'AbortError') return;
          }
        }

        // Clipboard fallback
        if (typeof navigator.clipboard !== 'undefined' && typeof window.ClipboardItem !== 'undefined') {
          try {
            await navigator.clipboard.write([new ClipboardItem({ [blob.type]: blob })]);
            showToast('画像をクリップボードにコピーしました', 'success');
            flashShareBtn(btnShare);
            return;
          } catch (_) { /* unsupported type */ }
        }
      }

      showToast('この環境では共有がサポートされていません', 'error');
    }

    function flashShareBtn(btn) {
      const original = btn.innerHTML;
      btn.innerHTML = '<i data-lucide="check" class="w-5 h-5"></i>';
      if (window.lucide) lucide.createIcons();
      setTimeout(() => {
        btn.innerHTML = original;
        if (window.lucide) lucide.createIcons();
      }, 1400);
    }

    btnShare.addEventListener('click', () => shareResult());

    btnDownload.addEventListener('click', () => {
      if (!resultBlobUrl) return;
      const a = document.createElement('a');
      a.href = resultBlobUrl;
      a.download = resultFilename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    });

    btnReset.addEventListener('click', () => {
      switchView('view-upload');
      if (resultBlobUrl) {
        URL.revokeObjectURL(resultBlobUrl);
        resultBlobUrl = null;
      }
      pageBlobUrls.forEach(u => URL.revokeObjectURL(u));
      pageBlobUrls = [];
      pageBlobs = [];
      currentPage = 0;
      pageNav.classList.add('hidden');
      resultPreview.removeAttribute('src');
      urlInput.value = '';
    });

  </script>
</body>
</html>
