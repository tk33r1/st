    formatBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        formatBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedFormat = btn.dataset.format;
      });
    });

    const formatMimeTypes = {
      'jpg': 'image/jpeg',
      'png': 'image/png',
      'webp': 'image/webp',
      'avif': 'image/avif'
    };

    // Elements
    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('file-input');
    const viewUpload = document.getElementById('view-upload');
    const viewLoading = document.getElementById('view-loading');
    const viewResult = document.getElementById('view-result');
    
    const loadingMsg = document.getElementById('loading-msg');
    const loadingSubmsg = document.getElementById('loading-submsg');
    const progressBar = document.getElementById('progress-bar');
    const progressText = document.getElementById('progress-text');
    
    const resultPreview = document.getElementById('result-preview');
    const resultFormat = document.getElementById('result-format');
    const resultSize = document.getElementById('result-size');
    const resultMultiInfo = document.getElementById('result-multi-info');
    const resultPageCount = document.getElementById('result-page-count');
    const btnDownload = document.getElementById('btn-download');
    const btnReset = document.getElementById('btn-reset');
    
    const optScale = document.getElementById('opt-scale');

    const toast = document.getElementById('toast');
    const toastMsg = document.getElementById('toast-msg');
    const toastIconSuccess = document.getElementById('toast-icon-success');
    const toastIconError = document.getElementById('toast-icon-error');
    let toastTimer = null;

    let isProcessing = false;
    let resultBlobUrl = null;
    let previewBlobUrl = null;
    let resultFilename = 'output.jpg';

    function formatBytes(bytes, decimals = 2) {
      if (!bytes || bytes <= 0) return '0 B';
      const k = 1024;
      const dm = decimals < 0 ? 0 : decimals;
      const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
      const i = Math.min(Math.floor(Math.log(bytes) / Math.log(k)), sizes.length - 1);
      return parseFloat((bytes / Math.pow(k, i)).toFixed(dm)) + ' ' + sizes[i];
    }

    function showToast(message, type = 'success') {
      toastMsg.textContent = message;
      if (type === 'error') {
        toastIconSuccess.classList.add('hidden');
        toastIconError.classList.remove('hidden');
      } else {
        toastIconSuccess.classList.remove('hidden');
        toastIconError.classList.add('hidden');
      }
      toast.classList.remove('translate-y-20', 'opacity-0');
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => {
        toast.classList.add('translate-y-20', 'opacity-0');
      }, 3000);
    }

    function switchView(viewId) {
      viewUpload.classList.add('hidden');
      viewLoading.classList.add('hidden');
      viewResult.classList.add('hidden');
      
      const target = document.getElementById(viewId);
      target.classList.remove('hidden');
      target.classList.add('fade-in');
    }

    function canvasToBlobAsync(canvas, mimeType, quality) {
      return new Promise(resolve => {
        canvas.toBlob(resolve, mimeType, quality);
      });
    }

    let avifEncodePromise = null;
    function loadAvifEncoder() {
      if (!avifEncodePromise) {
        avifEncodePromise = import('https://esm.sh/@jsquash/avif@1.3.0').then(m => m.encode);
      }
      return avifEncodePromise;
    }

    async function encodeAvifFromImageData(imageData, quality) {
      const encode = await loadAvifEncoder();
      const buffer = await encode(imageData, { quality: Math.round(quality * 100) });
      return new Blob([buffer], { type: 'image/avif' });
    }

    const MAX_FILE_SIZE = 200 * 1024 * 1024;
    const HEAVY_FILE_SIZE = 50 * 1024 * 1024;
    const HEAVY_PAGE_COUNT = 50;

    async function processPdf(file) {
      if (isProcessing) return;

      if (file.size > MAX_FILE_SIZE) {
        showToast(`ファイルサイズが大きすぎます（上限: ${formatBytes(MAX_FILE_SIZE)}）`, 'error');
        return;
      }

      isProcessing = true;

      switchView('view-loading');
      loadingMsg.textContent = 'PDFを解析中...';
      loadingSubmsg.textContent = 'ページ情報を読み込んでいます';
      progressBar.style.width = '0%';
      progressText.textContent = '0%';

      if (resultBlobUrl) {
        URL.revokeObjectURL(resultBlobUrl);
        resultBlobUrl = null;
      }
      if (previewBlobUrl) {
        URL.revokeObjectURL(previewBlobUrl);
        previewBlobUrl = null;
      }

      try {
        const buffer = await file.arrayBuffer();
        const pdfDoc = await pdfjsLib.getDocument({ data: buffer }).promise;
        const numPages = pdfDoc.numPages;
        const scale = parseFloat(optScale.value) || 2.0;

        loadingMsg.textContent = '画像を生成中...';
        const heavy = file.size > HEAVY_FILE_SIZE || numPages > HEAVY_PAGE_COUNT;
        if (selectedFormat === 'avif') {
          loadingSubmsg.textContent = `全${numPages}ページをAVIF変換中（初回はエンコーダのダウンロードが入ります）`;
        } else if (heavy) {
          loadingSubmsg.textContent = `全${numPages}ページを変換中。大きなPDFのためブラウザが一時的に重くなる場合があります`;
        } else {
          loadingSubmsg.textContent = `全${numPages}ページを変換します。しばらくお待ちください`;
        }

        let zip = null;
        if (numPages > 1) {
          zip = new JSZip();
        }

        let firstPageBlob = null;
        let singleFileBlob = null;
        const baseName = file.name.replace(/\.[^/.]+$/, "");
        const mimeType = formatMimeTypes[selectedFormat];
        const quality = 0.9;

        for (let i = 1; i <= numPages; i++) {
          const page = await pdfDoc.getPage(i);
          const viewport = page.getViewport({ scale: scale });
          
          const canvas = document.createElement('canvas');
          const ctx = canvas.getContext('2d');
          canvas.width = viewport.width;
          canvas.height = viewport.height;

          // Add white background for formats that don't support transparency
          if (selectedFormat === 'jpg') {
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
          }

          const renderContext = { canvasContext: ctx, viewport: viewport };
          await page.render(renderContext).promise;

          let blob;
          if (selectedFormat === 'avif') {
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            blob = await encodeAvifFromImageData(imageData, quality);
          } else {
            blob = await canvasToBlobAsync(canvas, mimeType, quality);
            if (blob && blob.type !== mimeType) {
              throw new Error(`ブラウザが ${selectedFormat.toUpperCase()} フォーマットでの出力に対応していません。別のフォーマットを選択してください。`);
            }
          }
          if (!blob) {
            throw new Error(`ブラウザが ${selectedFormat.toUpperCase()} フォーマットでの出力に対応していません。別のフォーマットを選択してください。`);
          }

          if (numPages === 1) {
            singleFileBlob = blob;
            resultFilename = `${baseName}.${selectedFormat}`;
          } else {
            if (i === 1) firstPageBlob = blob;
            const filename = `${baseName}_${String(i).padStart(3, '0')}.${selectedFormat}`;
            zip.file(filename, blob);
          }

          const pct = Math.floor((i / numPages) * 100);
          progressBar.style.width = `${pct}%`;
          progressText.textContent = `${pct}%`;
        }

        if (numPages > 1) {
          loadingMsg.textContent = 'ZIPファイルを作成中...';
          loadingSubmsg.textContent = '画像ファイルをパッケージ化しています';
          const zipBlob = await zip.generateAsync({ type: 'blob' });
          resultBlobUrl = URL.createObjectURL(zipBlob);
          resultFilename = `${baseName}_images.zip`;
          resultSize.textContent = formatBytes(zipBlob.size);
          resultFormat.textContent = 'ZIP';
          
          resultMultiInfo.classList.remove('hidden');
          resultPageCount.textContent = numPages;
        } else {
          resultBlobUrl = URL.createObjectURL(singleFileBlob);
          resultSize.textContent = formatBytes(singleFileBlob.size);
          resultFormat.textContent = selectedFormat.toUpperCase();

          resultMultiInfo.classList.add('hidden');
        }

        if (numPages === 1) {
          resultPreview.src = resultBlobUrl;
        } else {
          previewBlobUrl = URL.createObjectURL(firstPageBlob);
          resultPreview.src = previewBlobUrl;
        }

        switchView('view-result');
        showToast('変換が完了しました！');

      } catch (err) {
        console.error('PDF Processing Error:', err);
        let message;
        if (err && err.name === 'PasswordException') {
          message = 'パスワード保護されたPDFは変換できません';
        } else if (err && err.name === 'InvalidPDFException') {
          message = 'PDFファイルが破損しているか、読み込めませんでした';
        } else {
          const detail = err && err.message ? err.message : String(err);
          message = `エラー: ${detail.slice(0, 100)}`;
        }
        showToast(message, 'error');
        switchView('view-upload');
      } finally {
        isProcessing = false;
      }
    }

    // Event Listeners
    dropzone.addEventListener('click', () => fileInput.click());

    dropzone.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        fileInput.click();
      }
    });

    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        if (isPdfFile(file)) {
          processPdf(file);
        } else {
          showToast('PDFファイルを選択してください。', 'error');
        }
      }
      fileInput.value = '';
    });

    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
      dropzone.addEventListener(eventName, preventDefaults, false);
      document.body.addEventListener(eventName, preventDefaults, false);
    });

    function preventDefaults(e) {
      e.preventDefault();
      e.stopPropagation();
    }

    ['dragenter', 'dragover'].forEach(eventName => {
      dropzone.addEventListener(eventName, () => dropzone.classList.add('dragover'), false);
    });

    ['dragleave', 'drop'].forEach(eventName => {
      dropzone.addEventListener(eventName, () => dropzone.classList.remove('dragover'), false);
    });

    function isPdfFile(file) {
      if (!file) return false;
      if (file.type === 'application/pdf') return true;
      return /\.pdf$/i.test(file.name || '');
    }

    dropzone.addEventListener('drop', (e) => {
      const file = e.dataTransfer.files[0];
      if (isPdfFile(file)) {
        processPdf(file);
      } else {
        showToast('PDFファイルを選択してください。', 'error');
      }
    });

    btnDownload.addEventListener('click', () => {
      if (!resultBlobUrl) return;
      const a = document.createElement('a');
      a.href = resultBlobUrl;
      a.download = resultFilename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    });

    btnReset.addEventListener('click', () => {
      switchView('view-upload');
      if (resultBlobUrl) {
        URL.revokeObjectURL(resultBlobUrl);
        resultBlobUrl = null;
      }
      if (previewBlobUrl) {
        URL.revokeObjectURL(previewBlobUrl);
        previewBlobUrl = null;
      }
      resultPreview.removeAttribute('src');
    });

  </script>
</body>
</html>
