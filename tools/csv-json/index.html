    <script>
        lucide.createIcons();

        // DOM要素の取得
        const csvTextarea    = document.getElementById('csvTextarea');
        const jsonTextarea   = document.getElementById('jsonTextarea');
        const toJsonBtn      = document.getElementById('toJsonBtn');
        const toCsvBtn       = document.getElementById('toCsvBtn');
        const csvClearBtn    = document.getElementById('csvClearBtn');
        const csvCopyBtn     = document.getElementById('csvCopyBtn');
        const csvDownloadBtn = document.getElementById('csvDownloadBtn');
        const csvFileInput   = document.getElementById('csvFileInput');
        const csvUploadBtn   = document.getElementById('csvUploadBtn');
        const csvEncoding    = document.getElementById('csvEncoding');
        const csvStats       = document.getElementById('csvStats');
        const csvPanel       = document.getElementById('csvPanel');
        const jsonClearBtn   = document.getElementById('jsonClearBtn');
        const jsonCopyBtn    = document.getElementById('jsonCopyBtn');
        const jsonDownloadBtn = document.getElementById('jsonDownloadBtn');
        const jsonFileInput  = document.getElementById('jsonFileInput');
        const jsonUploadBtn  = document.getElementById('jsonUploadBtn');
        const jsonStats      = document.getElementById('jsonStats');
        const jsonPanel      = document.getElementById('jsonPanel');
        const hasHeaderCheck = document.getElementById('hasHeaderCheck');
        const toast            = document.getElementById('toast');
        const toastMessage     = document.getElementById('toastMessage');
        const toastIconSuccess = document.getElementById('toastIconSuccess');
        const toastIconError   = document.getElementById('toastIconError');

        // トースト通知を表示する関数
        let toastTimeout;
        function showToast(message, type = 'success') {
            const isSuccess = type === 'success';
            toastMessage.textContent = message;
            toast.className = `fixed bottom-6 right-6 px-5 py-3 rounded-lg shadow-lg transform transition-all duration-300 flex items-center gap-2 z-50 ${isSuccess ? 'bg-slate-800' : 'bg-red-600'} text-white translate-y-0 opacity-100`;
            toastIconSuccess.classList.toggle('hidden', !isSuccess);
            toastIconError.classList.toggle('hidden', isSuccess);
            if (toastTimeout) clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.remove('translate-y-0', 'opacity-100');
                toast.classList.add('translate-y-10', 'opacity-0', 'pointer-events-none');
            }, 3000);
        }

        // ステータスバー更新
        function updateCsvStats() {
            const text = csvTextarea.value;
            if (!text.trim()) { csvStats.textContent = ''; return; }
            const lines = text.trim().split(/\r?\n/);
            
            // ヘッダーの有無に応じてデータ件数を正確に計算
            const dataRows = hasHeaderCheck.checked ? Math.max(0, lines.length - 1) : lines.length;
            
            csvStats.textContent = `${text.length.toLocaleString()} 文字 · ${lines.length} 行 · データ ${dataRows} 件`;
        }

        function updateJsonStats() {
            const text = jsonTextarea.value;
            if (!text.trim()) { jsonStats.textContent = ''; return; }
            const lines = text.trim().split(/\r?\n/).length;
            let extra = '';
            try {
                const parsed = JSON.parse(text);
                if (Array.isArray(parsed)) extra = ` · ${parsed.length} 件`;
            } catch {}
            jsonStats.textContent = `${text.length.toLocaleString()} 文字 · ${lines} 行${extra}`;
        }

        csvTextarea.addEventListener('input', updateCsvStats);
        jsonTextarea.addEventListener('input', updateJsonStats);
        
        // ヘッダー有無の変更時にCSVの件数表示を更新
        hasHeaderCheck.addEventListener('change', updateCsvStats);

        // テキストをバイト列にエンコード
        function encodeToBytes(text, encoding) {
            if (encoding === 'shift-jis') {
                if (typeof Encoding === 'undefined') throw new Error('Shift-JIS ライブラリが読み込めませんでした。');
                const codes = Encoding.convert(Encoding.stringToCode(text), { to: 'SJIS', from: 'UNICODE' });
                return new Uint8Array(codes);
            }
            if (encoding === 'utf-8-bom') {
                const encoded = new TextEncoder().encode(text);
                const result = new Uint8Array(3 + encoded.length);
                result[0] = 0xEF; result[1] = 0xBB; result[2] = 0xBF;
                result.set(encoded, 3);
                return result;
            }
            return new TextEncoder().encode(text);
        }

        // --- 変換ロジック ---

        function parseCSV(csvStr, delimiter = ',') {
            const rows = [];
            const s = csvStr.trim();
            const n = s.length;
            let i = 0;
            while (i < n) {
                const row = [];
                while (i < n) {
                    let field = '';
                    if (s[i] === '"') {
                        i++;
                        while (i < n) {
                            if (s[i] === '"' && s[i + 1] === '"') { field += '"'; i += 2; }
                            else if (s[i] === '"') { i++; break; }
                            else { field += s[i++]; }
                        }
                    } else {
                        while (i < n && s[i] !== delimiter && s[i] !== '\r' && s[i] !== '\n') {
                            field += s[i++];
                        }
                    }
                    row.push(field);
                    if (i < n && s[i] === delimiter) { i++; continue; }
                    break;
                }
                if (i < n && s[i] === '\r') i++;
                if (i < n && s[i] === '\n') i++;
                if (row.length > 0) rows.push(row);
            }
            return rows;
        }

        function csvToJson(csv, hasHeader = true) {
            if (!csv.trim()) throw new Error("CSVデータが空か不正です。");
            const rows = parseCSV(csv);
            if (rows.length === 0) throw new Error("CSVデータが空か不正です。");
            
            const result = [];
            let headers = [];
            let startIndex = 0;

            if (hasHeader) {
                headers = rows[0];
                startIndex = 1;
            } else {
                let maxCols = 0;
                for (const row of rows) {
                    if (row.length > maxCols) maxCols = row.length;
                }
                for (let i = 0; i < maxCols; i++) {
                    headers.push(`Column${i + 1}`);
                }
            }

            for (let i = startIndex; i < rows.length; i++) {
                const row = rows[i];
                if (row.length === 0 || (row.length === 1 && row[0] === '')) continue;
                const obj = {};
                for (let j = 0; j < headers.length; j++) {
                    obj[headers[j]] = row[j] !== undefined ? row[j] : '';
                }
                result.push(obj);
            }
            return result;
        }

        function quoteField(val, delimiter = ',') {
            if (val.includes(delimiter) || val.includes('\n') || val.includes('\r') || val.includes('"')) {
                return '"' + val.replace(/"/g, '""') + '"';
            }
            return val;
        }

        function jsonToCsv(jsonStr, hasHeader = true) {
            const data = JSON.parse(jsonStr);
            if (!Array.isArray(data) || data.length === 0) {
                throw new Error("有効なJSON配列ではありません。");
            }
            
            const stringifyValue = (val) => {
                if (val === null || val === undefined) return '';
                if (typeof val === 'object') return JSON.stringify(val);
                return String(val);
            };

            // JSONが二次元配列の場合の処理
            if (Array.isArray(data[0])) {
                const csvRows = [];
                for (const row of data) {
                    const values = row.map(val => quoteField(stringifyValue(val)));
                    csvRows.push(values.join(','));
                }
                return csvRows.join('\n');
            }

            const headers = Array.from(new Set(data.flatMap(Object.keys)));
            const csvRows = [];

            if (hasHeader) {
                csvRows.push(headers.map(h => quoteField(h)).join(','));
            }

            for (const row of data) {
                const values = headers.map(header => quoteField(stringifyValue(row[header])));
                csvRows.push(values.join(','));
            }
            return csvRows.join('\n');
        }

        // --- イベントリスナー ---

        // CSVテキストエリアへのペースト（エクセルからのTSV対応）
        csvTextarea.addEventListener('paste', (e) => {
            // レガシーな window.clipboardData を削除しスッキリ記述
            const pasteData = e.clipboardData.getData('text');
            const isEmptyBeforePaste = csvTextarea.value.trim() === '';
            
            // タブが含まれている場合はTSVとみなしてCSVに変換
            if (pasteData.includes('\t')) {
                e.preventDefault(); // デフォルトのペーストをキャンセル
                try {
                    const rows = parseCSV(pasteData, '\t');
                    const csvRows = rows.map(row => row.map(val => quoteField(val)).join(','));
                    const csvString = csvRows.join('\n');
                    
                    // 変換したCSV文字列をテキストエリアのカーソル位置に挿入
                    csvTextarea.setRangeText(csvString, csvTextarea.selectionStart, csvTextarea.selectionEnd, 'end');
                    updateCsvStats();
                    
                    // ペースト前が空だった場合は自動でJSON変換も実行
                    if (isEmptyBeforePaste) {
                        try {
                            const jsonObj = csvToJson(csvTextarea.value, hasHeaderCheck.checked);
                            jsonTextarea.value = JSON.stringify(jsonObj, null, 2);
                            updateJsonStats();
                            showToast('エクセルデータをペーストし、自動でJSONに変換しました！');
                        } catch (err) {
                            showToast('エクセルからペーストされたデータをCSV形式に変換しました。');
                        }
                    } else {
                        showToast('エクセルからペーストされたデータをCSV形式に変換しました。');
                    }
                    return; // 処理完了
                } catch (error) {
                    // パース失敗時は通常のペースト処理へフォールバック
                }
            }
            
            // TSV以外の通常ペースト時も、空の状態へのペーストなら自動変換を試みる
            if (isEmptyBeforePaste && pasteData) {
                e.preventDefault();
                csvTextarea.setRangeText(pasteData, csvTextarea.selectionStart, csvTextarea.selectionEnd, 'end');
                updateCsvStats();
                try {
                    const jsonObj = csvToJson(csvTextarea.value, hasHeaderCheck.checked);
                    jsonTextarea.value = JSON.stringify(jsonObj, null, 2);
                    updateJsonStats();
                    showToast('データをペーストし、自動でJSONに変換しました！');
                } catch (err) {
                    // パース失敗時（CSVフォーマットでない等）は通知しない
                }
            }
        });

        // CSVからJSONへ手動変換
        toJsonBtn.addEventListener('click', () => {
            if (!csvTextarea.value.trim()) { showToast('CSVデータを入力してください。', 'error'); return; }
            try {
                const jsonObj = csvToJson(csvTextarea.value, hasHeaderCheck.checked);
                jsonTextarea.value = JSON.stringify(jsonObj, null, 2);
                updateJsonStats();
                showToast('JSON形式に変換しました！');
            } catch (error) {
                showToast(error.message || 'CSVの変換に失敗しました。', 'error');
            }
        });

        // JSONからCSVへ手動変換
        toCsvBtn.addEventListener('click', () => {
            if (!jsonTextarea.value.trim()) { showToast('JSONデータを入力してください。', 'error'); return; }
            try {
                const csvStr = jsonToCsv(jsonTextarea.value, hasHeaderCheck.checked);
                csvTextarea.value = csvStr;
                updateCsvStats();
                showToast('CSV形式に変換しました！');
            } catch (error) {
                showToast(error.message || 'JSONの変換に失敗しました。フォーマットを確認してください。', 'error');
            }
        });

        const clearArea = (textarea, isCsv) => { 
            textarea.value = ''; 
            textarea.focus(); 
            if (isCsv) updateCsvStats(); else updateJsonStats();
        };

        const copyArea = async (textarea) => {
            if (!textarea.value) { showToast('コピーするデータがありません。', 'error'); return; }
            try {
                await navigator.clipboard.writeText(textarea.value);
                showToast('クリップボードにコピーしました！');
            } catch (err) {
                showToast('コピーに失敗しました。', 'error');
            }
        };

        const downloadFile = async (textarea, filename, mimeType, encoding = 'utf-8') => {
            if (!textarea.value) { showToast('ダウンロードするデータがありません。', 'error'); return; }
            let data;
            try {
                data = encodeToBytes(textarea.value, encoding);
            } catch (err) {
                showToast(err.message || '保存に失敗しました。', 'error'); return;
            }
            
            // 従来のダウンロード方式（フォールバック）
            const useFallbackDownload = () => {
                const blob = new Blob([data], { type: mimeType });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                showToast(filename + ' をダウンロードしました。');
            };

            if ('showSaveFilePicker' in window) {
                try {
                    const ext = filename.split('.').pop();
                    const fileHandle = await window.showSaveFilePicker({
                        suggestedName: filename,
                        types: [{ description: ext.toUpperCase() + ' ファイル', accept: { [mimeType]: ['.' + ext] } }]
                    });
                    const writable = await fileHandle.createWritable();
                    await writable.write(data);
                    await writable.close();
                    showToast(fileHandle.name + ' を保存しました。');
                } catch (err) {
                    if (err.name === 'AbortError') {
                        // ユーザーがキャンセルした場合は何もしない
                        return;
                    }
                    // iframe内などの制限で失敗した場合はフォールバックを実行
                    console.warn('File picker failed, using fallback:', err);
                    useFallbackDownload();
                }
            } else {
                useFallbackDownload();
            }
        };

        csvClearBtn.addEventListener('click', () => clearArea(csvTextarea, true));
        jsonClearBtn.addEventListener('click', () => clearArea(jsonTextarea, false));
        csvCopyBtn.addEventListener('click', () => copyArea(csvTextarea));
        jsonCopyBtn.addEventListener('click', () => copyArea(jsonTextarea));

        csvDownloadBtn.addEventListener('click', () => {
            downloadFile(csvTextarea, 'data.csv', 'text/csv', csvEncoding.value);
        });
        jsonDownloadBtn.addEventListener('click', () => {
            downloadFile(jsonTextarea, 'data.json', 'application/json');
        });

        // ファイル読み込み ＆ 【自動変換】
        function readFileToTextarea(file, textarea, typeLabel) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const buffer = e.target.result;
                let text;
                try {
                    text = new TextDecoder('utf-8', { fatal: true }).decode(buffer);
                    if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
                } catch {
                    text = new TextDecoder('shift-jis').decode(buffer);
                }
                textarea.value = text;
                
                // 読み込み直後に自動変換を実行
                if (textarea === csvTextarea) {
                    updateCsvStats();
                    try {
                        const jsonObj = csvToJson(text, hasHeaderCheck.checked);
                        jsonTextarea.value = JSON.stringify(jsonObj, null, 2);
                        updateJsonStats();
                        showToast(`${file.name} を読み込み、自動でJSONに変換しました！`);
                    } catch (err) {
                        showToast(`${file.name} を読み込みましたが、自動変換できませんでした。`, 'error');
                    }
                } else {
                    updateJsonStats();
                    try {
                        const csvStr = jsonToCsv(text, hasHeaderCheck.checked);
                        csvTextarea.value = csvStr;
                        updateCsvStats();
                        showToast(`${file.name} を読み込み、自動でCSVに変換しました！`);
                    } catch (err) {
                        showToast(`${file.name} を読み込みましたが、自動変換できませんでした。`, 'error');
                    }
                }
            };
            reader.onerror = () => {
                showToast(`${typeLabel}ファイルの読み込みに失敗しました。`, 'error');
            };
            reader.readAsArrayBuffer(file);
        }

        const setupFileUpload = (uploadBtn, fileInput, textarea, typeLabel) => {
            uploadBtn.addEventListener('click', () => fileInput.click());
            fileInput.addEventListener('change', (event) => {
                const file = event.target.files[0];
                if (!file) return;
                readFileToTextarea(file, textarea, typeLabel);
                fileInput.value = '';
            });
        };

        setupFileUpload(csvUploadBtn, csvFileInput, csvTextarea, 'CSV');
        setupFileUpload(jsonUploadBtn, jsonFileInput, jsonTextarea, 'JSON');

        function setupDragDrop(panel, textarea, typeLabel, acceptedExts) {
            panel.addEventListener('dragover', (e) => {
                e.preventDefault();
                panel.classList.add('drag-over');
            });
            panel.addEventListener('dragleave', (e) => {
                if (!panel.contains(e.relatedTarget)) {
                    panel.classList.remove('drag-over');
                }
            });
            panel.addEventListener('drop', (e) => {
                e.preventDefault();
                panel.classList.remove('drag-over');
                const file = e.dataTransfer.files[0];
                if (!file) return;
                const ext = file.name.split('.').pop().toLowerCase();
                if (!acceptedExts.includes(ext)) {
                    showToast(`${acceptedExts.join(' / ')} ファイルをドロップしてください。`, 'error');
                    return;
                }
                readFileToTextarea(file, textarea, typeLabel);
            });
        }

        setupDragDrop(csvPanel, csvTextarea, 'CSV', ['csv']);
        setupDragDrop(jsonPanel, jsonTextarea, 'JSON', ['json']);

        // 初期ステータス表示
        updateCsvStats();
        updateJsonStats();

        // 現在の年をフッターに設定
        document.getElementById('currentYear').textContent = new Date().getFullYear();

    </script>
