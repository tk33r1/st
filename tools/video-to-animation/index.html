      opacity: 0;
      transition: opacity 300ms ease;

  <footer class="mt-auto border-t border-slate-200 bg-white/50 backdrop-blur-md">
    <div class="max-w-4xl mx-auto px-4 py-6 flex items-center justify-center relative">
      <span class="text-xs sm:text-sm text-slate-400 font-medium tracking-wide">&copy; <span id="currentYear"></span> Shinya Takeda</span>
      <div id="donation-button-container" class="absolute right-4 sm:right-6"></div>
    </div>
  </footer>

  <script src="../../data/buy-me-a-coffee.js"></script>
  <script>new DonationWidget({ containerId: 'donation-button-container' }).init();</script>

  <!-- Notification Toast -->
  <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-slate-800 border border-slate-700 text-white px-6 py-3 rounded-full shadow-2xl flex items-center gap-3 transition-all duration-300 transform translate-y-20 opacity-0 z-50 pointer-events-none" role="status">
    <i id="toast-icon-success" data-lucide="check-circle-2" class="w-5 h-5 text-emerald-400"></i>
    <i id="toast-icon-error" data-lucide="alert-circle" class="w-5 h-5 text-rose-400 hidden"></i>
    <span id="toast-msg" class="text-sm font-medium"></span>
  </div>

  <script>
    const { formatBytes, showToast, switchView, setupDropzone } = window.STCommon;

    lucide.createIcons();
    document.getElementById('currentYear').textContent = new Date().getFullYear();

    // Setup format selection
    const formatBtns = document.querySelectorAll('.format-btn');
    let selectedFormat = 'webp';

    const LOSSY_FORMATS = new Set(['webp']);

    const formatExtensions = {
      'apng': 'apng',
      'webp': 'webp',
      'webp-lossless': 'webp'
    };

    const formatMimeTypes = {
      'apng': 'image/apng',
      'webp': 'image/webp',
      'webp-lossless': 'image/webp'
    };

    const formatLabels = {
      'apng': 'APNG',
      'webp': 'WEBP',
      'webp-lossless': 'WEBP (可逆)'
    };

    formatBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        formatBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedFormat = btn.dataset.format;
        applyQualityState();
      });
    });

    // Elements
    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('file-input');

    const loadingMsg = document.getElementById('loading-msg');
    const loadingSubmsg = document.getElementById('loading-submsg');
    const progressBar = document.getElementById('progress-bar');
    const progressText = document.getElementById('progress-text');
    
    const resultPreview = document.getElementById('result-preview');
    const resultFormat = document.getElementById('result-format');
    const resultSize = document.getElementById('result-size');
    const btnDownload = document.getElementById('btn-download');
    const btnShare = document.getElementById('btn-share');
    const btnReset = document.getElementById('btn-reset');
    
    const optWidth = document.getElementById('opt-width');
    const optFps = document.getElementById('opt-fps');
    const optQuality = document.getElementById('opt-quality');
    const qualityVal = document.getElementById('quality-val');
    const qualityRow = document.getElementById('quality-row');

    optQuality.addEventListener('input', (e) => {
      qualityVal.textContent = e.target.value + '%';
    });

    function applyQualityState() {
      const disabled = !LOSSY_FORMATS.has(selectedFormat);
      optQuality.disabled = disabled;
      qualityRow.classList.toggle('quality-disabled', disabled);
    }
    applyQualityState();

    // ffmpeg.wasm shares the ~2 GB WASM heap with the decoded frame buffer,
    // so a 500 MB source typically OOMs partway through. 200 MB is a more
    // honest ceiling for a browser-only encoder.
    const MAX_FILE_SIZE = 200 * 1024 * 1024; // 200MB

    let ffmpeg = null;
    let isProcessing = false;
    let resultBlobUrl = null;
    let resultFilename = 'output.apng';
    let conversionStarted = false;
    let ffmpegLogBuffer = [];

    function buildFFmpegError(exitCode, hint) {
      const tail = ffmpegLogBuffer.slice(-15).join('\n');
      const lower = tail.toLowerCase();
      let summary = hint;
      if (!summary) {
        if (/unknown encoder|encoder .* not found|encoder not found/.test(lower)) {
          summary = 'このフォーマット用のエンコーダが現在のビルドに含まれていません';
        } else {
          const m = tail.match(/error[^\n]*/i);
          summary = m ? m[0] : `FFmpeg がコード ${exitCode} で終了しました`;
        }
      }
      console.error('[ffmpeg log tail]\n' + tail);
      return new Error(summary);
    }

    async function initFFmpeg() {
      if (ffmpeg) return ffmpeg;

      const { FFmpeg } = FFmpegWASM;
      const { toBlobURL } = FFmpegUtil;
      ffmpeg = new FFmpeg();

      ffmpeg.on('log', ({ message }) => {
        console.log('[ffmpeg]', message);
        ffmpegLogBuffer.push(message);
        if (ffmpegLogBuffer.length > 30) ffmpegLogBuffer.shift();
      });

      ffmpeg.on('progress', ({ progress }) => {
        if (!conversionStarted) return;
        const pct = Math.max(0, Math.min(100, Math.round(progress * 100)));
        progressBar.style.width = `${pct}%`;
        progressText.textContent = `${pct}%`;
      });

      loadingMsg.textContent = '初期化中...';
      loadingSubmsg.textContent = 'FFmpegエンジンを読み込んでいます';

      // Use ESM build of core because @ffmpeg/ffmpeg@0.12.10's worker is a module worker
      // and falls back to `await import(coreURL)`, which requires a default export.
      const coreBase = 'https://cdn.jsdelivr.net/npm/@ffmpeg/core@0.12.6/dist/esm';
      const ffmpegBase = 'https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.10/dist/umd';

      console.log('[init] fetching worker chunk');
      const classWorkerURL = await toBlobURL(`${ffmpegBase}/814.ffmpeg.js`, 'text/javascript');
      console.log('[init] fetching core js (ESM)');
      const coreURL = await toBlobURL(`${coreBase}/ffmpeg-core.js`, 'text/javascript');
      console.log('[init] fetching core wasm');
      const wasmURL = await toBlobURL(`${coreBase}/ffmpeg-core.wasm`, 'application/wasm');
      console.log('[init] calling ffmpeg.load');

      await ffmpeg.load({ classWorkerURL, coreURL, wasmURL });
      console.log('[init] ffmpeg loaded');

      return ffmpeg;
    }

    async function processVideo(file) {
      if (isProcessing) return;

      if (file.size > MAX_FILE_SIZE) {
        showToast(`ファイルが大きすぎます(${formatBytes(file.size)} / 上限 ${formatBytes(MAX_FILE_SIZE)})`, 'error');
        return;
      }

      isProcessing = true;
      conversionStarted = false;

      switchView('view-loading');
      loadingMsg.textContent = '初期化中...';
      loadingSubmsg.textContent = 'FFmpegエンジンを読み込んでいます';
      progressBar.style.width = '0%';
      progressText.textContent = '0%';

      if (resultBlobUrl) {
        URL.revokeObjectURL(resultBlobUrl);
        resultBlobUrl = null;
      }

      let ff = null;
      let inputName = null;
      let outputName = null;

      try {
        ff = await initFFmpeg();
        const { fetchFile } = FFmpegUtil;

        loadingMsg.textContent = 'ファイルを読み込み中...';
        loadingSubmsg.textContent = '';

        const dot = file.name.lastIndexOf('.');
        const inExt = dot >= 0 ? file.name.slice(dot) : '.mp4';
        const baseName = dot >= 0 ? file.name.slice(0, dot) : file.name;
        const outExt = formatExtensions[selectedFormat];
        inputName = 'input' + inExt;
        outputName = 'output.' + outExt;

        await ff.writeFile(inputName, await fetchFile(file));

        const width = optWidth.value;
        const fps = optFps.value;

        const args = ['-i', inputName];
        const vfFilters = [];

        if (fps !== 'original') {
          vfFilters.push(`fps=${fps}`);
        }

        if (width !== 'original') {
          // -2 keeps aspect ratio while rounding to an even number.
          vfFilters.push(`scale=${width}:-2:flags=lanczos`);
        }

        loadingMsg.textContent = '変換中...';
        loadingSubmsg.textContent = 'ブラウザが重くなる場合がありますがそのままお待ちください';
        conversionStarted = true;

        if (vfFilters.length > 0) args.push('-vf', vfFilters.join(','));

        if (selectedFormat === 'apng') {
          args.push('-plays', '0', outputName);
        } else if (selectedFormat === 'webp') {
          const webpQuality = String(parseInt(optQuality.value, 10) || 80);
          args.push('-c:v', 'libwebp', '-lossless', '0', '-quality', webpQuality, '-loop', '0', '-an', '-fps_mode', 'passthrough', outputName);
        } else if (selectedFormat === 'webp-lossless') {
          args.push('-c:v', 'libwebp', '-lossless', '1', '-compression_level', '6', '-loop', '0', '-an', '-fps_mode', 'passthrough', outputName);
        }

        ffmpegLogBuffer = [];
        const exitCode = await ff.exec(args);
        conversionStarted = false;
        if (exitCode !== 0) throw buildFFmpegError(exitCode);

        loadingMsg.textContent = '出力ファイルを準備中...';
        const data = await ff.readFile(outputName);

        const mimeType = formatMimeTypes[selectedFormat];
        const blob = new Blob([data.buffer], { type: mimeType });
        resultBlobUrl = URL.createObjectURL(blob);
        resultFilename = baseName + '.' + outExt;

        resultPreview.src = resultBlobUrl;
        resultFormat.textContent = formatLabels[selectedFormat];
        resultSize.textContent = formatBytes(blob.size);

        switchView('view-result');
        showToast('変換が完了しました！');

      } catch (err) {
        console.error('Conversion Error:', err);
        const detail = err && err.message ? err.message : String(err);
        showToast(`エラー: ${detail.slice(0, 80)}`, 'error');
        switchView('view-upload');
      } finally {
        conversionStarted = false;
        isProcessing = false;
        if (ff) {
          if (inputName) {
            try { await ff.deleteFile(inputName); } catch (_) {}
          }
          if (outputName) {
            try { await ff.deleteFile(outputName); } catch (_) {}
          }
        }
      }
    }

    // Event Listeners
    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) processVideo(file);
      fileInput.value = '';
    });

    setupDropzone({
      dropzone,
      fileInput,
      onFiles: (files) => {
        const file = files[0];
        if (file && file.type.startsWith('video/')) {
          processVideo(file);
        } else {
          showToast('動画ファイル(MP4等)を選択してください。', 'error');
        }
      },
    });

    btnDownload.addEventListener('click', () => {
      if (!resultBlobUrl) return;
      const a = document.createElement('a');
      a.href = resultBlobUrl;
      a.download = resultFilename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    });

    if (navigator.share) {
      btnShare.classList.remove('hidden');
      btnShare.addEventListener('click', async () => {
        if (!resultBlobUrl) return;

        // URL/テキスト共有用のフォールバックデータ（Outlook や LINE などファイルを
        // 受け付けないアプリ向け）。クエリ・ハッシュを除いたツールページのURLを使う。
        const fallbackData = {
          title: '動画アニメーション',
          text: '動画から作るアニメーション変換ツール',
          url: location.origin + location.pathname,
        };

        try {
          const response = await fetch(resultBlobUrl);
          const originalBlob = await response.blob();

          let file;
          if (selectedFormat === 'apng') {
            // Chromeの内部仕様で image/apng はシェアを拒否され空ファイルになるため、完全に image/png のBlobとして再生成する
            const cleanBlob = new Blob([originalBlob], { type: 'image/png' });
            const shareFilename = resultFilename.replace(/\.apng$/i, '.png');
            file = new File([cleanBlob], shareFilename, { type: 'image/png' });
          } else {
            // WebPなど他の形式はそのままFile化する（ArrayBuffer経由だと失敗するため）
            file = new File([originalBlob], resultFilename, { type: originalBlob.type });
          }

          // まずファイルそのものの共有を試す（Copilot など画像対応アプリ向け）
          if (navigator.canShare && navigator.canShare({ files: [file] })) {
            try {
              await navigator.share({ title: '動画アニメーション', files: [file] });
              return;
            } catch (err) {
              if (err.name === 'AbortError') return; // ユーザーがキャンセル
              // 共有先アプリがファイル形式を拒否した場合などは URL 共有にフォールバック
              console.warn('File share failed, falling back to URL share:', err);
            }
          }

          // フォールバック: ツールのURL＋テキストを共有する
          await navigator.share(fallbackData);
        } catch (err) {
          if (err.name !== 'AbortError') {
            console.error('Share error:', err);
            showToast('共有に失敗しました', 'error');
          }
        }
      });
    }

    btnReset.addEventListener('click', () => {
      switchView('view-upload');
      if (resultBlobUrl) {
        URL.revokeObjectURL(resultBlobUrl);
        resultBlobUrl = null;
      }
      resultPreview.removeAttribute('src');
    });

  </script>
</body>
</html>
