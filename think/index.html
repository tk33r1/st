  <style>
    /* =========================================
       Base & Layout Styles
       ========================================= */
    html, body {
      height: 100%;
      width: 100%;
      margin: 0;
      overflow: hidden;
    }

    /* 上品な紙の質感を表現するノイズ背景 */
    .paper-noise {
      background-image:
        radial-gradient(circle at 20% 20%, rgba(0,0,0,0.025) 0, rgba(0,0,0,0.025) 1px, transparent 1px),
        radial-gradient(circle at 80% 30%, rgba(0,0,0,0.02) 0, rgba(0,0,0,0.02) 1px, transparent 1px),
        radial-gradient(circle at 40% 80%, rgba(0,0,0,0.015) 0, rgba(0,0,0,0.015) 1px, transparent 1px);
      background-size: 160px 160px, 220px 220px, 280px 280px;
    }

    body.dark-mode .paper-noise {
      background-image:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,0.02) 0, rgba(255,255,255,0.02) 1px, transparent 1px),
        radial-gradient(circle at 80% 30%, rgba(255,255,255,0.015) 0, rgba(255,255,255,0.015) 1px, transparent 1px),
        radial-gradient(circle at 40% 80%, rgba(255,255,255,0.01) 0, rgba(255,255,255,0.01) 1px, transparent 1px);
    }

    ::selection { background: rgba(120,120,120,0.2); }

    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    /* =========================================
       Zen Mode Styles (集中モード)
       ========================================= */
    body.zen-mode #headerTitleArea,
    body.zen-mode nav,
    body.zen-mode footer,
    body.zen-mode #metaContent {
      opacity: 0 !important;
      filter: blur(4px) !important;
      pointer-events: none;
    }
    #headerTitleArea, nav, footer, #metaContent {
      transition: opacity 1.5s ease-in-out, filter 1.5s ease-in-out;
    }

    body.zen-mode .action-btns-wrapper,
    body.zen-mode #zenToggleBtn,
    body.zen-mode #themeToggleBtn {
      opacity: 0.3 !important;
    }
    body.zen-mode .action-btns-wrapper:hover,
    body.zen-mode #zenToggleBtn:hover,
    body.zen-mode #themeToggleBtn:hover {
      opacity: 1 !important;
    }
    
    #zenToggleBtn, #themeToggleBtn {
      transition: opacity 0.5s ease-in-out, transform 0.5s ease-in-out, background-color 0.5s ease-in-out;
    }

    /* =========================================
       Animation Definitions
       ========================================= */
    @keyframes breathe {
      0%, 100% { transform: scaleX(0.88); opacity: 0.45; }
      50% { transform: scaleX(1); opacity: 0.9; }
    }
    .breath-line {
      transform-origin: center;
      animation: breathe 6s ease-in-out infinite;
    }

    @keyframes fadeUpIn {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeOutDown {
      0% { opacity: 1; transform: translateY(0); }
      100% { opacity: 0; transform: translateY(-10px); }
    }
    @keyframes fadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }

    .anim-ready { opacity: 0; }
    
    .play-fade-up { animation: fadeUpIn 1.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
    .play-fade-out { animation: fadeOutDown 0.4s ease-out forwards; }
    .play-fade-in { animation: fadeIn 2.5s ease-out forwards; }

    .delay-200 { animation-delay: 400ms; }
    .delay-400 { animation-delay: 800ms; }
    .delay-600 { animation-delay: 1200ms; }
    .delay-800 { animation-delay: 1600ms; }

    .reference-link { text-decoration: underline; text-underline-offset: 3px; transition: color 0.4s ease; }
    body.dark-mode .reference-link:hover { color: #ffffff !important; }
    body:not(.dark-mode) .reference-link:hover { color: #111111 !important; }

    .action-btn:hover { color: #111111 !important; }
    body.dark-mode .action-btn:hover { color: #ffffff !important; }

    button:disabled {
      opacity: 0.3;
      cursor: not-allowed;
      pointer-events: none;
    }

    .share-option-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      padding: 1.25rem;
      border-radius: 0.75rem;
      transition: all 0.3s ease;
      background-color: rgba(0,0,0,0.03);
    }
    body.dark-mode .share-option-btn { background-color: rgba(255,255,255,0.03); }
    .share-option-btn:hover { transform: translateY(-4px); background-color: rgba(0,0,0,0.06); }
    body.dark-mode .share-option-btn:hover { background-color: rgba(255,255,255,0.06); }
  </style>

  <script>
    /* =========================================

    const themes = {
      love: {
        title: "愛とは",
        body: "誰かからの見返りを期待したり、何かと交換したりするものではない。かといって、自己犠牲でもない。愛とは、自立した人間同士が、配慮と尊重、転じて責任を持って相対し、互いの核心を知ろうとする中で、自発的にただ、与えるもののように思う。",
        lastUpdated: "2026.03.12",
        reference: `エーリッヒ・フロム（2020）『<a href="https://a.r10.to/hkGD1f" target="_blank" rel="noopener noreferrer" class="reference-link">愛するということ</a>』鈴木晶訳, 紀伊國屋書店.`
      },
      happiness: {
        title: "幸せとは",

        lastUpdated: "2026.03.16",
        reference: `今枝由郎訳（2001）『<a href="https://a.r10.to/h5DyaJ" target="_blank" rel="noopener noreferrer" class="reference-link">スッタニパータ ブッダの言葉</a>』光文社.`
      },
      self: { title: "自我とは", body: "...", lastUpdated: "2026.03.27", reference: "カール・グスタフ・ユング（1990）『自我と無意識』高橋義孝訳, 第三文明社." },
      madness: { title: "狂気とは", body: "...", lastUpdated: "2026.03.26", reference: "ミシェル・フーコー（1975）『狂気の歴史』田村俶訳, 新潮社." },
      death: { title: "死とは", body: "...", lastUpdated: "2026.03.25", reference: "マルティン・ハイデガー（1994）『存在と時間』細谷貞夫訳, ちくま学芸文庫." },
      freedom: { title: "自由とは", body: "...", lastUpdated: "2026.03.24", reference: "ジャン＝ポール・サルトル（2007）『存在と無』松浪信三郎訳, ちくま学芸文庫." },

    const lightPalette = { background_color: "#ffffff", surface_color: "#e7e7e7", text_color: "#111111", primary_action_color: "#111111", secondary_action_color: "#777777", meta_text_color: "#8a8a8a", copyright_color: "#b0b0b0" };

    const defaultConfig = {

    /* =========================================

    let currentTheme = null;
    let isAnimating = false;
    let isDarkMode = false; 
    let isZenMode = false;

    const getBadgeHtml = (text) => {
      const border = isDarkMode ? 'border-white/20' : 'border-black/10';
      const bg = isDarkMode ? 'bg-white/5' : 'bg-black/[0.03]';
      const textColor = isDarkMode ? 'text-white/60' : 'text-black/50';
      return `<span class="inline-block border ${border} rounded-sm px-1.5 py-0.5 mr-2 text-[10px] ${textColor} ${bg} flex-shrink-0 mt-0.5 sm:mt-0 transition-colors duration-500">${text}</span>`;
    };

    /* =========================================
       Core Logic
       ========================================= */
       
    function updateContentData(themeName) {
      const theme = (themeName && themeName !== 'reset') ? themes[themeName] : defaultConfig;
      els.title.textContent = theme.title || theme.main_title;
      els.body.innerHTML = theme.body || theme.body_text;
      const updated = theme.lastUpdated || (themeName === 'reset' ? defaultConfig.last_updated_text : '');
      const ref = theme.reference || (themeName === 'reset' ? defaultConfig.reference_text : '');
      let hasMeta = false;
      if (updated) {
        els.lastUpdated.innerHTML = `${getBadgeHtml('最終更新日')}<span>${updated}</span>`;
        els.lastUpdated.style.display = 'flex';
        hasMeta = true;
      } else { els.lastUpdated.style.display = 'none'; }
      if (ref) {
        els.reference.innerHTML = `${getBadgeHtml('参考文献')}<span>${ref}</span>`;
        els.reference.style.display = 'flex';
        hasMeta = true;
      } else { els.reference.style.display = 'none'; }
      els.metaContent.style.display = hasMeta ? 'flex' : 'none';
    }

    function switchTheme(themeName) {
      if (isAnimating || currentTheme === themeName) return;
      isAnimating = true;
      currentTheme = themeName === 'reset' ? null : themeName;
      els.contentElements.forEach(el => {
        el.classList.remove('play-fade-up', 'play-fade-in', 'delay-200', 'delay-400', 'delay-600', 'delay-800');
        el.classList.add('play-fade-out');
      });
      setTimeout(() => {
        updateContentData(themeName);
        els.contentElements.forEach(el => {
          el.classList.remove('play-fade-out');
          void el.offsetWidth; 
          if (el.id === 'title') el.classList.add('play-fade-up');
          else if (el.id === 'body') el.classList.add('play-fade-up', 'delay-400');
          else if (el.id === 'metaInfo') el.classList.add('play-fade-up', 'delay-800');
          else el.classList.add('play-fade-in', 'delay-800');
        });
        setTimeout(() => { isAnimating = false; }, 1800); 
      }, 400);
      const config = (window.elementSdk && window.elementSdk.config) ? window.elementSdk.config : defaultConfig;
      updateButtonsHighlight(themeName, isDarkMode ? darkPalette : config);
    }

    function applyColors(palette) {
      document.body.style.backgroundColor = palette.background_color;
      document.body.style.color = palette.text_color;
      els.app.style.backgroundColor = palette.background_color;
      els.headerTitleArea.style.color = palette.text_color;
      els.title.style.color = palette.text_color;
      els.subtitle.style.color = palette.secondary_action_color;
      els.body.style.color = palette.secondary_action_color;
      els.footerText.style.color = palette.secondary_action_color;
      els.metaInfo.style.color = palette.meta_text_color;
      els.copyright.style.color = palette.copyright_color;
      els.topMark.style.backgroundColor = palette.surface_color;
      els.hLine.style.backgroundColor = palette.surface_color;
      const gradVia = isDarkMode ? 'rgba(255,255,255,0.1)' : 'rgba(217,217,217,1)';
      els.vLine.style.backgroundImage = `linear-gradient(to bottom, transparent, ${gradVia}, transparent)`;
      
      if (isDarkMode) {
        document.body.classList.add('dark-mode');
        els.themeToggleBtn.style.backgroundColor = "rgba(255,255,255,0.1)";
        els.themeToggleBtn.style.borderColor = "rgba(255,255,255,0.1)";
        els.themeToggleBtn.title = "昼の余白へ"; 
        els.themeToggleHandle.style.transform = "translateX(1.25rem)";
        els.themeToggleHandle.innerHTML = '<i data-lucide="moon" class="w-2.5 h-2.5 text-[#a1a1aa]"></i>';
        
        els.zenToggleBtn.className = "p-2 text-[#a1a1aa] transition-all duration-500 rounded-full hover:bg-white/10 hover:text-white focus:outline-none";
        els.subtitle.classList.add('hover:text-white');
        els.footerBottom.className = "w-full py-5 sm:py-6 px-4 transition-colors duration-700 border-t border-white/[0.06]";
        els.disclosureBtn.className = "flex items-center gap-2 px-4 py-2 text-xs sm:text-sm rounded-full border border-white/20 bg-transparent text-[#a1a1aa] transition-all hover:border-white hover:text-white focus:outline-none focus:ring-2 focus:ring-white focus:ring-offset-2 focus:ring-offset-[#111111] hover:bg-white/5 whitespace-nowrap tracking-widest";
        
        els.modalContent.style.backgroundColor = "#27272a";
        els.modalTitle.style.color = "#f4f4f5";
        els.modalBody.style.color = "#a1a1aa";
        els.closeModalBtn.style.backgroundColor = "#f4f4f5";
        els.closeModalBtn.style.color = "#111111";
        els.shareModalContent.style.backgroundColor = "#27272a";
        els.shareModalTitle.style.color = "#f4f4f5";
        els.closeShareModalBtn.style.borderColor = "rgba(255,255,255,0.1)";
        els.closeShareModalBtn.style.color = "#a1a1aa";
      } else {
        document.body.classList.remove('dark-mode');
        els.themeToggleBtn.style.backgroundColor = "rgba(0,0,0,0.05)";
        els.themeToggleBtn.style.borderColor = "rgba(0,0,0,0.1)";
        els.themeToggleBtn.title = "夜の余白へ"; 
        els.themeToggleHandle.style.transform = "translateX(0)";
        els.themeToggleHandle.innerHTML = '<i data-lucide="sun" class="w-2.5 h-2.5 text-[#777777]"></i>';

        els.zenToggleBtn.className = "p-2 text-[#777777] transition-all duration-500 rounded-full hover:bg-black/5 hover:text-[#111111] focus:outline-none";
        els.subtitle.classList.remove('hover:text-white');
        els.footerBottom.className = "w-full py-5 sm:py-6 px-4 transition-colors duration-700 border-t border-black/[0.06]";
        els.disclosureBtn.className = "flex items-center gap-2 px-4 py-2 text-xs sm:text-sm rounded-full border border-black/10 bg-transparent text-[#777777] transition-all hover:border-[#111111] hover:text-[#111111] focus:outline-none focus:ring-2 focus:ring-[#111111] focus:ring-offset-2 hover:bg-black/5 whitespace-nowrap tracking-widest";
        
        els.modalContent.style.backgroundColor = "#ffffff";
        els.modalTitle.style.color = "#111111";
        els.modalBody.style.color = "#555555";
        els.closeModalBtn.style.backgroundColor = "#111111";
        els.closeModalBtn.style.color = "#ffffff";
        els.shareModalContent.style.backgroundColor = "#ffffff";
        els.shareModalTitle.style.color = "#111111";
        els.closeShareModalBtn.style.borderColor = "rgba(0,0,0,0.1)";
        els.closeShareModalBtn.style.color = "#777777";
      }
      
      lucide.createIcons(); 
      updateButtonsHighlight(currentTheme, palette);
      updateContentData(currentTheme || 'reset');
    }

    function applyConfig(config) {
      const mergedLight = { ...defaultConfig, ...config };
      const baseSize = Number(mergedLight.font_size);
      const serifStack = `"${mergedLight.font_family}", "Hiragino Mincho ProN", "Yu Mincho", Georgia, serif`;
      const allTextElements = [els.title, els.body, els.footerText, els.modalBody, els.subtitle, els.metaInfo, els.copyright, els.disclosureText, els.modalTitle, els.closeModalBtn, els.copyContentText, els.sharePageText, els.shareModalTitle, els.shareCopyText, ...els.themeBtns];
      allTextElements.forEach(el => { if (el && el.style) el.style.fontFamily = serifStack; });
      els.title.style.fontSize = `${baseSize * 3.2}px`;
      els.body.style.fontSize = `${baseSize}px`;
      els.footerText.style.fontSize = `${baseSize * 0.82}px`;
      els.subtitle.style.fontSize = `${baseSize * 0.62}px`;
      applyColors(isDarkMode ? darkPalette : mergedLight);
    }

    function updateButtonsHighlight(themeName, palette) {
      els.themeBtns.forEach(btn => {
        if (btn.dataset.theme === themeName) {
          btn.style.borderColor = palette.primary_action_color;
          btn.style.color = palette.primary_action_color;
          btn.style.fontWeight = '500';
        } else {
          btn.style.borderColor = palette.surface_color;
          btn.style.color = palette.secondary_action_color;
          btn.style.fontWeight = '400';
        }
        btn.style.backgroundColor = palette.background_color;
      });
    }

    /* =========================================
       Event Listeners
       ========================================= */
    els.themeBtns.forEach(btn => btn.addEventListener('click', () => switchTheme(btn.dataset.theme)));
    els.subtitle.addEventListener('click', () => switchTheme('reset'));

    els.themeToggleBtn.addEventListener('click', () => {
      isDarkMode = !isDarkMode;
      applyConfig((window.elementSdk && window.elementSdk.config) || defaultConfig);
    });

    els.zenToggleBtn.addEventListener('click', () => {
      isZenMode = !isZenMode;
      document.body.classList.toggle('zen-mode', isZenMode);
      els.zenToggleIcon.setAttribute('data-lucide', isZenMode ? 'minimize' : 'maximize');
      lucide.createIcons();
    });

    const copyToClipboard = (text, successCallback) => {
      try {
        const textArea = document.createElement("textarea");
        textArea.value = text;
        document.body.appendChild(textArea);
        textArea.select();
        document.execCommand('copy');
        document.body.removeChild(textArea);
        if (successCallback) successCallback();
      } catch (e) { console.error('Copy failed', e); }
    };

    const getFormattedContent = () => {
      const title = els.title.textContent;
      let bodyText = els.body.innerHTML.replace(/<br\s*[\/]?>/gi, '\n').replace(/<[^>]+>/g, '');
      return `【${title}】\n${bodyText}\n\n― 思索の余白\n${SITE_URL}`;
    };

    els.copyContentBtn.addEventListener('click', () => {
      copyToClipboard(getFormattedContent(), () => {
        els.copyContentIcon.setAttribute('data-lucide', 'check');
        els.copyContentText.textContent = '書き留めました';
        lucide.createIcons();
        setTimeout(() => {
          els.copyContentIcon.setAttribute('data-lucide', 'copy');
          els.copyContentText.textContent = '書き留める';
          lucide.createIcons();
        }, 3000);
      });
    });

    els.openShareModalBtn.addEventListener('click', () => els.shareModal.classList.remove('hidden'));
    els.closeShareModalBtn.addEventListener('click', () => els.shareModal.classList.add('hidden'));

    const getShareInfo = () => {
      const title = els.title.textContent;
      const shareUrl = `${SITE_URL}${UTM_PARAMS}`;
      const text = currentTheme ? `思索の余白：${title}` : `思索の余白 ― 人生の本質を思索するための場所`;
      return { text, shareUrl };
    };

    els.shareX.addEventListener('click', () => {
      const { text, shareUrl } = getShareInfo();
      window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(shareUrl)}`, '_blank');
    });
    els.shareLine.addEventListener('click', () => {
      const { text, shareUrl } = getShareInfo();
      window.open(`https://social-plugins.line.me/lineit/share?url=${encodeURIComponent(shareUrl)}&text=${encodeURIComponent(text)}`, '_blank');
    });
    
    els.shareNotion.addEventListener('click', () => {
      copyToClipboard(getFormattedContent(), () => {
        const span = els.shareNotion.querySelector('span');
        const originalText = span.textContent;
        span.textContent = 'コピー完了';
        setTimeout(() => {
          span.textContent = originalText;
          window.open('https://notion.new', '_blank');
        }, 1000);
      });
    });
    els.shareCopy.addEventListener('click', () => {
      const { shareUrl } = getShareInfo();
      copyToClipboard(shareUrl, () => {
        els.shareCopyIcon.setAttribute('data-lucide', 'check');
        els.shareCopyText.textContent = 'コピー完了';
        lucide.createIcons();
        setTimeout(() => {
          els.shareCopyIcon.setAttribute('data-lucide', 'link');
          els.shareCopyText.textContent = 'URLコピー';
          lucide.createIcons();
        }, 2000);
      });
    });

    els.disclosureBtn.addEventListener('click', () => document.getElementById('disclosureModal').classList.remove('hidden'));
    els.closeModalBtn.addEventListener('click', () => document.getElementById('disclosureModal').classList.add('hidden'));
    window.addEventListener('click', (e) => {
      if (e.target.id === 'disclosureModal') e.target.classList.add('hidden');
      if (e.target.id === 'shareModal') e.target.classList.add('hidden');
    });

    lucide.createIcons();

    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange: (config) => applyConfig(config),
        mapToCapabilities: (config) => ({
          recolorables: [
            { get: () => config.background_color || defaultConfig.background_color, set: (v) => { config.background_color = v; window.elementSdk.setConfig({ background_color: v }); } },
            { get: () => config.surface_color || defaultConfig.surface_color, set: (v) => { config.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); } },
            { get: () => config.text_color || defaultConfig.text_color, set: (v) => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); } },
            { get: () => config.primary_action_color || defaultConfig.primary_action_color, set: (v) => { config.primary_action_color = v; window.elementSdk.setConfig({ primary_action_color: v }); } },
            { get: () => config.secondary_action_color || defaultConfig.secondary_action_color, set: (v) => { config.secondary_action_color = v; window.elementSdk.setConfig({ secondary_action_color: v }); } }
          ],
          borderables: [],
          fontEditable: { get: () => config.font_family || defaultConfig.font_family, set: (v) => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); } },
          fontSizeable: { get: () => config.font_size || defaultConfig.font_size, set: (v) => { config.font_size = v; window.elementSdk.setConfig({ font_size: v }); } }
        }),
        mapToEditPanelValues: (config) => new Map([ ["main_title", config.main_title || defaultConfig.main_title], ["subtitle_text", config.subtitle_text || defaultConfig.subtitle_text], ["body_text", config.body_text || defaultConfig.body_text], ["footer_text", config.footer_text || defaultConfig.footer_text] ])
      });
    }
    applyConfig((window.elementSdk && window.elementSdk.config) || defaultConfig);
  </script>
</body>
</html>
