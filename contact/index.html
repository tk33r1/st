<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Check - tk.st</title>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            background-color: #f8f9fa; 
        }
        .container { 
            text-align: center; 
            padding: 2rem; 
            background: white; 
            border-radius: 16px; 
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05); 
            max-width: 360px; 
            width: 90%; 
        }
        h3 { color: #333; margin-top: 0; }
        p { color: #666; font-size: 14px; line-height: 1.6; margin-bottom: 24px; }
    </style>
</head>
<body>
    <div class="container">
        <h3>Verify you are human</h3>
        <p>安全な接続を確認しています。<br>しばらくお待ちください。</p>
        
        <div class="cf-turnstile" 
             data-sitekey="0x4AAAAAACwi9fjjeeh8ujIK" 
             data-callback="onVerifySuccess"></div>
    </div>

    <script>
        function onVerifySuccess(token) {
            // メールアドレスを hi@tk.st に構築
            const user = "hi";
            const domain = "tk.st";
            const email = user + "@" + domain;

            // 認証成功後、メーラーを起動
            window.location.href = "mailto:" + email;

            // 1.5秒後に自動的に前のページに戻る
            setTimeout(() => {
                if (window.history.length > 1) {
                    window.history.back();
                }
            }, 1500);
        }
    </script>
</body>
</html>
