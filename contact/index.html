<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>認証にご協力ください</title>
    <!-- Cloudflare Turnstile API -->
    <script async crossorigin="anonymous" src="https://challenges.cloudflare.com/turnstile/v0/api.js?_upgrade=true&_cb=1774646626481"></script>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            background-color: #f8f9fa; 
            padding: 20px;
            box-sizing: border-box;
        }
        .container { 
            text-align: center; 
            padding: 1.5rem 2.5rem 2.5rem; 
            background: white; 
            border-radius: 16px; 
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05); 
            max-width: 400px; 
            width: 100%; 
            box-sizing: border-box;
        }
        .site-logo {
            width: 80px; 
            height: 80px;
            object-fit: contain; 
            margin-bottom: 12px; 
        }
        .separator {
            border: 0;
            border-top: 1px solid #eee; 
            margin: 0 auto 16px auto; 
            width: 60%; 
        }
        h3 { 
            color: #333; 
            margin-top: 0; 
            font-size: 1.1rem;
            margin-bottom: 24px;
        }
        .turnstile-wrapper {
            display: flex;
            justify-content: center;
            margin-bottom: 24px;
        }
        .footer-note {
            font-size: 11px;
            color: #999; 
            line-height: 1.5;
            border-top: 1px solid #eee;
            padding-top: 16px;
            margin-top: 8px;
        }
        .footer-note a {
            color: #777;
            text-decoration: underline;
            transition: color 0.2s;
            margin-left: 4px; /* テキストとの間に少し隙間を作る */
        }
        .footer-note a:hover {
            color: #444;
        }
    </style>
</head>
<body>
    <div class="container" id="main-container">
        <!-- ロゴ画像 (80x80) -->
        <img src="https://tk.st/images/favicons/st-favicon.png" alt="Site Logo" class="site-logo" width="80" height="80" onerror="this.style.display='none'">
        
        <!-- 区切り線 -->
        <hr class="separator">

        <h3>認証にご協力ください</h3>
        
        <!-- Turnstile ウィジェット -->
        <div class="turnstile-wrapper">
            <div class="cf-turnstile" data-sitekey="0x4AAAAAACwi9fjjeeh8ujIK" data-callback="onVerifySuccess"></div>
        </div>

        <!-- フッターの注意書き (一続きに変更) -->
        <div class="footer-note">
            これはボットによるスパムメール対策です。Cloudflare Turnstileの技術を利用しています。<a href="https://www.cloudflare.com/ja-jp/application-services/products/turnstile/" target="_blank" rel="noopener noreferrer">詳細はこちら</a>
        </div>
    </div>

    <script>
        // メールを起動したかどうかのフラグ
        let hasOpenedMail = false;
        const logoUrl = "https://tk.st/images/favicons/st-favicon.png";

        function onVerifySuccess(token) {
            if (hasOpenedMail) return;
            hasOpenedMail = true;

            const user = "hi";
            const domain = "tk.st";
            const email = user + "@" + domain;

            // 認証成功後、メーラーを起動
            window.location.href = "mailto:" + email;

            // 画面の表示を切り替え
            const container = document.getElementById('main-container');
            if (container) {
                container.innerHTML = `
                    <img src="${logoUrl}" alt="Site Logo" class="site-logo" width="80" height="80" onerror="this.style.display='none'">
                    <hr class="separator">
                    <h3>認証完了</h3>
                    <p style="color: #666; font-size: 14px; line-height: 1.6; margin-bottom: 24px;">メールソフトを起動しました。<br>このタブは自動的に閉じられますが、閉じない場合は手動で閉じてください。</p>
                `;
            }

            // 1.5秒後にタブを閉じる処理
            setTimeout(() => {
                window.close();
                if (window.history.length > 1) {
                    window.history.back();
                }
            }, 1500);
        }
    </script>
</body>
</html>
